<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scully List | Enviar Récord</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff6600; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Lexend Deca', sans-serif; margin: 0; text-align: center; }
        .form-container { width: 90%; max-width: 500px; margin: 50px auto; background: #0a0a0a; padding: 30px; border: 1px solid var(--accent); border-radius: 12px; }
        .group { margin-bottom: 20px; text-align: left; }
        label { display: block; color: var(--accent); font-size: 0.7rem; text-transform: uppercase; margin-bottom: 8px; }
        input, textarea { width: 100%; background: #000; border: 1px solid #222; color: #fff; padding: 12px; border-radius: 6px; box-sizing: border-box; font-family: 'Lexend Deca'; }
        input:focus { border-color: var(--accent); outline: none; }
        .btn-send { width: 100%; padding: 15px; background: var(--accent); border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #status { margin-top: 20px; padding: 10px; border-radius: 5px; display: none; font-size: 0.8rem; }
    </style>
</head>
<body>
    <header style="padding:40px 0;">
        <h1 style="letter-spacing:4px;">SUBIR <span>RÉCORD</span></h1>
        <a href="index.html" style="color:var(--accent); text-decoration:none; font-size:0.8rem;">← VOLVER</a>
    </header>

    <div class="form-container">
        <form onsubmit="enviarRecord(event)">
            <div class="group"><label>Nombre de Usuario</label><input type="text" id="u" required></div>
            <div class="group"><label>Nivel Completado</label><input type="text" id="l" required></div>
            <div class="group"><label>Link del Video</label><input type="url" id="v" required></div>
            <div class="group"><label>Link Grabación RAW (Drive)</label><input type="url" id="d" required></div>
            <div class="group"><label>Comentarios</label><textarea id="c"></textarea></div>
            <button type="submit" class="btn-send">ENVIAR AL PROTOCOLO</button>
            <div id="status"></div>
        </form>
    </div>

    <script>
        function enviarRecord(e) {
            e.preventDefault();
            const drive = document.getElementById('d').value;
            const status = document.getElementById('status');

            if(!drive.includes('drive.google.com')) {
                status.style.display = "block"; status.style.color = "#f44"; status.innerText = "Error: El RAW debe ser de Google Drive.";
                return;
            }

            const r = { user: document.getElementById('u').value, level: document.getElementById('l').value, video: document.getElementById('v').value, drive: drive, comment: document.getElementById('c').value };
            let p = JSON.parse(localStorage.getItem('scully_pendientes')) || [];
            p.push(r);
            localStorage.setItem('scully_pendientes', JSON.stringify(p));

            status.style.display = "block"; status.style.color = "#0f0"; status.innerText = "Récord enviado con éxito al administrador.";
            e.target.reset();
        }
    </script>
</body>
</html>
