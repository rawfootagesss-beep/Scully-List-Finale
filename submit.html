<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enviar Récord | Scully List</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Lexend+Deca:wght@400;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --ac: #ff6600; --bg: #030303; --cd: #111; --bd: rgba(255, 255, 255, 0.08); }
        body { background: var(--bg); color: #fff; font-family: 'Lexend Deca', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { background: var(--cd); border: 1px solid var(--bd); padding: 40px; border-radius: 20px; width: 90%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: var(--ac); font-family: 'JetBrains Mono'; margin-top: 0; text-transform: uppercase; }
        .ig { margin-bottom: 20px; } label { display: block; font-size: 0.75rem; color: var(--ac); font-weight: 800; margin-bottom: 8px; text-transform: uppercase; }
        input, textarea { width: 100%; background: #000; border: 1px solid #222; color: #fff; padding: 15px; border-radius: 10px; font-family: inherit; font-size: 0.9rem; outline: none; box-sizing: border-box; transition: 0.3s; }
        input:focus, textarea:focus { border-color: var(--ac); }
        .btn { background: var(--ac); color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: 800; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 0.9rem; transition: 0.3s; opacity: 0.5; pointer-events: none; }
        .btn.active { opacity: 1; pointer-events: all; }
        .btn:hover.active { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,102,0,0.3); }
        
        /* SMART SCANNER CSS */
        #scanner-box { display: none; background: rgba(0,255,102,0.05); border: 1px solid rgba(0,255,102,0.2); padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        #yt-thumb { width: 100%; border-radius: 8px; margin-top: 10px; border: 1px solid #333; }
        .btn-back { display: block; text-align: center; margin-top: 20px; color: #666; text-decoration: none; font-size: 0.8rem; text-transform: uppercase; font-weight: 800; }
    </style>
</head>
<body>
    <div class="box">
        <h1><i class="fas fa-upload"></i> Smart Submit</h1>
        <p style="text-align:center; color:#888; font-size:0.8rem; margin-bottom:30px;">El sistema verificará tu enlace antes de enviarlo al Staff.</p>
        
        <div class="ig"><label>Nick Exacto</label><input type="text" id="s-p" placeholder="Tu nombre en la página"></div>
        <div class="ig"><label>Nivel Superado</label><input type="text" id="s-l" placeholder="Ej: Bloodbath"></div>
        <div class="ig"><label>Evidencia (YouTube URL)</label><input type="text" id="s-y" placeholder="https://youtube.com/watch?v=..." oninput="scanLink()"></div>
        <div class="ig"><label>Video RAW (Opcional)</label><input type="text" id="s-r" placeholder="Link de Google Drive/Mediafire"></div>
        <div class="ig"><label>Comentarios (Opcional)</label><textarea id="s-c" rows="2" placeholder="Nota para el staff..."></textarea></div>

        <div id="scanner-box">
            <span style="color:#00ff66; font-weight:800; font-size:0.8rem;"><i class="fas fa-check-circle"></i> VIDEO VERIFICADO</span>
            <img id="yt-thumb" src="" alt="Thumbnail">
        </div>

        <button class="btn" id="s-btn" onclick="submitRecord()"><i class="fas fa-paper-plane"></i> ENVIAR RÉCORD AL SERVIDOR</button>
        <a href="index.html" class="btn-back">Cancelar y volver</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script>
        const fC = { apiKey:"AIzaSyC2vrauBlplKGMjeLW3mLzZQr05khmH5v0", authDomain:"scullylist.firebaseapp.com", databaseURL:"https://scullylist-default-rtdb.firebaseio.com", projectId:"scullylist", storageBucket:"scullylist.firebasestorage.app", messagingSenderId:"498548914021", appId:"1:498548914021:web:59128b5e06b36a4e81938c" };
        firebase.initializeApp(fC); const db = firebase.database();
        const $ = id => document.getElementById(id);

        // MOTOR SMART SCANNER
        function scanLink() {
            const url = $('s-y').value;
            const match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))([\w-]{11})/);
            
            if(match && match[1]) {
                $('yt-thumb').src = `https://img.youtube.com/vi/${match[1]}/mqdefault.jpg`;
                $('scanner-box').style.display = 'block';
                $('s-btn').classList.add('active'); // Habilita el botón
            } else {
                $('scanner-box').style.display = 'none';
                $('s-btn').classList.remove('active'); // Deshabilita el botón
            }
        }

        function submitRecord() {
            const p = $('s-p').value.trim(), l = $('s-l').value.trim(), y = $('s-y').value.trim(), r = $('s-r').value.trim(), c = $('s-c').value.trim();
            if(!p || !l || !y) return alert("Faltan datos obligatorios.");
            
            db.ref('submissions').push({ player: p, level: l, link: y, raw: r, comments: c, timestamp: Date.now() })
            .then(() => {
                $('s-btn').innerHTML = "<i class='fas fa-check'></i> ENVIADO CORRECTAMENTE";
                $('s-btn').style.background = "#00ff66";
                setTimeout(() => location.href = "index.html", 1500);
            }).catch(e => alert("Error de conexión."));
        }
    </script>
</body>
</html>
