<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado XP | Hub OMNI</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@800&family=Lexend+Deca:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030303; --card: rgba(15,15,15,0.9); --gold: #ffd700; --cyan: #00ffff; --border: rgba(255,255,255,0.1); }
        body { background: var(--bg); color: #fff; font-family: 'Lexend Deca', sans-serif; margin: 0; padding: 20px; text-align: center; }
        .header { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--border); max-width: 1000px; margin: 0 auto 30px; }
        .header h1 { margin: 0; font-size: 2rem; color: var(--gold); text-transform: uppercase; font-family: 'JetBrains Mono'; }
        .user-xp-box { display: inline-block; background: rgba(255,215,0,0.1); border: 1px solid var(--gold); padding: 10px 20px; border-radius: 10px; font-weight: 800; color: var(--gold); margin-top: 15px; font-size: 1.2rem; }
        .store-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .item-card { background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 20px; }
        .item-card h3 { font-size: 1.5rem; margin: 10px 0; font-family: 'JetBrains Mono'; }
        .item-card .price { font-size: 1.2rem; color: var(--gold); font-weight: 800; margin-bottom: 20px; display: block; }
        .btn-buy { background: var(--gold); color: #000; border: none; padding: 15px 25px; border-radius: 10px; font-weight: 800; cursor: pointer; width: 100%; font-size: 1.1rem; text-transform: uppercase; }
        .nav-back { display: inline-block; color: var(--cyan); text-decoration: none; font-weight: 800; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Mercado OMNI</h1>
        <div class="user-xp-box" id="myXP">Calculando XP...</div>
    </div>
    <div class="store-grid" id="store-container"><p style="color:#888;">Cargando inventario de la tienda...</p></div>
    <a href="index.html" class="nav-back">< VOLVER AL HUB</a>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyC2vrauBlplKGMjeLW3mLzZQr05khmH5v0", authDomain: "scullylist.firebaseapp.com", databaseURL: "https://scullylist-default-rtdb.firebaseio.com", projectId: "scullylist" };
        firebase.initializeApp(firebaseConfig); const auth = firebase.auth(); const db = firebase.database();
        let myData = null, myXP = 0;

        auth.onAuthStateChanged(u => {
            if (u) {
                db.ref('/').on('value', s => {
                    const d = s.val() || {}; const pL = d.players || {}; const lvls = d.levels ? Object.values(d.levels) : [];
                    let key = Object.keys(pL).find(k => pL[k].email === u.email);
                    if(key) {
                        myData = pL[key]; let rXp = 0;
                        if(myData.completions) {
                            Object.values(myData.completions).forEach(c => { let idx = lvls.findIndex(x => x.name.toLowerCase() === c.level.toLowerCase()); rXp += idx > -1 ? Math.max(100-(idx*0.6),5)*(lvls[idx].bounty?2:1) : (c.xp||0); });
                        }
                        myXP = rXp + (myData.totalXP||0); document.getElementById('myXP').innerText = `Tu XP: ${myXP.toFixed(1)}`;
                    }
                });
            } else { document.getElementById('myXP').innerHTML = `<a href="login.html" style="color:var(--gold);">Inicia sesión para comprar</a>`; }
        });

        db.ref('market_items').on('value', s => {
            const items = s.val() || {}; let html = "";
            Object.values(items).forEach(i => { html += `<div class="item-card"><h3>${i.name}</h3><span class="price">${i.price} XP</span><button class="btn-buy" onclick="comprar('${i.name}', ${i.price})">COMPRAR</button></div>`; });
            document.getElementById('store-container').innerHTML = html || "<p style='color:#888;'>Tienda vacía.</p>";
        });

        function comprar(n, p) {
            if(!myData) return alert("Debes iniciar sesión.");
            if(myXP < p) return alert(`Te faltan ${(p - myXP).toFixed(1)} XP para este ítem.`);
            if(confirm(`¿Pedir ${n} por ${p} XP?`)) {
                db.ref('market_requests').push({ player: myData.name, itemName: n, price: p, time: Date.now() }).then(() => {
                    alert("¡Petición enviada al Staff!\nPronto te lo aprobarán y aparecerá en tu Perfil.");
                });
            }
        }
    </script>
</body>
</html>
