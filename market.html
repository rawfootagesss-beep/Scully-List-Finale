<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scully Market | Mercado de Prestigio</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@400;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #ff6600; --bg: #030303; --card: rgba(15,15,15,0.9); --border: rgba(255,255,255,0.05); }
        body { background: var(--bg); color: #fff; font-family: 'Lexend Deca'; margin: 0; text-align: center; }
        header { padding: 60px 20px 20px; }
        h1 { font-size: 3rem; margin: 0; text-transform: uppercase; font-weight: 800; letter-spacing: -1px; }
        .btn-scully { background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: #fff; padding: 12px 24px; text-decoration: none; font-size: 0.7rem; border-radius: 50px; font-weight: 600; display: inline-flex; align-items: center; gap: 10px; margin-top: 20px; cursor: pointer; transition: 0.3s; }
        .btn-scully:hover { background: var(--accent); color: #000; }
        .market-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; width: 95%; max-width: 1000px; margin: 40px auto; }
        .market-card { background: var(--card); border: 1px solid var(--border); padding: 40px; border-radius: 30px; transition: 0.3s; }
        .market-card:hover { border-color: var(--accent); transform: translateY(-10px); }
        .market-card i { font-size: 3rem; color: var(--accent); margin-bottom: 20px; }
        .xp-req { display: block; margin: 15px 0; color: #ffcc00; font-weight: 800; font-size: 0.9rem; }
    </style>
</head>
<body>
    <header>
        <h1>SCULLY <span style="color:var(--accent);">MARKET</span></h1>
        <a href="index.html" class="btn-scully">VOLVER AL HUB</a>
    </header>

    <div class="market-grid">
        <div class="market-card">
            <i class="fas fa-fire"></i><h3>Aura Fuego</h3><span class="xp-req">100 XP</span>
            <button class="btn-scully" style="width:100%; justify-content:center; margin-top:0; border-color:var(--accent); color:var(--accent);" onclick="buyItem('aura_fire', 100)">SOLICITAR</button>
        </div>
        <div class="market-card">
            <i class="fas fa-bolt"></i><h3>Aura Eléctrica</h3><span class="xp-req">150 XP</span>
            <button class="btn-scully" style="width:100%; justify-content:center; margin-top:0; border-color:var(--accent); color:var(--accent);" onclick="buyItem('aura_electric', 150)">SOLICITAR</button>
        </div>
        <div class="market-card">
            <i class="fas fa-rainbow"></i><h3>Nick Rainbow</h3><span class="xp-req">300 XP</span>
            <button class="btn-scully" style="width:100%; justify-content:center; margin-top:0; border-color:var(--accent); color:var(--accent);" onclick="buyItem('name_rainbow', 300)">SOLICITAR</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://scullylist-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const savedColor = localStorage.getItem('scully-theme-color') || '#ff6600';
        document.documentElement.style.setProperty('--accent', savedColor);
        
        let fullData = {};
        db.ref('/').on('value', s => fullData = s.val() || {});

        // NUEVO MOTOR DE CÁLCULO DE XP (Fusión de Datos)
        function buyItem(item, cost) {
            const n = prompt("Escribe tu Nickname:"); 
            if(!n) return;
            
            const nickL = n.toLowerCase();
            const p = Object.values(fullData.players || {}).find(x => x.name.toLowerCase() === nickL);
            const lvls = fullData.levels || [];
            
            let uniqueLevels = new Set();
            
            // Sumar Niveles Verificados
            lvls.forEach(l => { if(l.first?.toLowerCase() === nickL) uniqueLevels.add(l.name); });
            // Sumar Niveles Completados
            p?.completions?.forEach(c => uniqueLevels.add(c.level));
            
            let pts = 0;
            uniqueLevels.forEach(name => {
                const idx = lvls.findIndex(l => l.name === name);
                if(idx > -1) pts += parseFloat(Math.max(100 - (idx * 0.6), 5));
            });

            if(!p && uniqueLevels.size === 0) return alert("Jugador no encontrado.");
            
            if(pts < cost) {
                return alert(`XP insuficiente. Tienes ${pts.toFixed(1)} XP y necesitas ${cost} XP.`);
            }

            db.ref('market_requests').push({ nick: p?.name || n, item: item, cost: cost });
            alert("¡Solicitud enviada al Staff con éxito!");
        }
    </script>
</body>
</html>
