<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado XP | Hub OMNI</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@800&family=Lexend+Deca:wght@400;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #030303; --card: rgba(15,15,15,0.9); --gold: #ffd700; --cyan: #00ffff; --border: rgba(255,255,255,0.1); }
        body { background: var(--bg); color: #fff; font-family: 'Lexend Deca', sans-serif; margin: 0; padding: 20px; text-align: center; }
        
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            background: var(--card); padding: 20px; border-radius: 20px; 
            border: 1px solid var(--border); max-width: 1000px; margin: 0 auto 30px; 
            flex-wrap: wrap; gap: 15px; 
        }
        .header h1 { margin: 0; font-size: 1.5rem; color: var(--gold); text-transform: uppercase; font-weight: 800; font-family: 'JetBrains Mono'; }
        
        .user-xp-box { background: rgba(255,215,0,0.1); border: 1px solid var(--gold); padding: 10px 20px; border-radius: 10px; font-weight: 800; color: var(--gold); }
        
        .store-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .item-card { background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 20px; transition: 0.3s; position: relative; overflow: hidden; }
        .item-card:hover { border-color: var(--gold); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(255,215,0,0.2); }
        
        .item-card img { width: 80px; height: 80px; margin-bottom: 15px; object-fit: cover; }
        .item-card h3 { margin: 0 0 10px; font-size: 1.4rem; color: #fff; font-family: 'JetBrains Mono'; text-transform: uppercase; }
        .item-card .price { font-size: 1.2rem; color: var(--gold); font-weight: 800; margin-bottom: 20px; display: block; }
        
        .btn-buy { background: var(--gold); color: #000; border: none; padding: 12px 25px; border-radius: 50px; font-weight: 800; cursor: pointer; transition: 0.3s; width: 100%; font-size: 0.9rem; text-transform: uppercase; }
        .btn-buy:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(255,215,0,0.5); }
        
        .nav-back { display: inline-block; color: var(--cyan); text-decoration: none; font-weight: 800; margin-top: 30px; font-family: 'JetBrains Mono'; }
        
        #btn-restore { background: #ff3333; color: #fff; border: none; padding: 10px 20px; border-radius: 10px; font-weight: 800; cursor: pointer; margin-top: 20px; display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fas fa-shopping-cart"></i> Mercado OMNI</h1>
        <div class="user-xp-box" id="myXP">XP Disponible: CARGANDO...</div>
    </div>

    <button id="btn-restore" onclick="restaurarCatalogo()"><i class="fas fa-sync"></i> RESTAURAR CATÁLOGO (ADMIN)</button>

    <div class="store-grid" id="store-container" style="margin-top: 20px;">
        <p style="color:#888;">Conectando con la base de datos de la tienda...</p>
    </div>

    <a href="index.html" class="nav-back"><i class="fas fa-arrow-left"></i> VOLVER AL HUB</a>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyC2vrauBlplKGMjeLW3mLzZQr05khmH5v0", 
            authDomain: "scullylist.firebaseapp.com", 
            databaseURL: "https://scullylist-default-rtdb.firebaseio.com", 
            projectId: "scullylist" 
        };
        firebase.initializeApp(firebaseConfig); 
        const auth = firebase.auth(); 
        const db = firebase.database();

        let currentUserData = null;
        let myTotalXP = 0;

        auth.onAuthStateChanged(user => {
            if (user) {
                db.ref('players').on('value', snap => {
                    const players = snap.val() || {};
                    let me = null;

                    db.ref('levels').once('value').then(lSnap => {
                        const levelList = lSnap.val() ? Object.values(lSnap.val()) : [];
                        
                        for (let key in players) {
                            if (players[key].email === user.email) {
                                me = players[key];
                                break;
                            }
                        }

                        if (me) {
                            currentUserData = me;
                            
                            // Mostrar botón de restaurar solo si eres Owner/Admin
                            if(me.role === 'owner' || me.role === 'admin' || me.name.toLowerCase() === 'score') {
                                document.getElementById('btn-restore').style.display = "inline-block";
                            }

                            // Calcular XP Real
                            let realXp = 0;
                            let comps = me.completions ? Object.values(me.completions) : [];
                            
                            comps.forEach(c => {
                                let idx = levelList.findIndex(x => x.name.toLowerCase() === c.level.toLowerCase());
                                if(idx > -1) { 
                                    realXp += Math.max(100 - (idx * 0.6), 5) * (levelList[idx].bounty ? 2 : 1); 
                                } else { 
                                    realXp += c.xp || 0; 
                                }
                            });

                            myTotalXP = realXp + (me.totalXP || 0);
                            document.getElementById('myXP').innerText = `XP Disponible: ${myTotalXP.toFixed(1)}`;
                        }
                    });
                });
            } else {
                document.getElementById('myXP').innerHTML = `<a href="login.html" style="color:var(--gold);">Inicia sesión para comprar</a>`;
            }
        });

        // CARGAR LOS ÍTEMS
        db.ref('market_items').on('value', snap => {
            const items = snap.val() || {};
            let html = "";
            
            Object.values(items).forEach(item => {
                let imgHtml = item.img ? `<img src="${item.img}">` : `<i class="fas fa-gem" style="font-size:3rem; color:var(--gold); margin-bottom:15px;"></i>`;
                
                html += `
                <div class="item-card">
                    ${imgHtml}
                    <h3>${item.name}</h3>
                    <span class="price">${item.price} XP</span>
                    <button class="btn-buy" onclick="solicitarCompra('${item.name}', ${item.price})">COMPRAR</button>
                </div>`;
            });
            
            document.getElementById('store-container').innerHTML = html || "<p style='color:#888; width:100%;'>La tienda está vacía.</p>";
        });

        // ENVIAR PETICIÓN DE COMPRA
        function solicitarCompra(nombreItem, precioItem) {
            if (!currentUserData || !currentUserData.name) {
                return alert("Error: Debes iniciar sesión para comprar.");
            }
            if (myTotalXP < precioItem) {
                return alert(`Operación Denegada: Te faltan ${(precioItem - myTotalXP).toFixed(1)} XP para comprar esto.`);
            }

            if(confirm(`¿Deseas enviar la petición de compra por ${nombreItem}? Cuesta ${precioItem} XP.`)) {
                db.ref('market_requests').push({
                    player: currentUserData.name,
                    itemName: nombreItem,
                    price: precioItem,
                    time: Date.now()
                }).then(() => {
                    alert("¡Petición enviada al Equipo Staff!\nUn administrador la aprobará pronto y aparecerá en tu Perfil.");
                });
            }
        }

        // FUNCIÓN DEL BOTÓN SECRETO PARA RESTAURAR CATÁLOGO
        function restaurarCatalogo() {
            if(confirm("¿Restaurar todo el catálogo con los nuevos cosméticos baratos y el Rainbow?")) {
                const nuevoCatalogo = [
                    { name: "EFECTO FANTASMA", price: 15, img: "https://i.imgur.com/gK0r8Mh.png" },
                    { name: "EFECTO HIELO", price: 25, img: "https://i.imgur.com/O6LWeU9.png" },
                    { name: "EFECTO FUEGO", price: 35, img: "https://i.imgur.com/Kz8uYFw.png" },
                    { name: "TITULO VIP", price: 50, img: "https://i.imgur.com/0gG1V1H.png" },
                    { name: "TEXTO HACKER", price: 75, img: "https://i.imgur.com/lZ2wG7n.png" },
                    { name: "AURA DEMONIACA", price: 100, img: "https://i.imgur.com/3q1b8Z2.png" },
                    { name: "NOMBRE RAINBOW", price: 200, img: "https://i.imgur.com/8Q6W6u1.png" }
                ];
                db.ref('market_items').set(nuevoCatalogo).then(() => {
                    alert("¡Catálogo restaurado exitosamente!");
                });
            }
        }
    </script>
</body>
</html>
