<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>OMNI | Mercado</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&family=Lexend+Deca:wght@400;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --gold: #ffd700; --red: #ff3333; --cyan: #00ffff; --border: rgba(255,255,255,0.1); }
        body { background: var(--bg); color: #fff; font-family: 'Lexend Deca', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 40px; border-bottom: 1px solid var(--gold); padding-bottom: 20px; }
        h1 { color: var(--gold); text-transform: uppercase; font-size: 2.5rem; margin: 0; }
        
        /* PANEL DE ADMIN OCULTO */
        #admin-panel { display: none; background: rgba(255,51,51,0.1); border: 1px dashed var(--red); padding: 20px; border-radius: 10px; margin-bottom: 30px; }
        .admin-title { color: var(--red); margin-top: 0; font-family: 'JetBrains Mono'; text-transform: uppercase; }
        .admin-inputs { display: flex; gap: 10px; flex-wrap: wrap; }
        .g-input { flex: 1; background: #000; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 5px; outline: none; }
        .btn-admin { background: var(--red); color: #fff; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 5px; }

        /* GRID DE PRODUCTOS */
        .market-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .item-card { background: #111; border: 1px solid var(--border); padding: 20px; border-radius: 10px; text-align: center; transition: 0.3s; position: relative; overflow: hidden; }
        .item-card:hover { border-color: var(--gold); transform: translateY(-5px); box-shadow: 0 5px 20px rgba(255,215,0,0.2); }
        .item-price { color: var(--gold); font-size: 1.5rem; font-weight: 800; margin: 15px 0; }
        .btn-buy { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 10px 20px; width: 100%; cursor: pointer; transition: 0.3s; border-radius: 5px; }
        .btn-buy:hover { background: var(--gold); color: #000; }
        
        .user-wallet { background: #111; padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 20px; border: 1px solid var(--cyan); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="index.html" style="color:#aaa; text-decoration:none; font-size:0.8rem; float:left;"><i class="fas fa-arrow-left"></i> VOLVER AL HUB</a>
            <h1><i class="fas fa-shopping-cart"></i> Suministros OMNI</h1>
            <p style="color:#888;">Gasta tu XP en mejoras y cosméticos para tu perfil.</p>
        </header>

        <div class="user-wallet">
            <h3 style="margin:0; color:var(--cyan);">TU BILLETERA: <span id="wallet-xp">CARGANDO...</span> XP</h3>
        </div>

        <div id="admin-panel">
            <h3 class="admin-title"><i class="fas fa-terminal"></i> Terminal Comercial (Admin)</h3>
            <div class="admin-inputs">
                <input type="text" id="add-name" class="g-input" placeholder="Nombre del Ítem (Ej: Aura Neón)">
                <input type="number" id="add-price" class="g-input" placeholder="Precio en XP">
                <select id="add-type" class="g-input" style="max-width: 150px;">
                    <option value="cosmetic">Cosmético</option>
                    <option value="perk">Ventaja</option>
                </select>
                <button class="btn-admin" onclick="addNewItem()"><i class="fas fa-plus"></i> PUBLICAR</button>
            </div>
        </div>

        <div class="market-grid" id="store-items">
            <p style="text-align:center; color:#555; grid-column:1/-1;">Sincronizando con la red comercial...</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    
    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyC2vrauBlplKGMjeLW3mLzZQr05khmH5v0", 
            authDomain: "scullylist.firebaseapp.com", 
            databaseURL: "https://scullylist-default-rtdb.firebaseio.com", 
            projectId: "scullylist", 
            storageBucket: "scullylist.firebasestorage.app", 
            messagingSenderId: "498548914021", 
            appId: "1:498548914021:web:59128b5e06b36a4e81938c" 
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.database();
        let currentUser = null;

        // VERIFICAR AUTENTICACIÓN Y ROL DE ADMIN
        auth.onAuthStateChanged(user => {
            if(user) {
                db.ref('players').once('value').then(snap => {
                    const players = snap.val();
                    for(let key in players) {
                        if(players[key].email === user.email) {
                            currentUser = { ...players[key], key: key };
                            document.getElementById('wallet-xp').innerText = currentUser.totalXP || 0;
                            
                            // SI ES ADMIN, MOSTRAR EL PANEL DE CREACIÓN DE ÍTEMS
                            if(currentUser.role === 'admin' || currentUser.name.toLowerCase() === 'score') {
                                document.getElementById('admin-panel').style.display = 'block';
                            }
                            break;
                        }
                    }
                });
            } else {
                document.getElementById('wallet-xp').innerText = "NO LOGUEADO";
            }
        });

        // LÓGICA DEL PANEL ADMIN: Añadir ítem a la tienda
        function addNewItem() {
            let name = document.getElementById('add-name').value.trim();
            let price = parseInt(document.getElementById('add-price').value);
            let type = document.getElementById('add-type').value;

            if(!name || !price) return alert("Faltan datos del producto.");
            
            db.ref('market_items').push({ name: name, price: price, type: type, active: true });
            alert("Ítem añadido al mercado global.");
            
            document.getElementById('add-name').value = "";
            document.getElementById('add-price').value = "";
        }

        // RENDERIZAR TIENDA EN TIEMPO REAL
        db.ref('market_items').on('value', snap => {
            const items = snap.val() || {};
            let html = "";
            for(let key in items) {
                if(items[key].active) {
                    html += `
                    <div class="item-card">
                        <i class="fas fa-box" style="font-size:3rem; color:#444; margin-bottom:10px;"></i>
                        <h3 style="margin:0; text-transform:uppercase;">${items[key].name}</h3>
                        <div class="item-price">${items[key].price} XP</div>
                        <button class="btn-buy" onclick="buyItem('${key}', '${items[key].name}', ${items[key].price})">
                            <i class="fas fa-shopping-cart"></i> COMPRAR
                        </button>
                    </div>`;
                }
            }
            document.getElementById('store-items').innerHTML = html || "<p style='grid-column:1/-1; text-align:center;'>Mercado vacío.</p>";
        });

        // LÓGICA DE COMPRA
        function buyItem(itemKey, itemName, price) {
            if(!currentUser) return alert("Debes iniciar sesión.");
            if((currentUser.totalXP || 0) < price) return alert("No tienes suficiente XP.");
            
            if(confirm(`¿Comprar ${itemName} por ${price} XP?`)) {
                let newXP = currentUser.totalXP - price;
                db.ref(`players/${currentUser.key}/totalXP`).set(newXP);
                db.ref(`players/${currentUser.key}/inventory`).push({ itemName: itemName, boughtAt: Date.now() });
                alert(`¡Compra exitosa! ${itemName} añadido a tu inventario.`);
            }
        }
    </script>
</body>
</html>
