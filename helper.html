<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scully | Helper Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --accent: #66fcf1; --accent-grad: linear-gradient(135deg, var(--accent) 0%, #45a29e 100%);
            --bg: #030303; --card-bg: rgba(15, 15, 15, 0.85);
            --glow: 0 0 25px rgba(102, 252, 241, 0.3); --border: rgba(255, 255, 255, 0.05);
            --green: #45a29e; --red: #f05454; --blue: #66fcf1;
        }
        
        body { background: var(--bg); color: #fff; font-family: 'Lexend Deca', sans-serif; margin: 0; padding: 20px; overflow-x: hidden; display: none; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        .admin-header { display: flex; justify-content: space-between; align-items: center; background: var(--card-bg); padding: 25px 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid var(--border); margin-bottom: 35px; flex-wrap: wrap; gap: 15px; }
        .admin-header h1 { font-size: 1.8rem; margin: 0; color: #fff; font-weight: 800; letter-spacing: -1px; text-transform: uppercase; }
        .admin-header h1 span { background: var(--accent-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-controls { display: flex; align-items: center; gap: 15px; }
        .btn-return { background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: #fff; padding: 12px 25px; text-decoration: none; font-size: 0.75rem; border-radius: 50px; font-weight: 600; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; text-transform: uppercase; }
        .btn-return:hover { background: var(--accent); color: #000; border-color: var(--accent); box-shadow: var(--glow); transform: translateY(-2px); }

        #scullyToast { visibility: hidden; min-width: 250px; background-color: var(--green); color: #000; text-align: center; border-radius: 15px; padding: 15px 20px; position: fixed; z-index: 9999; left: 50%; bottom: 30px; font-weight: 800; font-size: 0.8rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: 0.4s; transform: translate(-50%, 50px); opacity: 0; }
        #scullyToast.show { visibility: visible; transform: translate(-50%, 0); opacity: 1; }

        .admin-dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 25px; align-items: start; }
        .admin-panel { background: var(--card-bg); border-radius: 25px; border: 1px solid var(--border); box-shadow: 0 10px 25px rgba(0,0,0,0.3); display: flex; flex-direction: column; max-height: 700px; overflow: hidden; transition: 0.3s; }
        .admin-panel:hover { border-color: rgba(102,252,241,0.2); box-shadow: 0 10px 35px rgba(102,252,241,0.1); }
        .panel-header { background: rgba(0,0,0,0.4); padding: 20px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .panel-header h2 { font-size: 0.9rem; text-transform: uppercase; color: #fff; margin: 0; font-weight: 800; display: flex; align-items: center; gap: 10px; letter-spacing: 0.5px; }
        .panel-header h2 i { color: var(--accent); }
        .panel-content { padding: 25px; overflow-y: auto; flex-grow: 1; }
        
        input { width: 100%; background: #000; border: 1px solid #222; color: #fff; padding: 15px; border-radius: 15px; margin-bottom: 15px; font-family: 'Lexend Deca'; font-size: 0.8rem; transition: 0.3s; outline: none; box-sizing: border-box; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(102,252,241,0.2); }
        button { width: 100%; font-family: 'Lexend Deca'; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; border: none; padding: 15px; border-radius: 15px; margin-bottom: 12px; transition: 0.3s; font-size: 0.75rem; }
        button:hover { transform: translateY(-2px); filter: brightness(1.15); }
        
        .btn-blue { background: transparent; color: var(--blue); border: 1px solid var(--blue); }
        .btn-blue:hover { background: var(--blue); color: #000; box-shadow: 0 5px 15px rgba(102,252,241,0.3); }
        .btn-red { background: transparent; color: var(--red); border: 1px solid var(--red); }
        .btn-red:hover { background: var(--red); color: #000; box-shadow: 0 5px 15px rgba(240,84,84,0.3); }
        .btn-green { background: transparent; color: var(--green); border: 1px solid var(--green); }
        .btn-green:hover { background: var(--green); color: #000; box-shadow: 0 5px 15px rgba(69,162,158,0.3); }

        .sub-card { background: rgba(0,0,0,0.4); padding: 20px; border-radius: 20px; margin-bottom: 20px; border-left: 4px solid var(--accent); font-size: 0.8rem; border-top: 1px solid var(--border); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        .proof-box { display: flex; gap: 10px; margin: 15px 0; }
        .btn-proof { flex: 1; text-decoration: none; text-align: center; font-size: 0.7rem; font-weight: 800; padding: 10px; border-radius: 12px; transition: 0.3s; }
        .proof-yt { background: transparent; color: var(--red); border: 1px solid var(--red); }
        .proof-yt:hover { background: var(--red); color: #000; }
        .proof-raw { background: transparent; color: var(--blue); border: 1px solid var(--blue); }
        .proof-raw:hover { background: var(--blue); color: #000; }
        .flex-row { display: flex; gap: 12px; }
        .flex-row button { margin-bottom: 0; }
    </style>
</head>
<body>
    <div id="scullyToast"><i class="fas fa-check-circle"></i> Mensaje</div>

    <header class="admin-header">
        <h1>SCULLY <span>HELPER PANEL</span></h1>
        <div class="header-controls">
            <input type="text" id="globalStaffSign" placeholder="Tu Firma" style="margin:0; width: 220px; border-color:var(--accent); background:#000;" readonly>
            <a href="index.html" class="btn-return"><i class="fas fa-arrow-left"></i> Volver al Hub</a>
        </div>
    </header>
    
    <div class="admin-dashboard">
        <div class="admin-panel" style="grid-column: span 2;">
            <div class="panel-header"><h2><i class="fas fa-shield-alt"></i> Moderación de Récords</h2></div>
            <div class="panel-content" id="submissionsList" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px;"></div>
        </div>
        
        <div class="admin-panel">
            <div class="panel-header"><h2><i class="fas fa-shopping-cart"></i> Tienda (Mercado)</h2></div>
            <div class="panel-content" id="marketSubList"></div>
        </div>
        
        <div class="admin-panel">
            <div class="panel-header"><h2><i class="fas fa-image"></i> Solicitudes PFP</h2></div>
            <div class="panel-content" id="pfpSubList"></div>
        </div>

        <div class="admin-panel" style="border-color: rgba(102,252,241,0.3);">
            <div class="panel-header" style="background: rgba(102,252,241,0.05);"><h2 style="color:var(--blue);"><i class="fab fa-youtube"></i> Auditoría YT Manual</h2></div>
            <div class="panel-content">
                <p style="font-size:0.8rem; color:#888; margin-top:0; margin-bottom:20px;">Compara dos videos y mira cuál se subió primero.</p>
                <input type="text" id="audit1" placeholder="Link YT del Jugador A">
                <input type="text" id="audit2" placeholder="Link YT del Jugador B">
                <button onclick="analyzeYT()" class="btn-blue"><i class="fas fa-search"></i> ANALIZAR FECHAS</button>
                <div id="auditResult" style="margin-top:20px; font-size:0.8rem; padding:20px; background:#000; border:1px solid #222; border-radius:15px; line-height:1.6;">Esperando links para auditar...</div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    
    <script>
        const firebaseConfig = { apiKey: "AIzaSyC2vrauBlplKGMjeLW3mLzZQr05khmH5v0", authDomain: "scullylist.firebaseapp.com", databaseURL: "https://scullylist-default-rtdb.firebaseio.com", projectId: "scullylist", storageBucket: "scullylist.firebasestorage.app", messagingSenderId: "498548914021", appId: "1:498548914021:web:59128b5e06b36a4e81938c", measurementId: "G-X3JF2DVWYH" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        let fullData = {};
        const YT_API_KEY = "AIzaSyCLeUZ_mJxJHuCCLr-GMkMdy0q-JHTUi7w";

        // PROTECCIÓN AUTOMÁTICA HELPER
        auth.onAuthStateChanged(user => {
            if(!user) return location.href = 'index.html';
            db.ref('players').once('value', snap => {
                const players = Object.values(snap.val() || {});
                const me = players.find(p => p.email === user.email);
                if(me && (me.role === 'helper' || me.role === 'admin')) {
                    document.body.style.display = "block";
                    document.getElementById('globalStaffSign').value = me.name; 
                } else {
                    location.href = 'index.html';
                }
            });
        });

        function showToast(message, isError = false) { const toast = document.getElementById("scullyToast"); toast.innerHTML = isError ? `<i class="fas fa-times-circle"></i> ${message}` : `<i class="fas fa-check-circle"></i> ${message}`; toast.style.backgroundColor = isError ? "var(--red)" : "var(--green)"; toast.className = "show"; setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3500); }

        db.ref('/').on('value', (s) => {
            fullData = s.val() || {}; 
            let lvls = fullData.levels ? (Array.isArray(fullData.levels) ? fullData.levels : Object.values(fullData.levels)) : []; lvls = lvls.filter(l => l && l.name); fullData.levels = lvls;
            renderSubmissions(fullData.submissions || {}); renderMarketModeration(fullData.market_requests || {}); renderPFPModeration(fullData.pfp_requests || {}); 
        });

        function extractYTId(url) { let match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))([^&?\n]+)/); return match ? match[1] : (url.length === 11 ? url : null); }
        async function getYTDate(id) { if(!id) return null; try { const res = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${id}&key=${YT_API_KEY}`); const data = await res.json(); if(data.items && data.items.length > 0) return data.items[0].snippet.publishedAt; } catch(e) { console.error("Error YT API:", e); } return null; }
        async function analyzeYT() { const v1 = extractYTId(document.getElementById('audit1').value); const v2 = extractYTId(document.getElementById('audit2').value); const resBox = document.getElementById('auditResult'); if(!v1 || !v2) return showToast("Faltan links para comparar", true); resBox.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Analizando servidores...'; const d1Str = await getYTDate(v1); const d2Str = await getYTDate(v2); if(!d1Str || !d2Str) { resBox.innerHTML = "<span style='color:var(--red)'><i class='fas fa-exclamation-triangle'></i> Error: Video no existe o privado.</span>"; return; } const d1 = new Date(d1Str); const d2 = new Date(d2Str); let winner = d1 < d2 ? "Video Jugador A" : (d2 < d1 ? "Video Jugador B" : "Empate"); resBox.innerHTML = `<div style="margin-bottom:8px;"><b>Jugador A:</b> <span style="color:#ccc">${d1.toLocaleString()}</span></div><div style="margin-bottom:12px;"><b>Jugador B:</b> <span style="color:#ccc">${d2.toLocaleString()}</span></div><div style="color:var(--blue); font-weight:800; border-top:1px solid #222; padding-top:10px;"><i class="fas fa-trophy"></i> Antiguo: ${winner}</div>`; }

        function renderSubmissions(submissionsObj) { let html = ""; const entries = Object.entries(submissionsObj); if(entries.length === 0) { document.getElementById('submissionsList').innerHTML = `<p style="grid-column: span 2; text-align:center; color:#555; font-size:0.8rem; margin-top:40px;"><i class="fas fa-glass-cheers fa-2x"></i><br><br>No hay récords pendientes.</p>`; return; } for(let i = 0; i < entries.length; i++) { const sub = entries[i][1]; html += `<div class="sub-card" style="margin-bottom:0;"><span style="color:#fff; font-weight:800; font-size:0.9rem;">${sub.player}</span> <i class="fas fa-caret-right" style="color:var(--accent); margin:0 5px;"></i> ${sub.level}<div class="proof-box"><a href="${sub.link}" target="_blank" class="btn-proof proof-yt"><i class="fab fa-youtube"></i> VER YT</a><a href="${sub.raw}" target="_blank" class="btn-proof proof-raw"><i class="fab fa-google-drive"></i> RAW</a></div><div class="flex-row"><button id="btn-ok-${entries[i][0]}" onclick="setStatus('${entries[i][0]}','Aceptado')" class="btn-green" style="background:var(--green); color:#000;"><i class="fas fa-check"></i></button><button onclick="setStatus('${entries[i][0]}','Rechazado')" class="btn-red"><i class="fas fa-times"></i></button></div></div>`; } document.getElementById('submissionsList').innerHTML = html; }
        
        async function setStatus(key, status) { 
            const staff = document.getElementById('globalStaffSign').value; if(!staff) return;
            const sub = fullData.submissions[key]; 
            if(status === 'Aceptado') { 
                const btnOk = document.getElementById(`btn-ok-${key}`); if(btnOk) { btnOk.innerHTML = '<i class="fas fa-spinner fa-spin"></i>'; btnOk.disabled = true; }
                try { const subVid = extractYTId(sub.link); const lvlIdx = fullData.levels.findIndex(l => l.name === sub.level); if (lvlIdx > -1 && subVid) { const lvlVid = fullData.levels[lvlIdx].id; if(lvlVid && subVid !== lvlVid) { const subDateStr = await getYTDate(subVid); const lvlDateStr = await getYTDate(lvlVid); if (subDateStr && lvlDateStr && (new Date(subDateStr) < new Date(lvlDateStr))) { if(confirm(`⚠️ ¡NUEVO FIRST VICTOR!\n¿Coronar automáticamente?`)) { db.ref(`levels/${lvlIdx}/first`).set(sub.player); db.ref(`levels/${lvlIdx}/id`).set(subVid); showToast(`${sub.player} es el nuevo First Victor`); } } } } } catch(e) { console.log("Auditoría auto fallida", e); }
                db.ref('players').once('value', v => { let p = Object.values(v.val() || {}); let i = p.findIndex(u => u.name.toLowerCase() === sub.player.toLowerCase()); if(i > -1) { let cArr = p[i].completions ? (Array.isArray(p[i].completions) ? p[i].completions : Object.values(p[i].completions)) : []; cArr.push({level: sub.level, link: sub.link}); p[i].completions = cArr; } else { p.push({ name: sub.player, country: sub.country || 'es', completions: [{level: sub.level, link: sub.link}] }); } db.ref('players').set(p); }); 
                db.ref('history').push({...sub, status: 'Aceptado'}); db.ref('logs').push({type: 'accept', msg: `✅ ${sub.player} -> ${sub.level} (${staff})`}); showToast("Récord Aceptado");
            } else { db.ref('history').push({...sub, status: 'Rechazado'}); db.ref('logs').push({type: 'reject', msg: `❌ ${sub.player} RECHAZADO (${staff})`}); showToast("Récord Rechazado", true); }
            db.ref('submissions/' + key).remove(); 
        }

        function renderMarketModeration(m) { let html = ""; Object.entries(m).forEach(([k,v]) => html += `<div class="sub-card" style="border-left-color:var(--green);"><span style="color:var(--green); font-weight:800;">${v.nick}</span> pide <b style="color:#fff">${v.item}</b><button onclick="approveCosmetic('${k}')" class="btn-green" style="margin-top:15px; background:var(--green); color:#000;"><i class="fas fa-check"></i> APROBAR</button></div>`); document.getElementById('marketSubList').innerHTML = html || `<p style="text-align:center; color:#555; font-size:0.8rem; margin-top:20px;">Sin pedidos.</p>`; }
        function approveCosmetic(k) { const r = fullData.market_requests[k]; db.ref('players').once('value', s => { let p = Object.values(s.val()); let i = p.findIndex(x => x.name === r.nick); if(i > -1) { if(!p[i].cosmetics) p[i].cosmetics = {}; p[i].cosmetics[r.item] = true; db.ref('players').set(p); db.ref('market_requests/' + k).remove(); showToast("Compra Aprobada"); } }); }
        
        function renderPFPModeration(pObj) { let html = ""; Object.entries(pObj).forEach(([k,v]) => html += `<div class="sub-card" style="text-align:center; border-left-color:var(--blue);"><b style="color:var(--blue); font-size:1rem;">${v.nick}</b><br><img src="${v.url}" style="width:70px;height:70px;border-radius:50%; margin:15px 0; object-fit:cover; border:2px solid var(--blue);"><button onclick="approvePFP('${k}')" class="btn-blue" style="background:var(--blue); color:#000;"><i class="fas fa-check"></i> APROBAR</button></div>`); document.getElementById('pfpSubList').innerHTML = html || `<p style="text-align:center; color:#555; font-size:0.8rem; margin-top:20px;">Sin solicitudes.</p>`; }
        function approvePFP(k) { const r = fullData.pfp_requests[k]; db.ref('players').once('value', s => { let p = Object.values(s.val()); let i = p.findIndex(x => x.name === r.nick); if(i > -1) { p[i].pfp = r.url; db.ref('players').set(p); db.ref('pfp_requests/' + k).remove(); showToast("PFP Aprobada"); } }); }
    </script>
</body>
</html>
