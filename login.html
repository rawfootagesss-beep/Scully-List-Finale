<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scully List | Acceso de Jugador</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg: #0b0c10; --card: #1f2833; --border: rgba(255,255,255,0.05);
            --text-main: #c5c6c7; --text-light: #ffffff;
            --accent: #ff6600; --accent-hover: #ff8533;
            --blue: #66fcf1; --red: #f05454;
        }
        body { background: var(--bg); color: var(--text-main); font-family: 'Lexend Deca', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; }
        
        .login-container { background: var(--card); padding: 40px; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); border: 1px solid var(--border); width: 100%; max-width: 400px; text-align: center; position: relative; overflow: hidden; }
        .login-container::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: linear-gradient(90deg, var(--accent), var(--blue)); }
        
        h1 { color: var(--text-light); font-size: 1.8rem; margin-top: 0; margin-bottom: 10px; font-weight: 800; letter-spacing: -1px; text-transform: uppercase; }
        h1 span { color: var(--accent); }
        p.subtitle { font-size: 0.8rem; margin-bottom: 30px; color: #888; }

        input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: var(--text-light); padding: 15px; border-radius: 12px; margin-bottom: 15px; font-family: 'Lexend Deca'; font-size: 0.85rem; transition: 0.3s; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(255,102,0,0.2); }
        
        button { width: 100%; padding: 15px; border-radius: 12px; font-family: 'Lexend Deca'; font-weight: 800; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.3s; border: none; margin-bottom: 10px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        button:hover { transform: translateY(-3px); }
        
        .btn-primary { background: var(--accent); color: #000; box-shadow: 0 5px 15px rgba(255,102,0,0.3); }
        .btn-secondary { background: transparent; color: var(--blue); border: 1px solid var(--blue); }
        .btn-secondary:hover { background: rgba(102,252,241,0.1); }
        
        .btn-return { color: #888; text-decoration: none; font-size: 0.75rem; margin-top: 20px; display: inline-block; transition: 0.3s; }
        .btn-return:hover { color: var(--text-light); }

        #errorMsg { color: var(--red); font-size: 0.75rem; margin-bottom: 15px; min-height: 15px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>Identidad <span>Scully</span></h1>
        <p class="subtitle">Inicia sesión o crea una cuenta para personalizar tu perfil, enlazar tus redes y gestionar tus récords.</p>
        
        <div id="errorMsg"></div>

        <input type="email" id="email" placeholder="Correo Electrónico" required>
        <input type="password" id="password" placeholder="Contraseña (Mín. 6 caracteres)" required>
        
        <button onclick="loginUser()" class="btn-primary"><i class="fas fa-sign-in-alt"></i> INICIAR SESIÓN</button>
        <button onclick="registerUser()" class="btn-secondary"><i class="fas fa-user-plus"></i> CREAR CUENTA NUEVA</button>
        
        <a href="index.html" class="btn-return"><i class="fas fa-arrow-left"></i> Volver al Hub Principal</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    
    <script>
        // CONFIGURACIÓN EXACTA DE SCORE
        const firebaseConfig = {
            apiKey: "AIzaSyC2vrauBlplKGMjeLW3mLzZQr05khmH5v0",
            authDomain: "scullylist.firebaseapp.com",
            databaseURL: "https://scullylist-default-rtdb.firebaseio.com",
            projectId: "scullylist",
            storageBucket: "scullylist.firebasestorage.app",
            messagingSenderId: "498548914021",
            appId: "1:498548914021:web:59128b5e06b36a4e81938c",
            measurementId: "G-X3JF2DVWYH"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        const emailInput = document.getElementById('email');
        const passInput = document.getElementById('password');
        const errorMsg = document.getElementById('errorMsg');

        // Si ya está logueado, mandarlo directo a su perfil
        auth.onAuthStateChanged(user => {
            if (user) { window.location.href = "perfil.html"; }
        });

        function loginUser() {
            const email = emailInput.value;
            const pass = passInput.value;
            if(!email || !pass) return errorMsg.innerText = "Por favor, llena ambos campos.";
            
            errorMsg.style.color = "var(--blue)";
            errorMsg.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Conectando...';

            auth.signInWithEmailAndPassword(email, pass)
                .then(() => { window.location.href = "perfil.html"; })
                .catch((error) => {
                    errorMsg.style.color = "var(--red)";
                    errorMsg.innerText = traducirError(error.code);
                });
        }

        function registerUser() {
            const email = emailInput.value;
            const pass = passInput.value;
            if(!email || !pass) return errorMsg.innerText = "Por favor, llena ambos campos para registrarte.";
            if(pass.length < 6) return errorMsg.innerText = "La contraseña debe tener al menos 6 caracteres.";

            errorMsg.style.color = "var(--blue)";
            errorMsg.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creando identidad...';

            auth.createUserWithEmailAndPassword(email, pass)
                .then(() => { window.location.href = "perfil.html"; })
                .catch((error) => {
                    errorMsg.style.color = "var(--red)";
                    errorMsg.innerText = traducirError(error.code);
                });
        }

        function traducirError(code) {
            switch(code) {
                case 'auth/invalid-email': return "El formato del correo es inválido.";
                case 'auth/user-not-found': return "No existe una cuenta con ese correo.";
                case 'auth/wrong-password': return "Contraseña incorrecta.";
                case 'auth/email-already-in-use': return "Ese correo ya está registrado. Inicia sesión.";
                default: return "Error de autenticación. Inténtalo de nuevo.";
            }
        }
    </script>
</body>
</html>
