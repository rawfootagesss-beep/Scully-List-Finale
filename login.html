<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI | Acceso al Sistema</title>
    
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&family=Lexend+Deca:wght@300;400;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg: #030303; --accent: #ff6600; --cyan: #00ffff; --border: rgba(255, 255, 255, 0.1); }
        body { background: var(--bg); color: #fff; font-family: 'Lexend Deca', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; flex-direction: column; padding: 20px; }
        
        .auth-container { background: #0a0a0a; border: 1px solid var(--border); border-radius: 20px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); text-align: center; position: relative; overflow: hidden; }
        .auth-container::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, transparent, var(--accent), transparent); }
        
        h1 { font-family: 'JetBrains Mono'; margin: 0 0 10px; color: #fff; font-size: 2rem; text-transform: uppercase; }
        h1 span { color: var(--accent); }
        p.subtitle { color: #888; font-size: 0.85rem; margin-bottom: 30px; }

        .g-input { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 10px; font-family: inherit; font-size: 0.95rem; outline: none; box-sizing: border-box; margin-bottom: 15px; transition: 0.3s; }
        .g-input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(255,102,0,0.1); }
        
        .btn { width: 100%; background: var(--accent); color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: 800; font-size: 1rem; cursor: pointer; text-transform: uppercase; transition: 0.3s; margin-top: 10px; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,102,0,0.3); }

        .toggle-text { margin-top: 25px; font-size: 0.85rem; color: #888; cursor: pointer; transition: 0.3s; display: inline-block; }
        .toggle-text:hover { color: var(--cyan); }
        
        #reg-box { display: none; }
        .back-btn { position: absolute; top: 20px; left: 20px; color: #666; text-decoration: none; font-size: 1.2rem; transition: 0.3s; }
        .back-btn:hover { color: #fff; }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>

    <div class="auth-container" id="login-box">
        <h1>SYS.<span>OMNI</span></h1>
        <p class="subtitle">Identificación de Usuario requerida</p>
        
        <input type="email" id="log-email" class="g-input" placeholder="Correo Electrónico">
        <input type="password" id="log-pass" class="g-input" placeholder="Contraseña">
        
        <button class="btn" onclick="login()">INICIAR SESIÓN</button>
        <span class="toggle-text" onclick="toggleForms()"><i class="fas fa-user-plus"></i> ¿No tienes cuenta? Regístrate aquí</span>
    </div>

    <div class="auth-container" id="reg-box">
        <h1>SYS.<span>OMNI</span></h1>
        <p class="subtitle">Creación de Perfil Titán</p>
        
        <input type="text" id="reg-nick" class="g-input" placeholder="Nick exacto de Geometry Dash">
        <input type="email" id="reg-email" class="g-input" placeholder="Correo Electrónico">
        <input type="password" id="reg-pass" class="g-input" placeholder="Contraseña (Mínimo 6 caracteres)">
        
        <button class="btn" style="background:var(--cyan);" onclick="register()">CREAR CUENTA</button>
        <span class="toggle-text" onclick="toggleForms()"><i class="fas fa-sign-in-alt"></i> ¿Ya tienes cuenta? Inicia sesión</span>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    
    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyC2vrauBlplKGMjeLW3mLzZQr05khmH5v0", 
            authDomain: "scullylist.firebaseapp.com", 
            databaseURL: "https://scullylist-default-rtdb.firebaseio.com", 
            projectId: "scullylist"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); 
        const db = firebase.database();

        // REDIRIGIR SI YA ESTÁ LOGUEADO
        auth.onAuthStateChanged(user => {
            if(user) window.location.href = "index.html";
        });

        function toggleForms() {
            const l = document.getElementById('login-box');
            const r = document.getElementById('reg-box');
            if(l.style.display === 'none') { l.style.display = 'block'; r.style.display = 'none'; } 
            else { l.style.display = 'none'; r.style.display = 'block'; }
        }

        // FUNCIÓN DE LOGIN
        function login() {
            const e = document.getElementById('log-email').value.trim();
            const p = document.getElementById('log-pass').value;
            if(!e || !p) return alert("Llena todos los campos.");
            
            auth.signInWithEmailAndPassword(e, p).then(() => {
                window.location.href = "index.html";
            }).catch(err => alert("Error: " + err.message));
        }

        // FUNCIÓN DE REGISTRO REPARADA (GUARDA EN BASE DE DATOS)
        function register() {
            const n = document.getElementById('reg-nick').value.trim();
            const e = document.getElementById('reg-email').value.trim();
            const p = document.getElementById('reg-pass').value;
            
            if(!n || !e || !p) return alert("Llena todos los campos.");
            
            // 1. Crear cuenta en Firebase Auth
            auth.createUserWithEmailAndPassword(e, p).then((userCred) => {
                
                // 2. LA REPARACIÓN: Guardar su perfil en la Base de Datos automáticamente
                db.ref('players').push({
                    name: n,
                    email: e.toLowerCase(), // OBLIGATORIO: Se guarda en minúsculas
                    totalXP: 0,
                    role: "player",
                    verified: false,
                    hidden: false
                }).then(() => {
                    alert("¡Perfil creado con éxito! Bienvenido al ecosistema OMNI.");
                    window.location.href = "index.html";
                }).catch(err => {
                    console.error(err);
                    alert("Error guardando el perfil en la red.");
                });
                
            }).catch(err => alert("Error: " + err.message));
        }
    </script>
</body>
</html>
