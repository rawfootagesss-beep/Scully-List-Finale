<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scully Leaderboards | Ranking & Identidad Global</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --accent: #ff6600; --accent-grad: linear-gradient(135deg, #ff6600 0%, #ff9900 100%);
            --bg: #030303; --card-bg: rgba(15, 15, 15, 0.7);
            --border: rgba(255, 255, 255, 0.05);
            --glow: 0 0 20px rgba(255, 102, 0, 0.2);
            --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32;
            --green: #00ff66; --red: #ff3333; --blue: #00ccff;
        }

        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Lexend Deca', sans-serif; 
            margin: 0; padding: 0; 
            overflow-x: hidden; 
        }

        /* ANIMACIONES DE COSMÉTICOS */
        @keyframes rainbow { 0% { color: #ff0000; } 20% { color: #ff9900; } 40% { color: #ffff00; } 60% { color: #00ff00; } 80% { color: #00ffff; } 100% { color: #cc00ff; } }
        .cos-rainbow { animation: rainbow 3s linear infinite !important; font-weight: 800; }
        .cos-fire { box-shadow: 0 0 15px #ff3300 !important; border: 2px solid #ff3300 !important; }
        .cos-electric { box-shadow: 0 0 15px #00ccff !important; border: 2px solid #00ccff !important; }

        /* 1. BARRA DE STAFF CON TRIBUTO */
        .staff-bar { 
            display: flex; justify-content: center; gap: 25px; padding: 15px; 
            background: rgba(255,255,255,0.02); font-size: 0.6rem; 
            border-bottom: 1px solid var(--border); flex-wrap: wrap; align-items: center; 
        }
        .staff-item { display: flex; align-items: center; gap: 8px; color: #888; }
        .staff-item i { color: var(--accent); }
        .staff-item b { color: #fff; }
        .tribute-item { color: #fff; font-weight: 800; gap: 5px; text-shadow: 0 0 10px rgba(255,255,255,0.4); }

        header { padding: 60px 20px; text-align: center; }
        h1 { font-size: 3rem; font-weight: 800; text-transform: uppercase; margin: 0; letter-spacing: -1px; }
        h1 span { background: var(--accent-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .btn-back { 
            display: inline-block; margin-top: 25px; color: var(--accent); 
            text-decoration: none; font-size: 0.7rem; font-weight: bold; 
            text-transform: uppercase; border: 1px solid var(--accent); 
            padding: 12px 25px; border-radius: 50px; transition: 0.3s; 
        }
        .btn-back:hover { background: var(--accent); color: #000; box-shadow: var(--glow); transform: translateY(-3px); }

        /* 2. TABLA DE RANKING */
        .wrapper { width: 95%; max-width: 1200px; margin: 40px auto; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 12px; }
        th { text-transform: uppercase; font-size: 0.65rem; color: #444; letter-spacing: 2px; padding: 15px; text-align: center; }
        
        .rank-row { 
            background: var(--card-bg); backdrop-filter: blur(10px); 
            cursor: pointer; transition: 0.3s; border: 1px solid var(--border); 
        }
        .rank-row:hover { border-color: var(--accent); transform: scale(1.01); background: rgba(255,102,0,0.05); }
        
        /* ESTILO PODIO */
        .rank-row.top-0 { border-color: var(--gold); box-shadow: 0 0 20px rgba(255, 215, 0, 0.15); }
        .rank-row.top-0 td:first-child { color: var(--gold); text-shadow: 0 0 10px var(--gold); font-size: 1.6rem; }

        td { padding: 20px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); text-align: center; }
        td:first-child { border-left: 1px solid var(--border); border-radius: 15px 0 0 15px; font-weight: 800; width: 80px; }
        td:last-child { border-right: 1px solid var(--border); border-radius: 0 15px 15px 0; color: var(--accent); font-weight: 800; font-size: 1.1rem; }

        /* 3. INFO DE JUGADOR (PFP + META) */
        .player-info-cell { display: flex; align-items: center; gap: 15px; text-align: left; }
        .rank-pfp { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; background: #111; }
        .player-meta { display: flex; flex-direction: column; gap: 4px; }
        .xp-pill { 
            background: #111; color: var(--accent); padding: 2px 8px; 
            border-radius: 5px; font-size: 0.6rem; font-weight: 800; 
            border: 1px solid var(--accent); width: fit-content;
        }
        .badges-container { display: flex; gap: 5px; margin-top: 2px; }
        .badge-mini { font-size: 0.9rem; }

        /* 4. ADMIN PANEL */
        #adminPanel { 
            display: none; background: #000; border: 2px solid var(--accent); 
            padding: 40px; width: 95%; max-width: 1200px; margin: 50px auto; 
            border-radius: 30px; box-shadow: var(--glow); text-align: left; 
        }
        .admin-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 30px; }
        input, select { 
            width: 100%; background: #0a0a0a !important; border: 1px solid #222; 
            color: #fff !important; padding: 15px; border-radius: 12px; 
            margin-bottom: 15px; font-family: 'Lexend Deca'; box-sizing: border-box; 
        }
        .admin-user-card { 
            background: #080808; padding: 15px; border-radius: 15px; 
            margin-bottom: 10px; border: 1px solid #111;
            display: flex; justify-content: space-between; align-items: center;
        }
        .admin-ctrl-btns { display: flex; gap: 8px; }
        .admin-ctrl-btns button { 
            padding: 6px 12px; font-size: 0.55rem; font-weight: 800; 
            border-radius: 6px; cursor: pointer; border: 1px solid #222; background: #000; color: #fff;
        }
        .btn-rev { border-color: var(--blue) !important; color: var(--blue) !important; }
        .btn-acc { border-color: var(--green) !important; color: var(--green) !important; }
        .btn-rej { border-color: var(--red) !important; color: var(--red) !important; }

        /* 5. MODAL PERFIL */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); }
        .modal-content { background: #0a0a0a; margin: 5vh auto; padding: 40px; width: 90%; max-width: 500px; border-radius: 30px; border: 1px solid var(--border); text-align: center; }
        .u-lvl-btn { 
            display: flex; justify-content: space-between; background: #111; 
            padding: 15px; border-radius: 12px; margin-bottom: 10px; 
            text-decoration: none; color: #fff; border-left: 4px solid var(--accent); 
            align-items: center; font-size: 0.85rem; transition: 0.3s;
        }
        .u-lvl-btn:hover { background: #181818; transform: translateX(5px); }

        .admin-lock { padding: 60px 0; opacity: 0.05; cursor: pointer; text-align: center; }
    </style>
</head>
<body>

    <nav class="staff-bar">
        <div class="staff-item tribute-item">Tributo a 2parx 🕊️</div>
        <div class="staff-item"><i class="fas fa-crown"></i> OWNER <b>score</b></div>
        <div class="staff-item"><i class="fas fa-user-shield"></i> ADMIN <b>Vegardo</b></div>
        <div class="staff-item"><i class="fas fa-hands-helping"></i> HELPER <b>Sopa354</b></div>
        <div class="staff-item"><i class="fas fa-code"></i> CODIFICADOR <b>score</b></div>
    </nav>

    <header>
        <h1>SCULLY <span>RANKING</span></h1>
        <a href="index.html" class="btn-back"><i class="fas fa-home"></i> VOLVER AL HUB</a>
    </header>

    <main class="wrapper">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th style="text-align:left">Jugador de Prestigio</th>
                    <th>Records</th>
                    <th>Puntos</th>
                </tr>
            </thead>
            <tbody id="leaderboardBody">
                <tr><td colspan="4" style="color:#444; padding:80px;">Sincronizando Ranking Global...</td></tr>
            </tbody>
        </table>
    </main>

    <div class="admin-lock" onclick="toggleAuth()"><i class="fas fa-lock"></i></div>
    <div id="authBox" style="display:none; text-align:center; padding-bottom:100px;">
        <input type="password" id="tokenInput" placeholder="Token Codificador" style="width:200px;">
        <button onclick="checkAuth()" style="background:var(--accent); border:none; padding:12px 30px; border-radius:50px; cursor:pointer; font-weight:800; color:#000;">ENTRAR</button>
    </div>

    <div id="adminPanel">
        <h2 style="color:var(--accent); margin-top:0; letter-spacing:2px; text-transform:uppercase;">Gestión de Prestigio</h2>
        <div class="admin-grid">
            <div class="admin-col">
                <p style="font-size:0.6rem; color:#444; font-weight:bold;">AÑADIR RÉCORD MANUAL</p>
                <input type="text" id="targetUser" placeholder="Nickname">
                <select id="targetCountry">
                    <option value="es">España 🇪🇸</option><option value="mx">México 🇲🇽</option>
                    <option value="ar">Argentina 🇦🇷</option><option value="cl">Chile 🇨🇱</option>
                    <option value="co">Colombia 🇨🇴</option><option value="pe">Perú 🇵🇪</option>
                </select>
                <select id="levelSelect"></select>
                <input type="text" id="levelLink" placeholder="YouTube Link">
                <button onclick="addManualRecord()" style="width:100%; background:var(--accent); border:none; padding:15px; border-radius:12px; font-weight:800; cursor:pointer; color:#000;">ACTUALIZAR</button>
            </div>
            <div class="admin-col">
                <p style="font-size:0.6rem; color:#444; font-weight:bold;">CONTROL DE MIEMBROS (REV/ACEP/RECH)</p>
                <div id="adminUserList" style="max-height:450px; overflow-y:auto; padding-right:5px;"></div>
            </div>
        </div>
    </div>

    <div id="uModal" class="modal"><div class="modal-content" id="uModalContent"></div></div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://scullylist-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const TOKEN = "GdfuFCRy";
        let fullData = {};

        // Escucha en tiempo real
        db.ref('/').on('value', (s) => {
            fullData = s.val() || {};
            const lvls = fullData.levels || [];
            const bans = Object.values(fullData.bans || {});
            const players = Object.values(fullData.players || {}).filter(p => !bans.includes(p.name));
            
            renderLeaderboard(lvls, players);
            updateLevelSelect(lvls);
            if(sessionStorage.getItem('scully_session') === 'active') {
                document.getElementById('adminPanel').style.display = "block";
                updateAdminUserList(players);
            }
        });

        // 1. RENDERIZADO DE RANKING CON PFPs Y COSMÉTICOS
        function renderLeaderboard(lvls, players) {
            const body = document.getElementById('leaderboardBody');
            if(players.length === 0) { body.innerHTML = '<tr><td colspan="4">No hay datos en la Scully Network.</td></tr>'; return; }

            players.forEach(u => {
                let totalPts = 0; let badges = [];
                if(u.completions) {
                    u.completions.forEach(c => {
                        const idx = lvls.findIndex(l => l.name.toLowerCase() === c.level.toLowerCase());
                        if(idx > -1) {
                            totalPts += parseFloat(Math.max(100 - (idx * 0.6), 5));
                            if(idx <= 9) badges.push('🔥');
                            if(lvls[idx].first?.toLowerCase() === u.name.toLowerCase()) badges.push('🥇');
                        }
                    });
                }
                if(u.completions?.length >= 5) badges.push('🛡️');
                u.pts = totalPts.toFixed(1);
                u.lvl = Math.floor(totalPts / 10);
                u.badges = [...new Set(badges)];
            });

            players.sort((a,b) => b.pts - a.pts);

            body.innerHTML = players.map((u, i) => {
                let cosPfp = ""; let cosName = ""; let title = "";
                if(u.cosmetics?.aura_fire) cosPfp = "cos-fire";
                if(u.cosmetics?.aura_electric) cosPfp = "cos-electric";
                if(u.cosmetics?.name_rainbow) cosName = "cos-rainbow";
                if(u.cosmetics?.title_legend) title = " <span style='color:var(--gold); font-size:0.5rem; letter-spacing:1px;'>[LEYENDA]</span>";

                return `
                <tr class="rank-row top-${i}" onclick="openUserProfile('${u.name}')">
                    <td>${i+1}</td>
                    <td style="text-align:left;">
                        <div class="player-info-cell">
                            <img src="${u.pfp || 'https://i.imgur.com/8pw98K4.png'}" class="rank-pfp ${cosPfp}">
                            <div class="player-meta">
                                <b class="${cosName}">${u.name}${title} <img src="https://flagcdn.com/w20/${u.country || 'es'}.png" style="height:10px; margin-left:5px;"></b>
                                <div style="display:flex; align-items:center; gap:8px;">
                                    <span class="xp-pill">XP LVL ${u.lvl}</span>
                                    <div class="badges-container">${u.badges.map(b => `<span class="badge-mini">${b}</span>`).join("")}</div>
                                </div>
                            </div>
                        </div>
                    </td>
                    <td>${(u.completions || []).length}</td>
                    <td>${u.pts} PTS</td>
                </tr>`;
            }).join("");
        }

        // 2. PANEL ADMIN POTENCIADO (CONTROL DE MIEMBROS)
        function updateAdminUserList(p) {
            document.getElementById('adminUserList').innerHTML = p.map((u, i) => `
                <div class="admin-user-card">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <img src="${u.pfp || 'https://i.imgur.com/8pw98K4.png'}" style="width:30px; height:30px; border-radius:50%; object-fit:cover;">
                        <span style="font-weight:800; font-size:0.75rem;">${u.name}</span>
                    </div>
                    <div class="admin-ctrl-btns">
                        <button class="btn-rev" onclick="statusAction('${u.name}', 'En revisión')">REV</button>
                        <button class="btn-acc" onclick="statusAction('${u.name}', 'Aceptado')">ACEP</button>
                        <button class="btn-rej" onclick="deleteUser(${i})">BORRAR</button>
                    </div>
                </div>`).join("");
        }

        function statusAction(name, status) {
            const staff = prompt("Nombre Staff:");
            if(!staff) return;
            db.ref('logs').push({ 
                type: (status === 'Aceptado' ? 'accept' : 'info'), 
                msg: `👤 JUGADOR ${name.toUpperCase()} MARCADO COMO ${status.toUpperCase()} POR ${staff}` 
            });
            alert("Acción registrada.");
        }

        function deleteUser(i) {
            if(confirm("¿Deseas eliminar permanentemente a este jugador del ranking?")) {
                db.ref('players').once('value', s => {
                    let list = Object.values(s.val());
                    const name = list[i].name;
                    list.splice(i, 1);
                    db.ref('players').set(list);
                    db.ref('logs').push({ type: 'reject', msg: `❌ JUGADOR ${name} ELIMINADO DEL RANKING POR ADMIN` });
                });
            }
        }

        // 3. AUXILIARES Y MODAL
        function addManualRecord() {
            const name = document.getElementById('targetUser').value.trim();
            const level = document.getElementById('levelSelect').value;
            const link = document.getElementById('levelLink').value.trim();
            const country = document.getElementById('targetCountry').value;
            if(!name || !level) return alert("Nickname y Nivel obligatorios.");

            db.ref('players').once('value', s => {
                let list = Object.values(s.val() || {});
                let idx = list.findIndex(u => u.name.toLowerCase() === name.toLowerCase());
                let rec = { level: level, link: link };
                if(idx > -1) {
                    if(!list[idx].completions) list[idx].completions = [];
                    if(!list[idx].completions.find(c => c.level === level)) {
                        list[idx].completions.push(rec);
                        list[idx].country = country;
                    } else { return alert("Récord ya registrado."); }
                } else { list.push({ name: name, country: country, completions: [rec] }); }
                db.ref('players').set(list);
                alert("Ranking actualizado.");
            });
        }

        function openUserProfile(n) {
            const u = Object.values(fullData.players || {}).find(x => x.name === n);
            if(!u) return;
            document.getElementById('uModalContent').innerHTML = `
                <span onclick="closeM()" style="float:right; cursor:pointer; font-size:1.5rem; color:var(--accent);">&times;</span>
                <img src="${u.pfp || 'https://i.imgur.com/8pw98K4.png'}" style="width:90px; height:90px; border-radius:50%; margin-bottom:15px; object-fit:cover; border:3px solid var(--accent); box-shadow: var(--glow);">
                <h2 style="margin:0; color:var(--accent); letter-spacing:1px;">${u.name}</h2>
                <div style="margin:15px 0;"><span class="xp-pill" style="font-size:0.8rem; padding:5px 15px;">XP LVL ${Math.floor(u.pts / 10)}</span></div>
                <div style="margin-top:20px; text-align:left; max-height:300px; overflow-y:auto;">
                    ${(u.completions || []).map(c => `
                        <a href="${c.link || '#'}" target="_blank" class="u-lvl-btn">
                            <span>${c.level}</span>
                            <i class="fab fa-youtube" style="color:#ff0000;"></i>
                        </a>`).join("") || '<p style="text-align:center; color:#444;">Sin récords.</p>'}
                </div>`;
            document.getElementById('uModal').style.display = "block";
        }

        function toggleAuth() { const b = document.getElementById('authBox'); b.style.display = (b.style.display === "block" ? "none" : "block"); }
        function checkAuth() { if(document.getElementById('tokenInput').value === TOKEN) { sessionStorage.setItem('scully_session', 'active'); location.reload(); } }
        function closeM() { document.getElementById('uModal').style.display = "none"; }
        function updateLevelSelect(lvls) { document.getElementById('levelSelect').innerHTML = '<option value="">-- Nivel --</option>' + lvls.map(l => `<option value="${l.name}">${l.name}</option>`).join(""); }
    </script>
</body>
</html>
