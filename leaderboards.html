<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scully Leaderboards | Ranking Global</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --accent: #ff6600; --accent-grad: linear-gradient(135deg, var(--accent) 0%, #ff9900 100%);
            --bg: #030303; --card-bg: rgba(15, 15, 15, 0.7);
            --border: rgba(255, 255, 255, 0.05); --glow: 0 0 20px rgba(255, 102, 0, 0.2);
            --gold: #ffd700; --green: #00ff66;
        }
        body { background: var(--bg); color: #fff; font-family: 'Lexend Deca', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }

        @keyframes rainbow { 0% { color: #ff0000; } 20% { color: #ff9900; } 40% { color: #ffff00; } 60% { color: #00ff00; } 80% { color: #00ffff; } 100% { color: #cc00ff; } }
        .cos-rainbow { animation: rainbow 3s linear infinite !important; font-weight: 800; }
        .cos-fire { box-shadow: 0 0 15px #ff3300 !important; border: 2px solid #ff3300 !important; }
        .cos-electric { box-shadow: 0 0 15px #00ccff !important; border: 2px solid #00ccff !important; }

        .staff-bar { display: flex; justify-content: center; gap: 25px; padding: 15px; background: rgba(255,255,255,0.02); font-size: 0.6rem; border-bottom: 1px solid var(--border); }
        header { padding: 60px 20px; text-align: center; }
        h1 { font-size: 3rem; font-weight: 800; text-transform: uppercase; margin: 0; letter-spacing: -1px; }
        h1 span { background: var(--accent-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .btn-back { display: inline-block; margin-top: 25px; color: var(--accent); text-decoration: none; font-size: 0.7rem; font-weight: bold; border: 1px solid var(--accent); padding: 12px 25px; border-radius: 50px; transition: 0.3s; }
        .btn-back:hover { background: var(--accent); color: #000; box-shadow: var(--glow); transform: translateY(-3px); }

        .wrapper { width: 95%; max-width: 1200px; margin: 40px auto; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 12px; }
        th { text-transform: uppercase; font-size: 0.65rem; color: #444; letter-spacing: 2px; padding: 15px; }
        .rank-row { background: var(--card-bg); backdrop-filter: blur(10px); cursor: pointer; transition: 0.3s; border: 1px solid var(--border); }
        .rank-row:hover { border-color: var(--accent); transform: scale(1.01); background: rgba(255,102,0,0.05); }
        .rank-row.top-0 { border-color: var(--gold); box-shadow: 0 0 20px rgba(255, 215, 0, 0.15); }

        td { padding: 20px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); text-align: center; }
        td:first-child { border-left: 1px solid var(--border); border-radius: 15px 0 0 15px; font-weight: 800; width: 80px; }
        td:last-child { border-right: 1px solid var(--border); border-radius: 0 15px 15px 0; color: var(--accent); font-weight: 800; }

        .player-info-cell { display: flex; align-items: center; gap: 15px; text-align: left; }
        .rank-pfp { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; background: #111; }
        .player-meta { display: flex; flex-direction: column; gap: 4px; }
        .xp-pill { background: #111; color: var(--accent); padding: 2px 8px; border-radius: 5px; font-size: 0.6rem; font-weight: 800; border: 1px solid var(--accent); width: fit-content; }
        .flag-icon { height: 12px; border-radius: 2px; box-shadow: 0 0 5px rgba(0,0,0,0.5); }

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); }
        .modal-content { background: #0a0a0a; margin: 10vh auto; padding: 40px; width: 90%; max-width: 500px; border-radius: 30px; border: 1px solid var(--border); text-align: center; }
        .u-lvl-btn { display: flex; justify-content: space-between; background: #111; padding: 15px; border-radius: 12px; margin-bottom: 10px; text-decoration: none; color: #fff; border-left: 4px solid var(--accent); align-items: center; }
    </style>
</head>
<body>

    <nav class="staff-bar">
        <div style="color:#fff; font-weight:800; letter-spacing:1px;">SCULLY RANKING NETWORK</div>
    </nav>

    <header>
        <h1>SCULLY <span>RANKING</span></h1>
        <a href="index.html" class="btn-back">VOLVER AL HUB</a>
    </header>

    <main class="wrapper">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th style="text-align:left">Jugador</th>
                    <th>Records</th>
                    <th>Puntos</th>
                </tr>
            </thead>
            <tbody id="leaderboardBody">
                <tr><td colspan="4" style="color:#444; padding:80px;">Sincronizando base de datos global...</td></tr>
            </tbody>
        </table>
    </main>

    <div id="uModal" class="modal"><div class="modal-content" id="uModalContent"></div></div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://scullylist-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const savedColor = localStorage.getItem('scully-theme-color') || '#ff6600';
        document.documentElement.style.setProperty('--accent', savedColor);

        let fullData = {};

        db.ref('/').on('value', (s) => {
            fullData = s.val() || {};
            const lvls = fullData.levels || [];
            const bans = Object.values(fullData.bans || {});
            const players = Object.values(fullData.players || {}).filter(p => !bans.includes(p.name) && !p.hidden);
            renderLeaderboard(lvls, players);
        });

        function renderLeaderboard(lvls, players) {
            const body = document.getElementById('leaderboardBody');
            players.forEach(u => {
                let totalPts = 0;
                if(u.completions) {
                    u.completions.forEach(c => {
                        const idx = lvls.findIndex(l => l.name.toLowerCase() === c.level.toLowerCase());
                        if(idx > -1) totalPts += parseFloat(Math.max(100 - (idx * 0.6), 5));
                    });
                }
                u.pts = totalPts.toFixed(1);
                u.lvl = Math.floor(totalPts / 50);
            });

            players.sort((a,b) => b.pts - a.pts);

            body.innerHTML = players.map((u, i) => {
                let cosPfp = u.cosmetics?.aura_fire ? "cos-fire" : u.cosmetics?.aura_electric ? "cos-electric" : "";
                let cosName = u.cosmetics?.name_rainbow ? "cos-rainbow" : "";
                let title = u.cosmetics?.title_legend ? " <span style='color:var(--gold); font-size:0.5rem;'>[LEYENDA]</span>" : "";

                return `
                <tr class="rank-row top-${i}" onclick="openUserProfile('${u.name}')">
                    <td>${i+1}</td>
                    <td style="text-align:left;">
                        <div class="player-info-cell">
                            <img src="${u.pfp || 'https://i.imgur.com/8pw98K4.png'}" class="rank-pfp ${cosPfp}">
                            <div class="player-meta">
                                <b class="${cosName}">${u.name}${title} <img src="https://flagcdn.com/w40/${u.country || 'es'}.png" class="flag-icon" title="${u.country}"></b>
                                <span class="xp-pill">XP LVL ${u.lvl}</span>
                            </div>
                        </div>
                    </td>
                    <td>${(u.completions || []).length}</td>
                    <td>${u.pts} PTS</td>
                </tr>`;
            }).join("");
        }

        function openUserProfile(n) {
            const u = Object.values(fullData.players || {}).find(x => x.name === n);
            if(!u) return;
            document.getElementById('uModalContent').innerHTML = `
                <span onclick="closeM()" style="float:right; cursor:pointer; font-size:1.5rem; color:var(--accent);">&times;</span>
                <img src="${u.pfp || 'https://i.imgur.com/8pw98K4.png'}" style="width:90px; height:90px; border-radius:50%; margin-bottom:15px; object-fit:cover; border:3px solid var(--accent);">
                <h2 style="margin:0; color:var(--accent);">${u.name} <img src="https://flagcdn.com/w40/${u.country || 'es'}.png" class="flag-icon"></h2>
                <div style="margin-top:20px; text-align:left; max-height:300px; overflow-y:auto;">
                    ${(u.completions || []).map(c => `<a href="${c.link || '#'}" target="_blank" class="u-lvl-btn"><span>${c.level}</span><i class="fab fa-youtube"></i></a>`).join("") || '<p>Sin récords.</p>'}
                </div>`;
            document.getElementById('uModal').style.display = "block";
        }
        function closeM() { document.getElementById('uModal').style.display = "none"; }
    </script>
</body>
</html>
