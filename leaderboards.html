<<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scully List | Leaderboards</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg: #030303; --card: rgba(15,15,15,0.85); --border: rgba(255,255,255,0.05);
            --accent: #ff6600; --blue: #00ccff; --green: #00ff66;
        }
        body { background: var(--bg); color: #fff; font-family: 'Lexend Deca'; margin: 0; padding-bottom: 50px; }

        header { padding: 60px 20px 30px; text-align: center; }
        h1 { font-size: clamp(2rem, 5vw, 3.5rem); margin: 0; text-transform: uppercase; font-weight: 800; letter-spacing: -1px; }
        h1 span { color: var(--accent); }
        .btn-hub { background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: #fff; padding: 10px 20px; text-decoration: none; font-size: 0.75rem; border-radius: 50px; font-weight: 600; display: inline-flex; align-items: center; gap: 10px; margin-top: 15px; transition: 0.3s; }
        .btn-hub:hover { background: var(--accent); color: #000; }

        .leaderboard-container { width: 95%; max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }

        .player-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; display: flex; align-items: center; gap: 20px; position: relative; overflow: hidden; transition: 0.3s; }
        .player-card:hover { border-color: var(--accent); transform: scale(1.01); }

        .rank-number { font-size: 2.5rem; font-weight: 800; color: rgba(255,255,255,0.1); width: 50px; text-align: center; }
        
        .player-pfp { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); background: #111; }
        
        .player-info { flex-grow: 1; }
        .player-info h3 { margin: 0 0 5px 0; font-size: 1.2rem; display: flex; align-items: center; gap: 8px; text-transform: uppercase; }
        .verifier-badge { font-size: 0.8rem; color: var(--blue); }
        
        .player-bio { font-size: 0.8rem; color: #aaa; margin: 0 0 10px 0; line-height: 1.4; max-width: 90%; }
        
        .social-links { display: flex; gap: 12px; font-size: 1.1rem; }
        .social-links a, .social-links span { color: #666; transition: 0.3s; text-decoration: none; cursor: pointer; }
        .social-links a.yt:hover { color: #ff3333; }
        .social-links a.tw:hover { color: #1da1f2; }
        .social-links span.dc:hover { color: #7289da; }

        .player-stats { text-align: right; display: flex; flex-direction: column; gap: 8px; }
        .stat-badge { background: #000; padding: 6px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: 800; border: 1px solid var(--border); }
        .xp-text { color: var(--accent); }

        /* Efectos cosméticos */
        @keyframes rainbow { 0% { color: #ff0000; } 20% { color: #ff9900; } 40% { color: #ffff00; } 60% { color: #00ff00; } 80% { color: #00ffff; } 100% { color: #cc00ff; } }
        .cos-rainbow { animation: rainbow 3s linear infinite !important; }
        .cos-fire { box-shadow: 0 0 15px #ff3300 !important; border-color: #ff3300 !important; }
        .cos-electric { box-shadow: 0 0 15px #00ccff !important; border-color: #00ccff !important; }
    </style>
</head>
<body>

    <header>
        <h1>RANKING <span>GLOBAL</span></h1>
        <p style="color:#666; font-size:0.8rem; margin-top:5px;">El salón de la fama de la ingeniería</p>
        <a href="index.html" class="btn-hub"><i class="fas fa-arrow-left"></i> VOLVER AL HUB</a>
        <a href="perfil.html" class="btn-hub" style="border-color:var(--blue); color:var(--blue);"><i class="fas fa-user-circle"></i> MI PERFIL</a>
    </header>

    <div class="leaderboard-container" id="leaderboardList">
        <p style="text-align:center; color:#555;"><i class="fas fa-spinner fa-spin"></i> Cargando leyendas...</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://scullylist-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('/').on('value', (s) => {
            const data = s.val() || {};
            const levels = data.levels || [];
            let players = Object.values(data.players || {}).filter(p => !p.hidden);
            
            // Lógica matemática oficial de XP
            players.forEach(p => {
                let uniqueLevels = new Set();
                levels.forEach(l => { if(l.first?.toLowerCase() === p.name.toLowerCase()) uniqueLevels.add(l.name); });
                (p.completions || []).forEach(c => uniqueLevels.add(c.level));
                
                let pts = 0;
                uniqueLevels.forEach(name => {
                    let idx = levels.findIndex(l => l.name === name);
                    if(idx > -1) pts += Math.max(100 - (idx * 0.6), 5);
                });
                
                p.pts = parseFloat(pts.toFixed(1));
                p.lvl = Math.floor(p.pts / 50);
                p.isVerifier = levels.some(l => l.first?.toLowerCase() === p.name.toLowerCase());
            });

            // Ordenar por Puntos
            players.sort((a,b) => b.pts - a.pts);
            renderLeaderboard(players);
        });

        function renderLeaderboard(players) {
            let html = "";
            players.forEach((p, index) => {
                if(p.pts === 0) return; // Ocultar gente sin XP
                
                let pfpClass = "player-pfp";
                if(p.cosmetics?.aura_fire) pfpClass += " cos-fire";
                if(p.cosmetics?.aura_electric) pfpClass += " cos-electric";
                
                let nameClass = p.cosmetics?.name_rainbow ? "cos-rainbow" : "";
                let verifierIcon = p.isVerifier ? `<i class="fas fa-check-circle verifier-badge" title="Verificador Original"></i>` : "";
                
                let bio = p.bio ? p.bio : "<i>Sin biografía establecida.</i>";
                
                let socialsHtml = "";
                if(p.socials) {
                    if(p.socials.yt) socialsHtml += `<a href="${p.socials.yt}" target="_blank" class="yt"><i class="fab fa-youtube"></i></a>`;
                    if(p.socials.tw) socialsHtml += `<a href="${p.socials.tw}" target="_blank" class="tw"><i class="fab fa-twitter"></i></a>`;
                    if(p.socials.dc) socialsHtml += `<span class="dc" title="${p.socials.dc} (Cópialo)"><i class="fab fa-discord"></i></span>`;
                }

                html += `
                <div class="player-card">
                    <div class="rank-number">#${index + 1}</div>
                    <img src="${p.pfp || 'https://i.imgur.com/8pw98K4.png'}" class="${pfpClass}">
                    
                    <div class="player-info">
                        <h3 class="${nameClass}">${p.name} ${verifierIcon}</h3>
                        <p class="player-bio">${bio}</p>
                        <div class="social-links">${socialsHtml}</div>
                    </div>
                    
                    <div class="player-stats">
                        <div class="stat-badge xp-text">${p.pts} XP</div>
                        <div class="stat-badge">LVL ${p.lvl}</div>
                    </div>
                </div>`;
            });
            document.getElementById('leaderboardList').innerHTML = html;
        }
    </script>
</body>
</html>
