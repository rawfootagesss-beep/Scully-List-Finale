<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scully Leaderboards | World Ranking</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root { 
            --accent: #ff6600; --accent-grad: linear-gradient(135deg, #ff6600 0%, #ff9900 100%);
            --bg: #030303; --card-bg: rgba(15, 15, 15, 0.7);
            --border: rgba(255, 255, 255, 0.05);
            --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32;
        }

        body { background: var(--bg); color: #fff; font-family: 'Lexend Deca', sans-serif; margin: 0; padding: 0; }

        .staff-bar { display: flex; justify-content: center; gap: 20px; padding: 12px; background: rgba(0,0,0,0.5); font-size: 0.6rem; border-bottom: 1px solid var(--border); }
        .staff-item b { color: var(--accent); }

        header { padding: 60px 20px; text-align: center; }
        h1 { font-size: 3rem; font-weight: 800; text-transform: uppercase; margin: 0; }
        h1 span { background: var(--accent-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .btn-back { display: inline-block; margin-top: 20px; color: var(--accent); text-decoration: none; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; border: 1px solid var(--accent); padding: 12px 25px; border-radius: 50px; transition: 0.3s; }
        .btn-back:hover { background: var(--accent); color: #000; }

        .wrapper { width: 95%; max-width: 900px; margin: 40px auto; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        .rank-row { background: var(--card-bg); backdrop-filter: blur(10px); cursor: pointer; transition: 0.3s; border: 1px solid var(--border); }
        .rank-row:hover { border-color: var(--accent); transform: scale(1.02); }
        
        .rank-row.top-0 { border-color: var(--gold); box-shadow: 0 0 15px rgba(255, 215, 0, 0.1); }
        .rank-row.top-0 td:first-child { color: var(--gold); text-shadow: 0 0 10px var(--gold); font-size: 1.5rem; }
        .rank-row.top-1 { border-color: var(--silver); }
        .rank-row.top-2 { border-color: var(--bronze); }

        td { padding: 20px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        td:first-child { border-left: 1px solid var(--border); border-radius: 15px 0 0 15px; font-weight: 800; text-align: center; width: 60px; }
        td:last-child { border-right: 1px solid var(--border); border-radius: 0 15px 15px 0; font-weight: 800; color: var(--accent); }

        /* ADMIN PANEL */
        #adminPanel { display: none; background: #000; border: 1px solid var(--accent); padding: 40px; width: 95%; max-width: 1000px; margin: 50px auto; border-radius: 30px; text-align: left; }
        input, select { width: 100%; background: #0a0a0a; border: 1px solid #222; color: #fff !important; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-sizing: border-box; }
        option { background: #000; color: #fff; }

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); }
        .modal-content { background: #0a0a0a; margin: 10vh auto; padding: 40px; width: 90%; max-width: 450px; border-radius: 30px; border: 1px solid var(--border); text-align: center; }
        .admin-lock { padding: 60px 0; opacity: 0.05; cursor: pointer; text-align: center; }
    </style>
</head>
<body>

    <nav class="staff-bar">
        <div class="staff-item">OWNER <b>score</b></div>
        <div class="staff-item">ADMIN <b>Vegardo</b></div>
        <div class="staff-item">HELPER <b>Blitz</b></div>
        <div class="staff-item">HELPER <b>Sopa354</b></div>
    </nav>

    <header>
        <h1>SCULLY <span>RANKING</span></h1>
        <a href="index.html" class="btn-back">Regresar al Hub</a>
    </header>

    <main class="wrapper"><table><tbody id="leaderboardBody"></tbody></table></main>

    <div class="admin-lock" onclick="toggleAuth()"><i class="fas fa-lock"></i></div>
    <div id="authBox" style="display:none; text-align:center; padding-bottom:100px;">
        <input type="password" id="tokenInput" placeholder="Token" style="width:150px;"><button onclick="checkAuth()">ENTRAR</button>
    </div>

    <div id="adminPanel">
        <h2 style="color:var(--accent); margin-top:0;">Gestión de Ranking Hispano</h2>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:30px;">
            <div>
                <input type="text" id="targetUser" placeholder="Nombre Usuario">
                <select id="targetCountry">
                    <option value="es">España 🇪🇸</option><option value="mx">México 🇲🇽</option>
                    <option value="ar">Argentina 🇦🇷</option><option value="cl">Chile 🇨🇱</option>
                    <option value="co">Colombia 🇨🇴</option><option value="pe">Perú 🇵🇪</option>
                    <option value="ve">Venezuela 🇻🇪</option><option value="ec">Ecuador 🇪🇨</option>
                </select>
                <select id="levelSelect"></select>
                <input type="text" id="levelLink" placeholder="URL Video YouTube">
                <button onclick="addCompletion()" style="width:100%; background:var(--accent); border:none; padding:15px; border-radius:12px; font-weight:800; cursor:pointer;">AÑADIR RÁCORD</button>
            </div>
            <div id="adminUserList" style="max-height:300px; overflow-y:auto; background:#080808; padding:15px; border-radius:15px;"></div>
        </div>
    </div>

    <div id="uModal" class="modal"><div class="modal-content" id="uModalContent"></div></div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://scullylist-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const TOKEN = "GdfuFCRy";
        let fullData = {};

        db.ref('/').on('value', (s) => {
            fullData = s.val() || {};
            const lvls = fullData.levels || [];
            const bans = Object.values(fullData.bans || {});
            const players = Object.values(fullData.players || {}).filter(p => !bans.includes(p.name));
            
            renderLeaderboard(lvls, players);
            updateLevelSelect(lvls);
            if(sessionStorage.getItem('scully_session') === 'active') {
                document.getElementById('adminPanel').style.display = "block";
                updateAdminUserList(players);
            }
        });

        function renderLeaderboard(lvls, players) {
            players.forEach(u => {
                let t = 0; u.completions?.forEach(c => {
                    const idx = lvls.findIndex(l => l.name.toLowerCase() === c.level.toLowerCase());
                    if(idx > -1) t += parseFloat(Math.max(100 - (idx * 0.6), 5));
                });
                u.pts = t.toFixed(1);
            });
            players.sort((a,b) => b.pts - a.pts);
            document.getElementById('leaderboardBody').innerHTML = players.map((u, i) => `
                <tr class="rank-row top-${i}" onclick="openUserProfile('${u.name}')">
                    <td>${i+1}</td>
                    <td style="text-align:left;"><img src="https://flagcdn.com/w20/${u.country}.png" style="margin-right:15px;">${u.name}</td>
                    <td>${u.pts} PTS</td>
                </tr>`).join("");
        }

        function updateLevelSelect(lvls) { document.getElementById('levelSelect').innerHTML = '<option value="">-- Nivel --</option>' + lvls.map(l => `<option value="${l.name}">${l.name}</option>`).join(""); }
        
        function addCompletion() {
            const name = document.getElementById('targetUser').value.trim();
            const level = document.getElementById('levelSelect').value;
            const link = document.getElementById('levelLink').value.trim();
            const country = document.getElementById('targetCountry').value;
            db.ref('players').once('value', s => {
                let p = Object.values(s.val() || {});
                let idx = p.findIndex(u => u.name === name);
                if(idx > -1) {
                    if(!p[idx].completions) p[idx].completions = [];
                    p[idx].completions.push({ level, link });
                } else { p.push({ name, country, completions: [{ level, link }] }); }
                db.ref('players').set(p);
            });
        }

        function openUserProfile(n) {
            const u = Object.values(fullData.players).find(x => x.name === n);
            document.getElementById('uModalContent').innerHTML = `
                <span onclick="closeM()" style="float:right; cursor:pointer;">&times;</span>
                <img src="https://flagcdn.com/w80/${u.country}.png" style="width:60px; border-radius:10px; margin-bottom:15px;">
                <h2 style="color:var(--accent); margin:0;">${u.name}</h2>
                <div style="margin-top:20px;">${(u.completions || []).map(c => `<a href="${c.link}" target="_blank" style="display:block; background:#111; padding:10px; border-radius:10px; text-decoration:none; color:#fff; margin-bottom:5px;"><span>${c.level}</span></a>`).join("")}</div>
            `;
            document.getElementById('uModal').style.display = "block";
        }
        function toggleAuth() { const b = document.getElementById('authBox'); b.style.display = b.style.display === "block" ? "none" : "block"; }
        function checkAuth() { if(document.getElementById('tokenInput').value === TOKEN) { sessionStorage.setItem('scully_session', 'active'); location.reload(); } }
        function closeM() { document.getElementById('uModal').style.display = "none"; }
        function updateAdminUserList(p) { document.getElementById('adminUserList').innerHTML = p.map((u, i) => `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #111;"><span onclick="document.getElementById('targetUser').value='${u.name}'" style="cursor:pointer; color:var(--accent);">${u.name}</span><i class="fas fa-trash" onclick="db.ref('players').once('value',s=>{let list=Object.values(s.val());list.splice(${i},1);db.ref('players').set(list);})"></i></div>`).join(""); }
    </script>
</body>
</html>
