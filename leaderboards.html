<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scully Leaderboards | Ranking</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root { --accent: #ff6600; --bg: #050505; --card: #0a0a0a; }
        body { background: var(--bg); color: #fff; font-family: 'Lexend Deca', sans-serif; margin: 0; text-align: center; }
        .top-credits { display: flex; justify-content: center; gap: 20px; padding: 12px; background: rgba(0,0,0,0.8); border-bottom: 1px solid #111; font-size: 0.65rem; }
        .credit-box i { color: var(--accent); margin-right: 5px; }
        header { padding: 50px 20px; }
        h1 span { color: var(--accent); }
        .btn-container { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .btn-scully { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 10px 20px; text-decoration: none; font-size: 0.8rem; cursor: pointer; display: inline-block; font-weight: bold; }
        .btn-discord { border-color: #5865F2; color: #5865F2; }
        .wrapper { width: 95%; max-width: 850px; margin: 20px auto; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        .rank-row { background: var(--card); cursor: pointer; transition: 0.2s; }
        .rank-row:hover { border: 1px solid var(--accent); transform: translateY(-2px); }
        td { padding: 15px; border-top: 1px solid #151515; border-bottom: 1px solid #151515; }
        #adminPanel { display: none; background: #000; border: 1px solid var(--accent); padding: 25px; width: 95%; max-width: 800px; margin: 40px auto; border-radius: 10px; text-align: left; }
        input, select, textarea { width: 100%; background: #0a0a0a; border: 1px solid #222; color: #fff; padding: 10px; margin-bottom: 8px; font-family: 'Lexend Deca'; box-sizing: border-box; }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); }
        .modal-content { background: #080808; margin: 5% auto; padding: 30px; width: 90%; max-width: 450px; border: 1px solid var(--accent); border-radius: 15px; position: relative; }
        .admin-access { margin: 80px 0 20px; opacity: 0.05; }
    </style>
</head>
<body>
    <nav class="top-credits">
        <div class="credit-box"><i class="fas fa-crown"></i> OWNER <span>score</span></div>
        <div class="credit-box"><i class="fas fa-user-shield"></i> ADMIN <span>Vegardo</span></div>
        <div class="credit-box"><i class="fas fa-hands-helping"></i> HELPER <span>Blitz</span></div>
        <div class="credit-box"><i class="fas fa-code"></i> CODIFICADOR <span>score</span></div>
    </nav>
    <header>
        <h1>SCULLY <span>LEADERBOARDS</span></h1>
        <div class="btn-container">
            <a href="index.html" class="btn-scully">REGRESAR AL DIRECTORIO</a>
            <a href="https://discord.gg/HDGzCVazwT" target="_blank" class="btn-scully btn-discord">DISCORD</a>
        </div>
    </header>
    <main class="wrapper"><table><thead><tr><th>#</th><th style="text-align:left">Identidad</th><th>Puntos</th><th>Lvls</th></tr></thead><tbody id="leaderboardBody"></tbody></table></main>

    <div class="admin-access"><i class="fas fa-lock" onclick="toggleAuth()"></i><div id="authBox" style="display:none;"><input type="password" id="tokenInput" placeholder="Token"><button class="btn-scully" onclick="checkAuth()">ENTRAR</button></div></div>
    
    <div id="adminPanel">
        <h4 style="color:var(--accent);">ADMIN JUGADORES</h4>
        <input type="text" id="targetUser" placeholder="Nombre Jugador">
        <select id="targetCountry"><option value="cl">Chile</option><option value="ar">Argentina</option><option value="mx">México</option><option value="es">España</option></select>
        <textarea id="targetList" placeholder="Niveles (Acu, Cataclysm...)"></textarea>
        <button class="btn-scully" style="width:100%; background:var(--accent); color:#000;" onclick="saveUser()">GUARDAR JUGADOR</button>
        <div id="adminUserList" style="margin-top:20px; max-height: 200px; overflow-y: auto;"></div>
    </div>

    <div id="uModal" class="modal"><div class="modal-content" id="uModalContent"></div></div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://scullylist-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const TOKEN = "GdfuFCRy";

        db.ref('/').on('value', (s) => {
            const data = s.val() || { levels: [], players: [] };
            renderLeaderboard(data.levels || [], Object.values(data.players || {}));
            if(sessionStorage.getItem('scully_session') === 'active') updateAdminUserList(Object.values(data.players || {}));
        });

        function calculatePoints(i) { return Math.max(100 - (i * 0.6), 5).toFixed(1); }
        function renderLeaderboard(lvls, players) {
            players.forEach(u => {
                let t = 0; let list = u.levelList ? u.levelList.split(",") : [];
                list.forEach(lvl => { const idx = lvls.findIndex(item => item.name.trim().toLowerCase() === lvl.trim().toLowerCase()); if(idx > -1) t += parseFloat(calculatePoints(idx)); });
                u.pts = t.toFixed(1); u.cnt = list.filter(x => x.trim() !== "").length;
            });
            players.sort((a,b) => b.pts - a.pts);
            document.getElementById('leaderboardBody').innerHTML = players.map((u, i) => `<tr class="rank-row" onclick="openUserProfile('${u.name}')"><td>#${i+1}</td><td style="text-align:left;"><img src="https://flagcdn.com/w20/${u.country}.png" style="margin-right:10px;">${u.name}</td><td>${u.pts}</td><td>${u.cnt}</td></tr>`).join("");
        }
        function openUserProfile(n) {
            db.ref('/').once('value', (s) => {
                const d = s.val(); const pObj = d.players || {}; const u = Object.values(pObj).find(x => x.name === n);
                const lvls = d.levels || [];
                const links = u.levelList.split(",").map(l => {
                    const nc = l.trim(); const lvl = lvls.find(x => x.name.toLowerCase() === nc.toLowerCase());
                    return lvl ? `<a href="https://youtu.be/${lvl.id}" target="_blank" style="display:block; color:var(--accent); margin-bottom:5px;">${nc} <i class="fab fa-youtube"></i></a>` : `<div style="color:#444;">${nc}</div>`;
                }).join("");
                document.getElementById('uModalContent').innerHTML = `<span onclick="closeM()" style="position:absolute; right:20px; top:10px; cursor:pointer; font-size:2rem; color:var(--accent)">&times;</span><img src="https://flagcdn.com/w80/${u.country}.png" style="width:60px; border-radius:4px;"><h2>${u.name}</h2><div style="text-align:left; border-top:1px solid #111; padding-top:10px; margin-top:10px;">${links}</div>`;
                document.getElementById('uModal').style.display = "block";
            });
        }
        function toggleAuth() { const b = document.getElementById('authBox'); b.style.display = b.style.display === "block" ? "none" : "block"; }
        function checkAuth() { if(document.getElementById('tokenInput').value === TOKEN) { sessionStorage.setItem('scully_session', 'active'); location.reload(); } }
        function saveUser() {
            const name = document.getElementById('targetUser').value.trim();
            const list = document.getElementById('targetList').value;
            const country = document.getElementById('targetCountry').value;
            db.ref('players').once('value', (s) => {
                let p = Object.values(s.val() || {});
                const idx = p.findIndex(u => u.name.toLowerCase() === name.toLowerCase());
                if(idx > -1) p[idx] = { name, levelList: list, country }; else p.push({ name, levelList: list, country });
                db.ref('players').set(p); alert("¡Jugador Guardado!");
            });
        }
        function deleteUser(i) { if(confirm("¿Borrar?")) db.ref('players').once('value', (s) => { let p = Object.values(s.val() || {}); p.splice(i, 1); db.ref('players').set(p); }); }
        function updateAdminUserList(p) { document.getElementById('adminUserList').innerHTML = p.map((u, i) => `<div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #111;"><span>${u.name}</span><i class="fas fa-trash" onclick="deleteUser(${i})" style="color:red; cursor:pointer;"></i></div>`).join(""); }
        window.onload = () => { if(sessionStorage.getItem('scully_session') === 'active') document.getElementById('adminPanel').style.display = "block"; };
        function closeM() { document.getElementById('uModal').style.display = "none"; }
    </script>
</body>
</html>
