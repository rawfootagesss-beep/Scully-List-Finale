<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scully Leaderboards | Prestigio Iberoamericano</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --accent: #ff6600; 
            --accent-grad: linear-gradient(135deg, var(--accent) 0%, #ff9900 100%);
            --bg: #030303; --card-bg: rgba(15, 15, 15, 0.7);
            --glow: 0 0 25px rgba(255, 102, 0, 0.2); --border: rgba(255, 255, 255, 0.05);
            --gold: #ffd700; --blue: #00ccff; --green: #00ff66;
        }

        body { background: var(--bg); color: #fff; font-family: 'Lexend Deca', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }

        /* --- EFECTOS COSMÉTICOS --- */
        @keyframes rainbow { 0% { color: #ff0000; } 20% { color: #ff9900; } 40% { color: #ffff00; } 60% { color: #00ff00; } 80% { color: #00ffff; } 100% { color: #cc00ff; } }
        .cos-rainbow { animation: rainbow 3s linear infinite !important; font-weight: 800; }
        .cos-fire { box-shadow: 0 0 15px #ff3300 !important; border: 2px solid #ff3300 !important; }
        .cos-electric { box-shadow: 0 0 15px #00ccff !important; border: 2px solid #00ccff !important; }

        header { padding: 60px 20px; text-align: center; background: linear-gradient(to bottom, rgba(255,102,0,0.05), transparent); }
        h1 { font-size: clamp(2.5rem, 8vw, 4rem); font-weight: 800; margin: 0; letter-spacing: -2px; text-transform: uppercase; }
        h1 span { background: var(--accent-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .btn-back { display: inline-flex; align-items: center; gap: 10px; margin-top: 25px; color: var(--accent); text-decoration: none; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; border: 1px solid var(--accent); padding: 12px 28px; border-radius: 50px; transition: 0.3s; }
        .btn-back:hover { background: var(--accent); color: #000; box-shadow: var(--glow); transform: translateY(-3px); }

        /* --- TABLA DE RANKING --- */
        .wrapper { width: 95%; max-width: 1200px; margin: 40px auto; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 12px; }
        th { text-transform: uppercase; font-size: 0.65rem; color: #444; letter-spacing: 2px; padding: 15px; font-weight: 800; }
        
        .rank-row { background: var(--card-bg); backdrop-filter: blur(15px); cursor: pointer; transition: 0.3s; border: 1px solid var(--border); }
        .rank-row:hover { border-color: var(--accent); transform: scale(1.01); background: rgba(255,102,0,0.05); }
        .rank-row.top-0 { border-color: var(--gold); box-shadow: 0 0 30px rgba(255, 215, 0, 0.1); }

        td { padding: 20px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); text-align: center; }
        td:first-child { border-left: 1px solid var(--border); border-radius: 20px 0 0 20px; font-weight: 900; font-size: 1.2rem; width: 80px; }
        td:last-child { border-right: 1px solid var(--border); border-radius: 0 20px 20px 0; color: var(--accent); font-weight: 900; font-size: 1.1rem; }

        .player-info-cell { display: flex; align-items: center; gap: 20px; text-align: left; }
        .rank-pfp { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; background: #111; }
        .player-meta { display: flex; flex-direction: column; gap: 5px; }
        .xp-pill { background: #000; color: var(--accent); padding: 3px 10px; border-radius: 6px; font-size: 0.65rem; font-weight: 800; border: 1px solid var(--accent); width: fit-content; }
        .flag-icon { height: 14px; border-radius: 3px; margin-left: 8px; vertical-align: middle; box-shadow: 0 0 10px rgba(0,0,0,0.5); }

        /* --- MODAL --- */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); }
        .modal-content { background: #0a0a0a; margin: 8vh auto; padding: 45px; width: 90%; max-width: 550px; border-radius: 40px; border: 1px solid var(--border); text-align: center; position: relative; }
        .u-lvl-btn { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); padding: 18px; border-radius: 15px; margin-bottom: 12px; text-decoration: none; color: #fff; border-left: 4px solid var(--accent); transition: 0.3s; }
        .u-lvl-btn:hover { background: rgba(255,255,255,0.08); transform: translateX(5px); }
    </style>
</head>
<body>

    <header>
        <h1>SCULLY <span>RANKING</span></h1>
        <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> VOLVER AL HUB</a>
    </header>

    <main class="wrapper">
        <table>
            <thead>
                <tr>
                    <th>POS</th>
                    <th style="text-align:left">LEYENDA</th>
                    <th>RÉCORDS</th>
                    <th>PUNTOS TOTALES</th>
                </tr>
            </thead>
            <tbody id="leaderboardBody">
                <tr><td colspan="4" style="color:#444; padding:100px;">Sincronizando Prestigio Global...</td></tr>
            </tbody>
        </table>
    </main>

    <div id="uModal" class="modal">
        <div class="modal-content" id="uModalContent"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://scullylist-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // PERSISTENCIA DE COLOR
        const savedColor = localStorage.getItem('scully-theme-color') || '#ff6600';
        document.documentElement.style.setProperty('--accent', savedColor);

        db.ref('/').on('value', (s) => {
            const data = s.val() || {};
            const lvls = data.levels || [];
            const players = Object.values(data.players || {});
            
            // 1. GENERAR LISTA MAESTRA (FUSIONANDO RECORDS Y FIRST VICTORS)
            let uniqueNicks = new Set([
                ...players.map(p => p.name.toLowerCase()), 
                ...lvls.map(l => l.first?.toLowerCase()).filter(Boolean)
            ]);
            
            let rankList = Array.from(uniqueNicks).map(nick => {
                const p = players.find(x => x.name.toLowerCase() === nick);
                const pName = p ? p.name : nick;
                let pts = 0;
                let recordCount = 0;
                
                // Niveles donde es el Primer Victor (Herencia Automática)
                const inherited = lvls.filter(l => l.first?.toLowerCase() === nick);

                // Sumar puntos de records manuales aprobados
                p?.completions?.forEach(c => {
                    const idx = lvls.findIndex(l => l.name.toLowerCase() === c.level.toLowerCase());
                    if(idx > -1) {
                        pts += parseFloat(Math.max(100 - (idx * 0.6), 5));
                        recordCount++;
                    }
                });

                // Sumar puntos de First Victor (si no los tiene ya sumados por record manual)
                inherited.forEach(il => {
                    const alreadyHas = p?.completions?.some(c => c.level.toLowerCase() === il.name.toLowerCase());
                    if(!alreadyHas) {
                        const idx = lvls.findIndex(l => l.name.toLowerCase() === il.name.toLowerCase());
                        if(idx > -1) {
                            pts += parseFloat(Math.max(100 - (idx * 0.6), 5));
                            recordCount++;
                        }
                    }
                });

                return {
                    name: pName,
                    pts: pts.toFixed(1),
                    lvl: Math.floor(pts / 50),
                    pfp: p?.pfp || 'https://i.imgur.com/8pw98K4.png',
                    country: p?.country || 'es',
                    recs: recordCount,
                    hidden: p?.hidden || false,
                    isVerifier: inherited.length > 0,
                    cosmetics: p?.cosmetics || {},
                    completions: p?.completions || [],
                    inheritedLevels: inherited.map(l => l.name)
                };
            }).filter(player => !player.hidden);

            // 2. ORDENAR POR PUNTOS
            rankList.sort((a, b) => parseFloat(b.pts) - parseFloat(a.pts));

            // 3. RENDERIZAR TABLA
            const body = document.getElementById('leaderboardBody');
            body.innerHTML = rankList.map((u, i) => {
                let cosPfp = u.cosmetics?.aura_fire ? "cos-fire" : (u.cosmetics?.aura_electric ? "cos-electric" : "");
                let cosName = u.cosmetics?.name_rainbow ? "cos-rainbow" : "";
                
                return `
                <tr class="rank-row top-${i}" onclick="openUserProfile('${u.name}')">
                    <td>${i+1}</td>
                    <td>
                        <div class="player-info-cell">
                            <img src="${u.pfp}" class="rank-pfp ${cosPfp}">
                            <div class="player-meta">
                                <b class="${cosName}">${u.name.toUpperCase()} 
                                    ${u.isVerifier ? '<i class="fas fa-check-circle" style="color:var(--blue); font-size:0.7rem;" title="First Victor"></i>' : ''}
                                    <img src="https://flagcdn.com/w40/${u.country}.png" class="flag-icon">
                                </b>
                                <span class="xp-pill">LVL ${u.lvl}</span>
                            </div>
                        </div>
                    </td>
                    <td><b style="color:#666;">${u.recs}</b> <small style="font-size:0.5rem; color:#333;">COMPLETADOS</small></td>
                    <td>${u.pts} <span style="font-size:0.6rem; opacity:0.5;">XP</span></td>
                </tr>`;
            }).join("");

            // Guardar para uso global
            window.fullRankList = rankList;
        });

        // 4. MODAL DE USUARIO
        function openUserProfile(nick) {
            const u = window.fullRankList.find(x => x.name.toLowerCase() === nick.toLowerCase());
            if(!u) return;

            let html = `
                <span onclick="closeM()" style="position:absolute; top:20px; right:25px; cursor:pointer; font-size:1.5rem; color:#444;">&times;</span>
                <img src="${u.pfp}" style="width:100px; height:100px; border-radius:50%; border:3px solid var(--accent); margin-bottom:15px; object-fit:cover;">
                <h2 style="margin:0; color:var(--accent); text-transform:uppercase;">${u.name}</h2>
                <div style="margin:15px 0;"><span class="xp-pill" style="font-size:0.8rem; padding:5px 15px;">LVL ${u.lvl} &bull; ${u.pts} XP</span></div>
                
                <div style="margin-top:25px; text-align:left; max-height:350px; overflow-y:auto; padding-right:10px;">
                    <small style="color:#444; font-weight:800; letter-spacing:1px; display:block; margin-bottom:15px;">HISTORIAL DE VICTORIAS:</small>
                    
                    ${u.inheritedLevels.map(l => `
                        <div class="u-lvl-btn" style="border-color:var(--blue); background:rgba(0,204,255,0.03);">
                            <span>${l}</span>
                            <small style="color:var(--blue); font-weight:800;">VERIFICADOR</small>
                        </div>
                    `).join("")}

                    ${u.completions.map(c => `
                        <a href="${c.link || '#'}" target="_blank" class="u-lvl-btn">
                            <span>${c.level}</span>
                            <i class="fab fa-youtube" style="color:#f00;"></i>
                        </a>
                    `).join("")}
                    
                    ${(u.inheritedLevels.length === 0 && u.completions.length === 0) ? '<p style="color:#333;">Sin registros activos.</p>' : ''}
                </div>`;

            document.getElementById('uModalContent').innerHTML = html;
            document.getElementById('uModal').style.display = "block";
        }

        function closeM() { document.getElementById('uModal').style.display = "none"; }
        window.onclick = function(e) { if(e.target == document.getElementById('uModal')) closeM(); }
    </script>
</body>
</html>
