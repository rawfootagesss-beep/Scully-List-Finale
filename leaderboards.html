<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scully Leaderboards | Ranking Global</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root { --accent: #ff6600; --bg: #050505; --card: #0a0a0a; --glow: 0 0 15px rgba(255, 102, 0, 0.3); }
        body { background: var(--bg); color: #fff; font-family: 'Lexend Deca', sans-serif; margin: 0; padding: 0; text-align: center; }
        
        .top-credits { display: flex; justify-content: center; gap: 20px; padding: 12px; background: rgba(0,0,0,0.8); border-bottom: 1px solid #111; font-size: 0.65rem; position: sticky; top: 0; z-index: 1000; }
        .credit-box i { color: var(--accent); margin-right: 5px; }

        header { padding: 50px 20px; }
        h1 { font-size: 2.5rem; letter-spacing: 5px; text-transform: uppercase; margin: 0; }
        h1 span { color: var(--accent); text-shadow: var(--glow); }

        .btn-container { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .btn-scully { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 10px 20px; text-decoration: none; font-size: 0.8rem; transition: 0.3s; cursor: pointer; display: inline-block; font-weight: bold; }
        .btn-scully:hover { background: var(--accent); color: #000; box-shadow: var(--glow); }

        .wrapper { width: 95%; max-width: 850px; margin: 20px auto; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { color: var(--accent); font-size: 0.65rem; text-transform: uppercase; padding: 10px; border-bottom: 1px solid #111; }
        .rank-row { background: var(--card); cursor: pointer; transition: 0.2s; }
        .rank-row:hover { border: 1px solid var(--accent); transform: translateY(-2px); }
        td { padding: 15px; border-top: 1px solid #151515; border-bottom: 1px solid #151515; }

        /* Panel Admin Pro */
        #adminPanel { display: none; background: #000; border: 1px solid var(--accent); padding: 25px; width: 95%; max-width: 900px; margin: 50px auto; border-radius: 10px; text-align: left; }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        input, select, textarea { width: 100%; background: #0a0a0a; border: 1px solid #222; color: #fff; padding: 10px; margin-bottom: 8px; font-family: 'Lexend Deca'; box-sizing: border-box; }
        
        /* Estilo de Niveles en Perfil */
        .u-lvl-btn { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 12px; border-radius: 5px; margin-bottom: 8px; text-decoration: none; color: #fff; border-left: 4px solid var(--accent); transition: 0.3s; }
        .u-lvl-btn:hover { background: #181818; transform: translateX(5px); box-shadow: var(--glow); }
        .u-lvl-btn i { color: var(--accent); font-size: 1.1rem; }

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); }
        .modal-content { background: #080808; margin: 5% auto; padding: 30px; width: 90%; max-width: 450px; border: 1px solid var(--accent); border-radius: 15px; position: relative; text-align: center; }
        .admin-access { margin: 80px 0 20px; opacity: 0.05; }
    </style>
</head>
<body>
    <nav class="top-credits">
        <div class="credit-box"><i class="fas fa-crown"></i> OWNER <span>score</span></div>
        <div class="credit-box"><i class="fas fa-user-shield"></i> ADMIN <span>Vegardo</span></div>
        <div class="credit-box"><i class="fas fa-hands-helping"></i> HELPER <span>Blitz</span></div>
        <div class="credit-box"><i class="fas fa-code"></i> CODIFICADOR <span>score</span></div>
    </nav>

    <header>
        <h1>SCULLY <span>LEADERBOARDS</span></h1>
        <div class="btn-container">
            <a href="index.html" class="btn-scully">REGRESAR AL DIRECTORIO</a>
            <a href="https://discord.gg/HDGzCVazwT" target="_blank" class="btn-scully" style="border-color:#5865F2; color:#5865F2;">DISCORD</a>
        </div>
    </header>

    <main class="wrapper">
        <table>
            <thead><tr><th>#</th><th style="text-align:left">Identidad</th><th>Puntos</th><th>Lvls</th></tr></thead>
            <tbody id="leaderboardBody"></tbody>
        </table>
    </main>

    <div class="admin-access"><i class="fas fa-lock" onclick="toggleAuth()"></i><div id="authBox" style="display:none;"><input type="password" id="tokenInput" placeholder="Token"><button class="btn-scully" onclick="checkAuth()">ENTRAR</button></div></div>
    
    <div id="adminPanel">
        <h4 style="color:var(--accent); text-align:center; text-transform:uppercase; margin-bottom: 20px;">Gestión de Jugadores con Pruebas</h4>
        <div class="admin-grid">
            <div>
                <p style="font-size:0.7rem; color:#444;">1. SELECCIONAR JUGADOR</p>
                <input type="text" id="targetUser" placeholder="Nombre del Jugador">
                <select id="targetCountry"><option value="cl">Chile</option><option value="ar">Argentina</option><option value="mx">México</option><option value="es">España</option></select>
                
                <p style="font-size:0.7rem; color:#444; margin-top:10px;">2. AÑADIR NIVEL + VIDEO</p>
                <select id="levelSelect"><option value="">-- Seleccionar Nivel --</option></select>
                <input type="text" id="levelLink" placeholder="URL del Video del Jugador (YouTube)">
                <button class="btn-scully" style="width:100%; background:var(--accent); color:#000; margin-top:5px;" onclick="addCompletion()">AÑADIR COMPLETION</button>
                
                <p style="font-size:0.7rem; color:#444; margin-top:20px;">NIVELES ACTUALES</p>
                <div id="currentUserLevels" style="max-height: 200px; overflow-y: auto; background: #080808; padding: 10px; border: 1px solid #111;"></div>
            </div>
            <div>
                <p style="font-size:0.7rem; color:#444;">LISTA GLOBAL (CLICK PARA EDITAR)</p>
                <div id="adminUserList" style="background:#080808; padding:10px; max-height:400px; overflow-y:auto; border:1px solid #111;"></div>
            </div>
        </div>
    </div>

    <div id="uModal" class="modal"><div class="modal-content" id="uModalContent"></div></div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://scullylist-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const TOKEN = "GdfuFCRy";

        let localDB = {};

        db.ref('/').on('value', (s) => {
            localDB = s.val() || { levels: [], players: [] };
            const lvls = localDB.levels || [];
            const players = Object.values(localDB.players || {});
            
            renderLeaderboard(lvls, players);
            updateLevelSelect(lvls);
            if(sessionStorage.getItem('scully_session') === 'active') {
                updateAdminUserList(players);
                const sel = document.getElementById('targetUser').value;
                if(sel) selectUser(sel);
            }
        });

        function calculatePoints(i) { return Math.max(100 - (i * 0.6), 5).toFixed(1); }

        function renderLeaderboard(lvls, players) {
            const b = document.getElementById('leaderboardBody');
            players.forEach(u => {
                let t = 0; 
                let list = u.completions || []; // Nuevo formato
                // Compatibilidad con viejo formato string
                if(u.levelList && list.length === 0) list = u.levelList.split(",").map(n => ({ level: n.trim() }));

                list.forEach(c => {
                    const idx = lvls.findIndex(l => l.name.trim().toLowerCase() === c.level.trim().toLowerCase());
                    if(idx > -1) t += parseFloat(calculatePoints(idx));
                });
                u.pts = t.toFixed(1); u.cnt = list.length;
            });
            players.sort((a,b) => b.pts - a.pts);
            b.innerHTML = players.map((u, i) => `<tr class="rank-row" onclick="openUserProfile('${u.name}')"><td>#${i+1}</td><td style="text-align:left;"><img src="https://flagcdn.com/w20/${u.country}.png" style="margin-right:10px;">${u.name}</td><td style="color:#ff6600; font-weight:bold;">${u.pts}</td><td>${u.cnt}</td></tr>`).join("");
        }

        function updateLevelSelect(lvls) {
            const sel = document.getElementById('levelSelect');
            const val = sel.value;
            sel.innerHTML = '<option value="">-- Seleccionar Nivel --</option>' + lvls.map(l => `<option value="${l.name}">${l.name}</option>`).join("");
            sel.value = val;
        }

        function selectUser(name) {
            document.getElementById('targetUser').value = name;
            const u = Object.values(localDB.players || {}).find(p => p.name === name);
            if(!u) return;
            document.getElementById('targetCountry').value = u.country;
            const list = u.completions || [];
            document.getElementById('currentUserLevels').innerHTML = list.map((c, i) => `
                <div style="display:flex; justify-content:space-between; font-size:0.7rem; background:#111; padding:5px; margin-bottom:5px; border-left:2px solid var(--accent);">
                    <span>${c.level}</span>
                    <i class="fas fa-trash" style="color:red; cursor:pointer;" onclick="removeCompletion(${i})"></i>
                </div>`).join("");
        }

        function addCompletion() {
            const name = document.getElementById('targetUser').value.trim();
            const level = document.getElementById('levelSelect').value;
            const link = document.getElementById('levelLink').value.trim();
            const country = document.getElementById('targetCountry').value;

            if(!name || !level) return alert("Jugador y Nivel requeridos");

            db.ref('players').once('value', (s) => {
                let players = Object.values(s.val() || {});
                let idx = players.findIndex(p => p.name.toLowerCase() === name.toLowerCase());
                
                let newCompletion = { level, link };

                if(idx > -1) {
                    if(!players[idx].completions) players[idx].completions = [];
                    if(players[idx].completions.find(c => c.level === level)) return alert("Ya tiene este nivel");
                    players[idx].completions.push(newCompletion);
                    players[idx].country = country;
                } else {
                    players.push({ name, country, completions: [newCompletion] });
                }
                db.ref('players').set(players);
                document.getElementById('levelLink').value = "";
            });
        }

        function removeCompletion(index) {
            const name = document.getElementById('targetUser').value;
            db.ref('players').once('value', (s) => {
                let p = Object.values(s.val() || {});
                let idx = p.findIndex(u => u.name === name);
                if(idx > -1) {
                    p[idx].completions.splice(index, 1);
                    db.ref('players').set(p);
                }
            });
        }

        function openUserProfile(n) {
            const u = Object.values(localDB.players || {}).find(x => x.name === n);
            const list = u.completions || [];
            
            const htmlList = list.map(c => `
                <a href="${c.link || '#'}" target="_blank" class="u-lvl-btn">
                    <span>${c.level}</span>
                    <i class="${c.link ? 'fab fa-youtube' : 'fas fa-question-circle'}"></i>
                </a>
            `).join("");

            document.getElementById('uModalContent').innerHTML = `
                <span onclick="closeM()" style="position:absolute; right:20px; top:10px; cursor:pointer; font-size:2rem; color:var(--accent)">&times;</span>
                <img src="https://flagcdn.com/w80/${u.country}.png" style="width:60px; margin-bottom:10px; border-radius:4px;">
                <h2 style="color:var(--accent); margin:0;">${u.name}</h2>
                <div style="margin-top:20px; text-align:left;">${htmlList || '<p>Sin niveles</p>'}</div>
            `;
            document.getElementById('uModal').style.display = "block";
        }

        function deleteUser(i) { if(confirm("¿Eliminar jugador?")) db.ref('players').once('value', (s) => { let p = Object.values(s.val() || {}); p.splice(i, 1); db.ref('players').set(p); }); }
        function toggleAuth() { const b = document.getElementById('authBox'); b.style.display = b.style.display === "block" ? "none" : "block"; }
        function checkAuth() { if(document.getElementById('tokenInput').value === TOKEN) { sessionStorage.setItem('scully_session', 'active'); location.reload(); } }
        function closeM() { document.getElementById('uModal').style.display = "none"; }
        function updateAdminUserList(p) { document.getElementById('adminUserList').innerHTML = p.map((u, i) => `<div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #111; font-size:0.75rem;"><span onclick="selectUser('${u.name}')" style="cursor:pointer; color:var(--accent); font-weight:bold;">${u.name}</span><i class="fas fa-trash" onclick="deleteUser(${i})" style="color:#300; cursor:pointer;"></i></div>`).join(""); }
        window.onload = () => { if(sessionStorage.getItem('scully_session') === 'active') document.getElementById('adminPanel').style.display = "block"; };
    </script>
</body>
</html>
