<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scully Leaderboards | Ranking</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root { --accent: #ff6600; --bg: #050505; --card: #0a0a0a; }
        body { background: var(--bg); color: #fff; font-family: 'Lexend Deca', sans-serif; margin: 0; text-align: center; }
        .top-credits { display: flex; justify-content: center; gap: 20px; padding: 12px; background: rgba(0,0,0,0.8); border-bottom: 1px solid #111; font-size: 0.65rem; }
        header { padding: 50px 20px; }
        h1 span { color: var(--accent); }
        .wrapper { width: 95%; max-width: 850px; margin: 20px auto; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        .rank-row { background: var(--card); cursor: pointer; transition: 0.2s; border: 1px solid #111; }
        .rank-row:hover { border-color: var(--accent); transform: translateY(-2px); }
        td { padding: 15px; border-top: 1px solid #151515; border-bottom: 1px solid #151515; }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); }
        .modal-content { background: #080808; margin: 5% auto; padding: 30px; width: 90%; max-width: 450px; border: 1px solid var(--accent); border-radius: 15px; position: relative; }
        .u-lvl-btn { display: flex; justify-content: space-between; background: #111; padding: 10px; border-radius: 5px; margin-bottom: 5px; text-decoration: none; color: #fff; font-size: 0.8rem; border-left: 3px solid var(--accent); }
    </style>
</head>
<body>
    <nav class="top-credits">
        <div class="credit-box"><i class="fas fa-crown"></i> OWNER <span>score</span></div>
        <div class="credit-box"><i class="fas fa-user-shield"></i> ADMIN <span>Vegardo</span></div>
        <div class="credit-box"><i class="fas fa-hands-helping"></i> HELPER <span>Blitz</span></div>
        <div class="credit-box"><i class="fas fa-hands-helping"></i> HELPER <span>Sopa354</span></div>
        <div class="credit-box"><i class="fas fa-code"></i> CODIFICADOR <span>score</span></div>
    </nav>
    <header><h1>SCULLY <span>LEADERBOARDS</span></h1><a href="index.html" style="color:var(--accent); text-decoration:none;">REGRESAR</a></header>
    <main class="wrapper"><table><tbody id="leaderboardBody"></tbody></table></main>
    <div id="uModal" class="modal"><div class="modal-content" id="uModalContent"></div></div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://scullylist-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let fullData = {};

        db.ref('/').on('value', (s) => {
            fullData = s.val() || {};
            const lvls = fullData.levels || [];
            const players = Object.values(fullData.players || {});
            players.forEach(u => {
                let t = 0; u.completions?.forEach(c => {
                    const idx = lvls.findIndex(l => l.name === c.level);
                    if(idx > -1) t += parseFloat(Math.max(100 - (idx * 0.6), 5));
                });
                u.pts = t.toFixed(1);
            });
            players.sort((a,b) => b.pts - a.pts);
            document.getElementById('leaderboardBody').innerHTML = players.map((u, i) => `
                <tr class="rank-row" onclick="openProfile('${u.name}')">
                    <td>#${i+1}</td>
                    <td style="text-align:left;"><img src="https://flagcdn.com/w20/${u.country}.png" style="margin-right:10px;">${u.name}</td>
                    <td style="color:var(--accent); font-weight:bold;">${u.pts} PTS</td>
                </tr>`).join("");
        });

        function openProfile(n) {
            const u = Object.values(fullData.players).find(x => x.name === n);
            document.getElementById('uModalContent').innerHTML = `
                <span onclick="closeM()" style="position:absolute; right:20px; top:10px; cursor:pointer; font-size:2rem; color:var(--accent)">&times;</span>
                <img src="https://flagcdn.com/w80/${u.country}.png" style="width:60px; margin-bottom:10px;">
                <h2 style="color:var(--accent); margin:0;">${u.name}</h2>
                <div style="margin-top:20px;">${u.completions?.map(c => `<a href="${c.link}" target="_blank" class="u-lvl-btn"><span>${c.level}</span><i class="fab fa-youtube"></i></a>`).join("") || 'Sin récords'}</div>
            `;
            document.getElementById('uModal').style.display = "block";
        }
        function closeM() { document.getElementById('uModal').style.display = "none"; }
    </script>
</body>
</html>
