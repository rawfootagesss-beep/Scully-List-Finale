<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Scully List | Status & Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root { 
            --accent: #ff6600; --accent-grad: linear-gradient(135deg, #ff6600 0%, #ff9900 100%);
            --bg: #030303; --card-bg: rgba(15, 15, 15, 0.7);
            --glow: 0 0 20px rgba(255, 102, 0, 0.2); --border: rgba(255, 255, 255, 0.05);
            --green: #00ff66; --red: #ff3333; --blue: #00ccff; --purple: #cc00ff; --yellow: #ffff00;
        }

        body { background: var(--bg); color: #fff; font-family: 'Lexend Deca', sans-serif; margin: 0; padding: 0; overflow-x: hidden; scroll-behavior: smooth; }

        /* MARQUESINA */
        .news-ticker { background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); padding: 12px 0; font-size: 0.65rem; position: sticky; top: 0; z-index: 1000; overflow: hidden; display: flex; }
        .ticker-content { display: flex; white-space: nowrap; animation: ticker-scroll 45s linear infinite; }
        .log-item { margin-right: 100px; letter-spacing: 2px; text-transform: uppercase; font-weight: 800; }
        @keyframes ticker-scroll { 0% { transform: translateX(60vw); } 100% { transform: translateX(-200%); } }

        /* STAFF BAR */
        .staff-bar { display: flex; justify-content: center; gap: 20px; padding: 10px; background: rgba(255,255,255,0.02); font-size: 0.55rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
        .staff-item b { color: var(--accent); }

        header { padding: 60px 20px 40px; text-align: center; }
        h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); font-weight: 800; margin: 0; }
        h1 span { background: var(--accent-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .btn-scully { background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: #fff; padding: 14px 28px; text-decoration: none; font-size: 0.75rem; border-radius: 50px; font-weight: 600; transition: 0.3s; text-transform: uppercase; cursor: pointer; }
        .btn-scully:hover { background: var(--accent); color: #000; transform: translateY(-3px); }

        /* SECCIÓN STATUS TRACKER (NUEVA) */
        .status-tracker { max-width: 600px; margin: 40px auto; padding: 30px; background: var(--card-bg); border-radius: 25px; border: 1px solid var(--border); text-align: center; }
        .status-result { margin-top: 20px; text-align: left; max-height: 200px; overflow-y: auto; }
        .status-pill { padding: 8px 15px; border-radius: 8px; margin-bottom: 10px; font-size: 0.75rem; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
        
        /* COLORES DE ESTADO */
        .st-pendiente { border-left: 4px solid var(--yellow); color: var(--yellow); }
        .st-revision { border-left: 4px solid var(--blue); color: var(--blue); }
        .st-consideracion { border-left: 4px solid var(--purple); color: var(--purple); }
        .st-rechazado { border-left: 4px solid var(--red); color: var(--red); }
        .st-aceptado { border-left: 4px solid var(--green); color: var(--green); }

        /* DIRECTORIO & FORMS */
        .list-grid { width: 95%; max-width: 1200px; margin: 40px auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .level-card { background: var(--card-bg); border-radius: 15px; padding: 12px; display: flex; align-items: center; cursor: pointer; border: 1px solid var(--border); transition: 0.3s; position: relative; }
        .level-card:hover { border-color: var(--accent); transform: scale(1.02); }
        .level-card img { width: 100px; height: 60px; border-radius: 8px; object-fit: cover; margin-right: 15px; }

        .glass-form { max-width: 550px; margin: 60px auto; background: var(--card-bg); padding: 40px; border-radius: 30px; border: 1px solid var(--border); }
        input, select { width: 100%; background: #0a0a0a !important; border: 1px solid #222; color: #fff !important; padding: 14px; border-radius: 12px; margin-bottom: 15px; font-family: 'Lexend Deca'; box-sizing: border-box; }
        option { background: #000 !important; color: #fff !important; }

        /* ADMIN PANEL */
        #adminPanel { display: none; background: #000; border: 2px solid var(--accent); padding: 30px; width: 95%; max-width: 1100px; margin: 40px auto; border-radius: 20px; }
        .admin-layout { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
        .admin-col { background: #080808; padding: 15px; border-radius: 10px; border: 1px solid #111; }
        .admin-sub-card { background: #000; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #222; font-size: 0.7rem; }
        .admin-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
        .admin-btns button { font-size: 0.6rem; padding: 5px; cursor: pointer; border: 1px solid #333; background: #111; color: #fff; }

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); }
        .modal-content { background: #0a0a0a; margin: 5vh auto; padding: 35px; width: 90%; max-width: 600px; border-radius: 25px; border: 1px solid var(--border); text-align: center; }
        .admin-lock { text-align: center; padding: 60px; opacity: 0.05; cursor: pointer; }
    </style>
</head>
<body>

    <div class="news-ticker">
        <div class="ticker-content" id="pulse-content">
            <span class="log-item">🚀 bienvenido scully miembro</span>
        </div>
    </div>

    <nav class="staff-bar">
        <div class="staff-item">OWNER <b>score</b></div>
        <div class="staff-item">ADMIN <b>Vegardo</b></div>
        <div class="staff-item">HELPER <b>Blitz</b></div>
        <div class="staff-item">HELPER <b>Sopa354</b></div>
        <div class="staff-item">CODIFICADOR <b>score</b></div>
    </nav>

    <header>
        <h1>THE SCULLY <span>LIST</span></h1>
        <div style="margin-top: 20px; display: flex; justify-content: center; gap: 15px;">
            <a href="leaderboards.html" class="btn-scully">Ranking</a>
            <a href="#checker" class="btn-scully">Ver Mi Récord</a>
        </div>
    </header>

    <section class="status-tracker" id="checker">
        <h2 style="color:var(--accent); font-size: 1rem; text-transform: uppercase;">Status de Récords</h2>
        <input type="text" id="checkInput" placeholder="Escribe tu Nick exacto..." style="margin-top:15px;">
        <button class="btn-scully" style="width:100%; border-radius:10px;" onclick="checkStatus()">Consultar</button>
        <div id="statusDisplay" class="status-result"></div>
    </section>

    <main class="list-grid" id="list-container"></main>

    <section class="form-section" id="submit">
        <div class="glass-form">
            <h2 style="margin-top:0; color:var(--accent);">Enviar Récord</h2>
            <input type="text" id="recPlayer" placeholder="Tu Nombre">
            <select id="recLevel"><option value="">-- Seleccionar Nivel --</option></select>
            <input type="text" id="recLink" placeholder="Link YouTube">
            <input type="text" id="recRaw" placeholder="Link RAW (Drive)">
            <label style="font-size:0.7rem; color:#666;"><input type="checkbox" id="rawOptional"> Top 101+ (RAW Opcional)</label>
            <select id="recCountry"><option value="es">España</option><option value="mx">México</option><option value="ar">Argentina</option><option value="cl">Chile</option><option value="co">Colombia</option><option value="pe">Perú</option></select>
            <button class="btn-scully" style="width:100%; background:var(--accent); color:#000; border:none; margin-top:20px;" onclick="submitRecord()">Enviar Récord</button>
        </div>
    </section>

    <div class="admin-lock" onclick="toggleAuth()"><i class="fas fa-lock"></i></div>

    <div id="adminPanel">
        <div class="admin-layout">
            <div class="admin-col">
                <p style="font-size:0.6rem; color:#444;">NIVELES</p>
                <input type="text" id="lvlName" placeholder="Nombre"><input type="text" id="lvlYT" placeholder="ID YouTube"><input type="number" id="lvlPos" placeholder="Top Pos">
                <button class="btn-scully" style="width:100%" onclick="saveLevel()">Publicar</button>
            </div>
            <div class="admin-col">
                <p style="font-size:0.6rem; color:var(--green);">GESTIÓN DE RÉCORDS</p>
                <div id="submissionsList"></div>
            </div>
            <div class="admin-col">
                <p style="font-size:0.6rem; color:var(--red);">BANS</p>
                <input type="text" id="banUser" placeholder="Nick"><button class="btn-scully" style="width:100%" onclick="banPlayer()">Banear</button>
                <div id="banList" style="font-size:0.6rem; margin-top:10px;"></div>
            </div>
        </div>
    </div>

    <div id="levelModal" class="modal"><div class="modal-content"><span onclick="closeM()" style="float:right; cursor:pointer;">&times;</span><div id="modal-body"></div></div></div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://scullylist-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const TOKEN = "GdfuFCRy";
        let fullData = {};

        db.ref('/').on('value', (s) => {
            fullData = s.val() || {};
            renderLevels(fullData.levels || []);
            updateLevelSelect(fullData.levels || []);
            updateTicker(fullData.logs || {});
            if(sessionStorage.getItem('scully_session') === 'active') {
                document.getElementById('adminPanel').style.display = "block";
                renderSubmissions(fullData.submissions || {});
                renderBanList(fullData.bans || {});
            }
        });

        // CONSULTAR STATUS (PÚBLICO)
        function checkStatus() {
            const nick = document.getElementById('checkInput').value.trim().toLowerCase();
            const cont = document.getElementById('statusDisplay');
            if(!nick) return;
            
            const subs = Object.values(fullData.submissions || {});
            const history = Object.values(fullData.history || {}); // Para ver aceptados/rechazados
            const all = [...subs, ...history];
            
            const results = all.filter(s => s.player.toLowerCase() === nick);
            if(results.length === 0) { cont.innerHTML = "<small style='color:#444;'>No se encontraron récords para este nick.</small>"; return; }
            
            cont.innerHTML = results.map(r => {
                const statusClass = "st-" + r.status.toLowerCase().replace(/ /g, "");
                return `<div class="status-pill ${statusClass}">
                    <span><b>${r.level}</b></span>
                    <span>${r.status.toUpperCase()}</span>
                </div>`;
            }).join("");
        }

        // CAMBIAR STATUS (ADMIN)
        function setStatus(key, newStatus) {
            const sub = fullData.submissions[key];
            if(!sub) return;
            const staff = prompt("¿Staff que actualiza?");
            
            if(newStatus === 'Aceptado' || newStatus === 'Rechazado') {
                const reason = newStatus === 'Rechazado' ? " (" + prompt("Razón:") + ")" : "";
                db.ref('history').push({...sub, status: newStatus});
                db.ref('logs').push({ type: newStatus === 'Aceptado' ? 'accept' : 'reject', msg: `${newStatus === 'Aceptado' ? '✅' : '❌'} ${sub.player} -> ${sub.level} ${newStatus.toUpperCase()} POR ${staff}${reason}` });
                db.ref('submissions/' + key).remove();
            } else {
                db.ref('submissions/' + key + '/status').set(newStatus);
            }
        }

        function submitRecord() {
            const r = document.getElementById('recRaw').value;
            const lName = document.getElementById('recLevel').value;
            const idx = fullData.levels.findIndex(l => l.name === lName);
            if(idx <= 99 && idx !== -1 && !r.includes("drive.google.com")) return alert("RAW OBLIGATORIO para el TOP 100.");
            
            db.ref('submissions').push({ 
                player: document.getElementById('recPlayer').value,
                level: lName, link: document.getElementById('recLink').value,
                raw: r || "N/A", country: document.getElementById('recCountry').value,
                status: "Pendiente" 
            });
            alert("Enviado con éxito. Revisa el Status Tracker.");
        }

        function renderSubmissions(s) {
            document.getElementById('submissionsList').innerHTML = Object.entries(s).map(([k, x]) => `
                <div class="admin-sub-card">
                    <b>${x.player}</b> -> ${x.level} [${x.status}]<br>
                    <div class="admin-btns">
                        <button onclick="setStatus('${k}','En revisión')">Revisión</button>
                        <button onclick="setStatus('${k}','En consideración')">Consideración</button>
                        <button onclick="setStatus('${k}','Aceptado')" style="color:var(--green)">ACEPTAR</button>
                        <button onclick="setStatus('${k}','Rechazado')" style="color:var(--red)">RECHAZAR</button>
                    </div>
                </div>`).join("");
        }

        // RESTO DE FUNCIONES (Diseño & Admin)
        function updateTicker(logs) { const c = document.getElementById('pulse-content'); const e = Object.values(logs).reverse().slice(0,8); if(e.length===0){c.innerHTML=`<span class="log-item">🚀 bienvenido scully miembro</span>`; return;} c.innerHTML = e.map(l => `<span class="log-item ${l.type==='accept'?'log-accept':'log-reject'}">${l.msg}</span>`).join(""); }
        function renderLevels(lvls) { const c = (i) => Math.max(100 - (i*0.6), 5).toFixed(1); document.getElementById('list-container').innerHTML = lvls.map((l, i) => `<div class="level-card" onclick="openDetails(${i})"><img src="https://img.youtube.com/vi/${l.id}/mqdefault.jpg"><div><h3 style="margin:0; font-size:0.9rem;">${l.name}</h3><p style="color:var(--accent); font-size:0.7rem; margin:0;">+${c(i)} PTS</p></div></div>`).join(""); }
        function updateLevelSelect(n) { document.getElementById('recLevel').innerHTML = '<option value="">-- Nivel --</option>' + n.map(l => `<option value="${l.name}">${l.name}</option>`).join(""); }
        function saveLevel() { const n = document.getElementById('lvlName').value; const y = document.getElementById('lvlYT').value; const p = parseInt(document.getElementById('lvlPos').value)-1; db.ref('levels').once('value', s => { let l = s.val() || []; l = l.filter(x => x.name.toLowerCase() !== n.toLowerCase()); l.splice(p >= 0 ? p : l.length, 0, { name: n, id: y }); db.ref('levels').set(l); }); }
        function banPlayer() { const n = document.getElementById('banUser').value.trim(); const staff = prompt("¿Staff?"); db.ref('bans').push(n); db.ref('logs').push({ type: 'reject', msg: `⛔ ${n} BANEADO POR ${staff || 'ADMIN'}` }); }
        function renderBanList(b) { document.getElementById('banList').innerHTML = "Baneados: " + Object.values(b).join(", "); }
        function openDetails(idx) { const l = fullData.levels[idx]; const victors = Object.values(fullData.players || {}).filter(v => (v.completions || []).some(c => c.level === l.name)); document.getElementById('modal-body').innerHTML = `<h1>${l.name}</h1><iframe width="100%" height="300" src="https://www.youtube.com/embed/${l.id}" frameborder="0" allowfullscreen style="border-radius:15px;"></iframe><div style="text-align:left; margin-top:15px;"><small>VICTORS:</small>${victors.map(v => `<div style="padding:5px; border-bottom:1px solid #111;">${v.name}</div>`).join("")}</div>`; document.getElementById('levelModal').style.display = "block"; }
        function toggleAuth() { const p = prompt("Token Admin:"); if(p === TOKEN) { sessionStorage.setItem('scully_session', 'active'); location.reload(); } }
        function closeM() { document.getElementById('levelModal').style.display = "none"; }
    </script>
</body>
</html>
