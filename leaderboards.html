<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scully Leaderboards | Control Maestro</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root { --accent: #ff6600; --bg: #050505; --card: #0a0a0a; --glow: 0 0 15px rgba(255, 102, 0, 0.3); }
        body { background: var(--bg); color: #fff; font-family: 'Lexend Deca', sans-serif; margin: 0; text-align: center; }
        .top-credits { display: flex; justify-content: center; gap: 20px; padding: 12px; background: rgba(0,0,0,0.8); border-bottom: 1px solid #111; font-size: 0.7rem; position: sticky; top: 0; z-index: 100; }
        .credit-box i { color: var(--accent); margin-right: 5px; }
        header { padding: 40px 20px; }
        h1 { font-weight: 700; letter-spacing: 4px; margin: 0; text-transform: uppercase; }
        h1 span { color: var(--accent); text-shadow: var(--glow); }
        .btn-scully { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 10px 25px; cursor: pointer; font-family: 'Lexend Deca'; transition: 0.3s; text-decoration: none; display: inline-block; margin: 5px; }
        .btn-scully:hover { background: var(--accent); color: #000; box-shadow: var(--glow); }
        .wrapper { width: 95%; max-width: 850px; margin: 20px auto; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { color: var(--accent); font-size: 0.65rem; text-transform: uppercase; padding: 10px; border-bottom: 1px solid #111; }
        .rank-row { background: var(--card); cursor: pointer; transition: 0.2s; }
        .rank-row:hover { background: #111; transform: translateY(-2px); border: 1px solid var(--accent); }
        td { padding: 15px; border-top: 1px solid #151515; border-bottom: 1px solid #151515; }
        #adminPanel { display: none; background: #000; border: 1px solid var(--accent); padding: 25px; margin: 40px auto; width: 90%; max-width: 900px; border-radius: 10px; text-align: left; box-sizing: border-box; }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        input, select, textarea { width: 100%; background: #0a0a0a; border: 1px solid #222; color: #fff; padding: 10px; margin-bottom: 10px; font-family: 'Lexend Deca'; box-sizing: border-box; }
        h4 { color: var(--accent); font-size: 0.7rem; margin-bottom: 10px; text-transform: uppercase; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .btn-red { background: #300; color: #f44; border: 1px solid #500; width: 100%; padding: 10px; cursor: pointer; font-family: 'Lexend Deca'; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(8px); }
        .modal-content { background: #080808; margin: 10% auto; padding: 30px; width: 90%; max-width: 450px; border: 1px solid var(--accent); border-radius: 15px; position: relative; }
        .close { position: absolute; right: 20px; top: 15px; color: var(--accent); font-size: 2rem; cursor: pointer; }
    </style>
</head>
<body>
    <nav class="top-credits">
        <div class="credit-box"><i class="fas fa-crown"></i> OWNER <span>score</span></div>
        <div class="credit-box"><i class="fas fa-user-shield"></i> ADMIN <span>Vegardo</span></div>
        <div class="credit-box"><i class="fas fa-hands-helping"></i> HELPER <span>Blitz</span></div>
        <div class="credit-box"><i class="fas fa-code"></i> CODIFICADOR <span>score</span></div>
    </nav>

    <header>
        <h1>SCULLY <span>LEADERBOARDS</span></h1>
        <a href="index.html" class="btn-scully">REGRESAR AL DIRECTORIO</a>
    </header>

    <main class="wrapper">
        <table>
            <thead>
                <tr><th>#</th><th style="text-align:left">Identidad</th><th>Puntos</th><th>Lvls</th></tr>
            </thead>
            <tbody id="leaderboardBody"></tbody>
        </table>

        <div class="auth-zone" style="margin-top: 60px; opacity: 0.02;">
            <input type="password" id="tokenInput" placeholder="..." style="width:120px; text-align:center;">
            <button class="btn-scully" onclick="checkAuth()">AUTENTICAR</button>
        </div>

        <div id="adminPanel">
            <div class="admin-grid">
                <div>
                    <h4>JUGADORES</h4>
                    <input type="text" id="targetUser" placeholder="Nombre">
                    <select id="targetCountry"><option value="cl">Chile</option><option value="ar">Argentina</option><option value="mx">México</option><option value="br">Brasil</option></select>
                    <textarea id="targetList" placeholder="Niveles..."></textarea>
                    <button class="btn-scully" style="width:100%;" onclick="saveUser()">GUARDAR</button>
                </div>
                <div>
                    <h4>DIRECTORIO</h4>
                    <input type="text" id="lvlName" placeholder="Nombre Nivel">
                    <input type="text" id="lvlYT" placeholder="ID YouTube">
                    <input type="text" id="lvlFirst" placeholder="Primer Victor">
                    <input type="number" id="lvlPos" placeholder="Puesto">
                    <textarea id="lvlVictors" placeholder="Otros Victors..."></textarea>
                    <button class="btn-scully" style="width:100%;" onclick="saveLevel()">PUBLICAR</button>
                </div>
                <div style="grid-column: 1 / -1; border-top: 1px solid var(--accent); padding-top: 20px; text-align: center;">
                    <button class="btn-scully" onclick="generarScriptJS()" style="background:var(--accent); color:#000; font-weight:bold; padding:15px 30px;">
                        DESCARGAR SCRIPT.JS ACTUALIZADO
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div id="uModal" class="modal"><div class="modal-content"><span class="close" onclick="closeM()">&times;</span><img id="uFlag" src="" style="width:60px;"><h2 id="uName"></h2><div id="uList"></div></div></div>

    <script src="script.js"></script>
    <script>
        const TOKEN = "GdfuFCRy";
        function checkAuth() { if(document.getElementById('tokenInput').value === TOKEN) document.getElementById('adminPanel').style.display = "block"; }
        
        function generarScriptJS() {
            const n = localStorage.getItem('scully_db_levels') || "[]";
            const r = localStorage.getItem('scully_ranks') || "[]";
            const script = `
// REINICIO FORZADO DE CACHÉ
localStorage.setItem('scully_db_levels', JSON.stringify(${n}));
localStorage.setItem('scully_ranks', JSON.stringify(${r}));

function getDBLevels() { return JSON.parse(localStorage.getItem('scully_db_levels')); }
function calculatePoints(i) { return Math.max(100 - (i * 0.6), 5).toFixed(1); }

function renderLevels(f = "") {
    const c = document.getElementById('list-container');
    if (!c) return;
    const db = getDBLevels();
    c.innerHTML = "";
    db.forEach((l, i) => {
        if (l.name.toLowerCase().includes(f.toLowerCase())) {
            c.innerHTML += '<div class="level-card" onclick="openDetails(' + i + ')"><div class="level-thumb"><img src="https://img.youtube.com/vi/' + l.id + '/mqdefault.jpg"></div><div class="level-info"><h2>' + l.name + '</h2><p style="color:#ff6600; font-weight:bold;">+' + calculatePoints(i) + ' PTS</p></div><div class="rank-number">#' + (i + 1) + '</div></div>';
        }
    });
}

function openDetails(i) {
    const l = getDBLevels()[i];
    const b = document.getElementById('modal-body');
    b.innerHTML = '<h1 style="color:#ff6600;">' + l.name + '</h1><iframe width="100%" height="250" src="https://www.youtube.com/embed/' + l.id + '" frameborder="0" allowfullscreen></iframe><p><b>FIRST:</b> ' + (l.first || "Nadie") + '</p><p><b>VICTORS:</b> ' + (l.victors ? l.victors.join(", ") : "Sin victors") + '</p>';
    document.getElementById('levelModal').style.display = "block";
}

function renderLeaderboard() {
    const b = document.getElementById('leaderboardBody');
    if (!b) return;
    const db = getDBLevels();
    let u = JSON.parse(localStorage.getItem('scully_ranks'));
    u.forEach(user => {
        let t = 0;
        let l = user.levelList ? user.levelList.split(",") : [];
        l.forEach(lvl => {
            const idx = db.findIndex(item => item.name.trim().toLowerCase() === lvl.trim().toLowerCase());
            if (idx > -1) t += parseFloat(calculatePoints(idx));
        });
        user.points = t.toFixed(1); user.count = l.length;
    });
    u.sort((a, b) => b.points - a.points);
    b.innerHTML = u.map((user, i) => '<tr class="rank-row"><td>#' + (i + 1) + '</td><td style="text-align:left;"><img src="https://flagcdn.com/w20/' + user.country + '.png" style="margin-right:10px;">' + user.name + '</td><td style="color:#ff6600; font-weight:bold;">' + user.points + '</td><td>' + user.count + '</td></tr>').join("");
}

document.addEventListener("DOMContentLoaded", () => { renderLevels(); renderLeaderboard(); });
            `;
            const blob = new Blob([script], { type: 'text/javascript' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'script.js'; a.click();
        }

        function saveLevel() {
            const name = document.getElementById('lvlName').value.trim();
            const id = document.getElementById('lvlYT').value.trim();
            const first = document.getElementById('lvlFirst').value.trim();
            const pos = parseInt(document.getElementById('lvlPos').value) - 1;
            const victors = document.getElementById('lvlVictors').value.split(',').filter(v => v.trim() !== "");
            let db = JSON.parse(localStorage.getItem('scully_db_levels')) || [];
            db = db.filter(l => l.name.toLowerCase() !== name.toLowerCase());
            db.splice(pos >= 0 ? pos : db.length, 0, { name, id, first, victors });
            localStorage.setItem('scully_db_levels', JSON.stringify(db));
            location.reload();
        }

        function saveUser() {
            const name = document.getElementById('targetUser').value.trim();
            const list = document.getElementById('targetList').value;
            const country = document.getElementById('targetCountry').value;
            let users = JSON.parse(localStorage.getItem('scully_ranks')) || [];
            const idx = users.findIndex(u => u.name.toLowerCase() === name.toLowerCase());
            if(idx > -1) users[idx] = { name, levelList: list, country };
            else users.push({ name, levelList: list, country });
            localStorage.setItem('scully_ranks', JSON.stringify(users));
            location.reload();
        }

        function closeM() { document.getElementById('uModal').style.display = "none"; }
        window.onload = renderLeaderboard;
    </script>
</body>
</html>
</body>
</html>
