<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ranking Global | Hub OMNI</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@800&family=Lexend+Deca:wght@400;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg: #030303; 
            --card: rgba(20,20,20,0.9); 
            --border: rgba(255,255,255,0.1); 
            --accent: #ff6600; 
            --blue: #00ccff; 
            --green: #00ff66; 
            --gold: #ffd700; 
            --cyan: #00ffff; 
            --red: #ff3333; 
        }
        
        body { 
            background: var(--bg); color: #fff; font-family: 'Lexend Deca', sans-serif; 
            margin: 0; padding: 0 0 50px 0; text-align: center; overflow-x: hidden;
        }

        /* TRADUCTOR SUTIL OCULTO */
        .goog-te-banner-frame.skiptranslate, .goog-te-gadget-icon { display: none !important; }
        body { top: 0px !important; }
        .goog-te-gadget-simple { background-color: transparent !important; border: none !important; font-size: 0 !important; }
        .goog-te-gadget-simple a { display: none !important; }
        
        .lang-toggle { 
            position: absolute; top: 15px; left: 20px; z-index: 5000; 
            background: rgba(255,255,255,0.05); border: 1px solid var(--border); 
            color: #aaa; padding: 6px 15px; border-radius: 20px; 
            font-size: 0.75rem; font-weight: 800; cursor: pointer; transition: 0.3s; 
            display: flex; align-items: center; gap: 8px; 
        }
        .lang-toggle:hover { color: #fff; border-color: var(--cyan); background: rgba(0,255,255,0.1); }

        header { padding: 60px 20px 20px; text-align: center; }
        h1 { font-size: clamp(2rem, 5vw, 3.5rem); margin: 0; text-transform: uppercase; font-weight: 800; letter-spacing: -1px; font-family: 'JetBrains Mono'; }
        h1 span { color: var(--gold); }
        
        .btn-hub { 
            background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: #fff; 
            padding: 10px 20px; text-decoration: none; font-size: 0.75rem; border-radius: 50px; 
            font-weight: 600; display: inline-flex; align-items: center; gap: 10px; 
            margin-top: 15px; transition: 0.3s; 
        }
        .btn-hub:hover { background: var(--accent); color: #000; border-color: var(--accent); }

        /* LIVE FEED DE ASCENSOS Y RÉCORDS */
        .news-ticker { 
            background: rgba(0,0,0,0.8); border-top: 1px solid #222; border-bottom: 1px solid var(--border); 
            padding: 10px 0; font-size: 0.75rem; font-family: 'JetBrains Mono'; 
            overflow: hidden; display: flex; margin-bottom: 30px; box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        .ticker-content { display: flex; white-space: nowrap; animation: ticker-scroll 35s linear infinite; }
        .log-item { margin-right: 80px; letter-spacing: 1px; text-transform: uppercase; font-weight: 800; color: #aaa; }
        .log-item span { color: #fff; }
        @keyframes ticker-scroll { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }

        .leaderboard-container { width: 95%; max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }

        /* --- PODIO DE LOS DIOSES (NUEVO) --- */
        .podium-container { display: flex; justify-content: center; align-items: flex-end; gap: 15px; flex-wrap: wrap; margin-bottom: 50px; margin-top: 20px; }
        .podium-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 20px;
            padding: 20px; text-align: center; position: relative; transition: 0.4s ease;
            width: 220px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center;
        }
        .podium-card:hover { transform: translateY(-10px); z-index: 10; }
        
        .rank-1 { order: 2; height: 310px; border-color: var(--gold); box-shadow: 0 0 30px rgba(255, 215, 0, 0.2); }
        .rank-2 { order: 1; height: 260px; border-color: #C0C0C0; box-shadow: 0 0 20px rgba(192, 192, 192, 0.1); }
        .rank-3 { order: 3; height: 240px; border-color: #CD7F32; box-shadow: 0 0 20px rgba(205, 127, 50, 0.1); }
        
        .podium-pfp { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #fff; background: #000; margin-bottom: 10px; }
        .rank-1 .podium-pfp { width: 110px; height: 110px; border-color: var(--gold); }
        
        .podium-crown { position: absolute; top: -30px; font-size: 2.5rem; color: var(--gold); filter: drop-shadow(0 0 15px var(--gold)); }
        
        .podium-badge {
            position: absolute; bottom: -15px; background: #000; border: 1px solid;
            padding: 5px 20px; border-radius: 20px; font-weight: 900; font-size: 0.85rem; font-family: 'JetBrains Mono';
        }
        .rank-1 .podium-badge { color: var(--gold); border-color: var(--gold); }
        .rank-2 .podium-badge { color: #C0C0C0; border-color: #C0C0C0; }
        .rank-3 .podium-badge { color: #CD7F32; border-color: #CD7F32; }

        /* --- COMPARATIVA PERSONAL (RADAR FLOTANTE) --- */
        #personal-tracker {
            position: fixed; bottom: 20px; right: 20px; background: rgba(10,10,10,0.95);
            border: 1px solid var(--cyan); padding: 15px 20px; border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.15); z-index: 5000; text-align: left;
            backdrop-filter: blur(10px); display: none; animation: slideUp 0.5s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }

        /* LISTA NORMAL Y STAFF PANEL */
        #staff-pfp-panel { display: none; background: rgba(0,204,255,0.05); border: 1px dashed var(--blue); border-radius: 15px; padding: 20px; margin-bottom: 30px; text-align: left; }
        .req-box { display: flex; align-items: center; justify-content: space-between; background: #111; border: 1px solid #333; padding: 10px 15px; border-radius: 10px; margin-bottom: 10px; flex-wrap: wrap; gap: 15px; }
        .req-info { display: flex; align-items: center; gap: 15px; }
        .req-img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid var(--blue); cursor: pointer; transition: 0.2s;}
        .req-img:hover { transform: scale(1.1); }
        .req-btns { display: flex; gap: 10px; }
        .btn-sm { padding: 8px 12px; font-weight: 800; font-size: 0.7rem; border-radius: 6px; cursor: pointer; border: none; text-transform: uppercase; transition: 0.2s; }
        .btn-ap { background: rgba(0,255,102,0.2); color: var(--green); border: 1px solid var(--green); } .btn-ap:hover { background: var(--green); color: #000; }
        .btn-rj { background: rgba(255,51,51,0.2); color: var(--red); border: 1px solid var(--red); } .btn-rj:hover { background: var(--red); color: #fff; }

        .tier-header { text-align: center; font-family: 'JetBrains Mono'; text-transform: uppercase; font-weight: 800; padding: 10px; margin: 30px 0 5px 0; letter-spacing: 2px; border-radius: 10px; }
        .header-core { background: linear-gradient(90deg, transparent, rgba(255,215,0,0.15), transparent); color: var(--gold); border-bottom: 1px solid var(--gold); }
        .tier-core { box-shadow: inset 0 0 30px rgba(255,215,0,0.03); }

        .player-card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 15px 20px; 
            display: flex; align-items: center; gap: 20px; position: relative; overflow: hidden; transition: 0.3s; cursor: pointer; 
        }
        .player-card:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0,0,0,0.5); border-color: var(--accent); }
        
        .rank-number { font-size: 2.2rem; font-weight: 800; color: rgba(255,255,255,0.1); width: 50px; text-align: center; }
        .player-pfp { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); background: #111; }
        
        .player-info { flex-grow: 1; text-align: left; }
        .player-info h3 { margin: 0 0 5px 0; font-size: 1.2rem; display: flex; align-items: center; gap: 8px; text-transform: uppercase; flex-wrap: wrap; }
        .player-flag { width: 24px; border-radius: 3px; box-shadow: 0 0 5px rgba(0,0,0,0.5); }
        .verifier-badge { font-size: 0.8rem; color: var(--blue); }
        .player-bio { font-size: 0.8rem; color: #aaa; margin: 0; line-height: 1.4; max-width: 85%; }
        
        .player-stats { text-align: right; display: flex; flex-direction: column; gap: 5px; z-index: 2; }
        .stat-badge { background: #000; padding: 6px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: 800; border: 1px solid var(--border); }
        .xp-text { color: var(--gold); }

        /* EFECTOS COSMÉTICOS DEL MOTOR UNIVERSAL */
        @keyframes rbwAnim { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
        .rbw-text { background: linear-gradient(90deg, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000); background-size: 200% auto; -webkit-background-clip: text; color: transparent !important; animation: rbwAnim 3s linear infinite; font-weight: 900; }
        .glitch-text { animation: shake 0.5s infinite; color: #fff; text-shadow: 2px 0 red, -2px 0 blue; }
        @keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 20% { transform: translate(-1px, -2px) rotate(-1deg); } 40% { transform: translate(-3px, 0px) rotate(1deg); } 60% { transform: translate(3px, 2px) rotate(0deg); } 80% { transform: translate(1px, -1px) rotate(1deg); } 100% { transform: translate(-1px, 2px) rotate(-1deg); } }

        /* MODAL DEL PERFIL COMPLETO */
        .modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); }
        .modal-content { background: #0a0a0a; margin: 5vh auto; padding: 35px; width: 90%; max-width: 550px; border-radius: 30px; border: 1px solid var(--border); text-align: center; position: relative; max-height: 85vh; overflow-y: auto; }
        .status-pill { padding: 12px; border-radius: 12px; margin-bottom: 8px; font-size: 0.8rem; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.5); border: 1px solid var(--border); text-decoration: none; color: inherit; transition: 0.3s; }
        .status-pill:hover { background: rgba(255,255,255,0.05); transform: translateX(5px); border-color: var(--accent); }
        .st-label { font-weight: 800; text-transform: uppercase; font-size: 0.65rem; padding: 4px 8px; border-radius: 6px; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
        
        @media(max-width: 768px) {
            .player-card { flex-direction: column; align-items: center; text-align: center; }
            .player-info { text-align: center; }
            .player-info h3 { justify-content: center; }
            .player-stats { flex-direction: row; justify-content: center; width: 100%; }
            .req-box { flex-direction: column; text-align: center; }
            .req-info { flex-direction: column; }
            .podium-card { width: 100%; height: auto !important; order: 0 !important; }
            .podium-crown { top: -15px; }
            #personal-tracker { bottom: 10px; right: 10px; left: 10px; text-align: center; }
        }
    </style>
</head>
<body>

    <div id="google_translate_element" style="display:none;"></div>
    <button class="lang-toggle notranslate" onclick="toggleLanguage()">
        <i class="fas fa-globe"></i> EN / ES
    </button>

    <header>
        <h1>RANKING <span>GLOBAL</span></h1>
        <p style="color:#666; font-size:0.8rem; margin-top:5px;">El panteón de los mejores jugadores de Geometry Dash</p>
        <a href="index.html" class="btn-hub"><i class="fas fa-arrow-left"></i> VOLVER AL HUB</a>
        <a href="perfil.html" class="btn-hub" style="border-color:var(--cyan); color:var(--cyan);"><i class="fas fa-user-circle"></i> MI PERFIL</a>
    </header>

    <div class="news-ticker">
        <div class="ticker-content" id="ranking-ticker">
            <span class="log-item">INICIANDO ESCÁNER DE RED...</span>
        </div>
    </div>

    <div class="leaderboard-container">
        
        <div id="staff-pfp-panel">
            <h3 style="color:var(--blue); margin-top:0; font-size:1rem; text-transform:uppercase;"><i class="fas fa-image"></i> Solicitudes de Foto de Perfil</h3>
            <div id="pfp-requests-list">
                <p style="color:#666; font-size:0.8rem;">Cargando base de datos...</p>
            </div>
        </div>

        <div id="podium-display" class="podium-container"></div>

        <div id="leaderboardList">
            <p style="text-align:center; color:#555;"><i class="fas fa-spinner fa-spin"></i> Cargando leyendas y sincronizando XP...</p>
        </div>

    </div>

    <div id="personal-tracker"></div>

    <div id="playerModal" class="modal">
        <div class="modal-content" id="modal-body"></div>
    </div>

    <script type="text/javascript">
        function googleTranslateElementInit() { new google.translate.TranslateElement({pageLanguage: 'es', includedLanguages: 'en,es', autoDisplay: false}, 'google_translate_element'); }
        function toggleLanguage() {
            var select = document.querySelector('.goog-te-combo');
            if(select) { select.value = select.value === 'en' ? 'es' : 'en'; select.dispatchEvent(new Event('change')); } 
            else { alert("Cargando traductor automático. Intenta en un segundo."); }
        }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    
    <script>
        // CONFIGURACIÓN FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyC2vrauBlplKGMjeLW3mLzZQr05khmH5v0",
            authDomain: "scullylist.firebaseapp.com",
            databaseURL: "https://scullylist-default-rtdb.firebaseio.com",
            projectId: "scullylist",
            storageBucket: "scullylist.firebasestorage.app",
            messagingSenderId: "498548914021",
            appId: "1:498548914021:web:59128b5e06b36a4e81938c"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let globalPlayers = [];
        let fullData = {};
        let isStaff = false;
        let myName = "Desconocido";
        const nx = o => o ? (Array.isArray(o) ? o.filter(Boolean) : Object.values(o)) : [];

        // VERIFICAR ROL DE STAFF (PARA EL PANEL DE FOTOS Y TRACKER PERSONAL)
        auth.onAuthStateChanged(user => {
            if(user) {
                db.ref('players').once('value').then(snap => {
                    let players = snap.val();
                    for(let k in players) {
                        if(players[k].email && players[k].email.toLowerCase() === user.email.toLowerCase()) {
                            myName = players[k].name;
                            let role = players[k].role || '';
                            if(role === 'admin' || role === 'mod' || role === 'helper' || myName.toLowerCase() === 'score') {
                                isStaff = true;
                                document.getElementById('staff-pfp-panel').style.display = 'block';
                            }
                            break;
                        }
                    }
                });
            }
        });

        // MOTOR UNIVERSAL DE COSMÉTICOS
        function getCosmetic(ac) {
            let nC = "", tG = "", bS = "1px solid var(--border)", eC = "";
            if(!ac) return {nC, tG, bS, eC};
            ac = ac.toUpperCase(); 
            
            if(ac.includes("VIP") || ac.includes("DORADO")){ nC="var(--gold)"; bS="2px solid var(--gold)"; }
            else if(ac.includes("HACKER") || ac.includes("MATRIX")){ nC="var(--green)"; tG="text-shadow:0 0 5px var(--green); font-family:'JetBrains Mono';"; bS="2px solid var(--green)"; }
            else if(ac.includes("AURA") || ac.includes("DEMON")){ nC="var(--red)"; bS="2px dashed var(--red)"; tG="text-shadow:0 0 5px var(--red);"; }
            else if(ac.includes("HIELO") || ac.includes("ICE")){ nC="#aaddff"; tG="text-shadow: 0 0 8px #00aaff;"; bS="2px solid #00aaff"; }
            else if(ac.includes("FUEGO") || ac.includes("FIRE")){ nC="#ff5500"; tG="text-shadow: 0 0 8px #ff2200;"; bS="2px solid #ff5500"; }
            else if(ac.includes("FANTASMA") || ac.includes("GHOST")){ nC="#ddd"; tG="opacity:0.8; text-shadow: 0 0 5px #fff;"; bS="2px solid #ccc"; }
            else if(ac.includes("RAINBOW") || ac.includes("NYAN")){ eC="rbw-text"; bS="2px solid #ff00ff"; }
            else if(ac.includes("GLITCH")){ eC="glitch-text"; bS="2px solid #00ffff"; tG="text-shadow: 2px 0 red, -2px 0 blue;"; }
            
            return {nC, tG, bS, eC};
        }

        db.ref('/').on('value', (s) => {
            fullData = s.val() || {};
            const levels = fullData.levels || [];
            let players = nx(fullData.players).filter(p => !p.hidden);
            
            // Render Panel PFP para Staff
            if(isStaff && fullData.pfp_requests) {
                renderPfpPanel(fullData.pfp_requests);
            } else if (isStaff) {
                document.getElementById('pfp-requests-list').innerHTML = "<p style='color:#666; font-size:0.8rem; margin:0;'>Bandeja limpia. No hay solicitudes pendientes.</p>";
            }
            
            // Recolector de Recientes para el Ticker
            let allCompletions = [];

            // Calcular XP y Nivel de Jugadores
            players.forEach(p => {
                let uniqueLevels = new Set();
                
                levels.forEach(l => { if(l.first?.toLowerCase() === p.name.toLowerCase()) uniqueLevels.add(l.name); });
                
                let compsArray = p.completions ? (Array.isArray(p.completions) ? p.completions : Object.values(p.completions)) : [];
                compsArray.forEach(c => {
                    uniqueLevels.add(c.level);
                    allCompletions.push({player: p.name, level: c.level, time: c.time || 0}); // Para el Ticker
                });
                
                let pts = 0;
                uniqueLevels.forEach(name => {
                    let idx = levels.findIndex(l => l.name === name);
                    if(idx > -1) { pts += Math.max(100 - (idx * 0.6), 5) * (levels[idx].bounty ? 2 : 1); }
                });
                
                pts += (p.totalXP || 0);

                p.pts = parseFloat(pts.toFixed(1));
                p.lvl = Math.floor(p.pts / 50);
                p.isVerifier = levels.some(l => l.first?.toLowerCase() === p.name.toLowerCase());
            });

            // Lógica del TICKER DE NOTICIAS
            allCompletions.sort((a,b) => b.time - a.time);
            let tickerHtml = allCompletions.slice(0, 15).map(c => `<span class="log-item"><i class="fas fa-bolt" style="color:var(--accent)"></i> <span>${c.player}</span> ha superado <span>${c.level}</span></span>`).join("");
            document.getElementById('ranking-ticker').innerHTML = tickerHtml || "<span class='log-item'>ESPERANDO NUEVOS RÉCORDS EN LA RED...</span>";

            // Ordenar Lista Final
            globalPlayers = players.sort((a,b) => b.pts - a.pts);
            renderLeaderboard(globalPlayers);

            // Lógica del RADAR PERSONAL
            if(myName !== "Desconocido") {
                let myIndex = globalPlayers.findIndex(p => p.name === myName);
                if(myIndex > -1) {
                    let me = globalPlayers[myIndex];
                    let trackerHtml = `
                        <div style="font-size:0.65rem; color:var(--cyan); text-transform:uppercase; letter-spacing:1px; margin-bottom:5px;">Tu Estatus Actual</div>
                        <div style="font-weight:900; font-size:1.2rem; color:#fff; display:flex; justify-content:space-between; gap:20px;">
                            <span>Rango #${myIndex + 1}</span>
                            <span style="color:var(--gold);">${me.pts.toFixed(1)} XP</span>
                        </div>
                    `;
                    
                    if(myIndex > 0) { // Si no eres el top 1
                        let nextPlayer = globalPlayers[myIndex - 1];
                        let diff = (nextPlayer.pts - me.pts).toFixed(1);
                        trackerHtml += `<div style="font-size:0.75rem; color:#aaa; margin-top:5px; border-top:1px solid #333; padding-top:5px;">A <b style="color:var(--red);">${diff} XP</b> de superar a <b style="color:#fff;">${nextPlayer.name}</b></div>`;
                    } else { // Si eres el Top 1
                        trackerHtml += `<div style="font-size:0.75rem; color:var(--gold); margin-top:5px; border-top:1px solid #333; padding-top:5px;"><i class="fas fa-crown"></i> Eres el Titán Absoluto de OMNI</div>`;
                    }
                    
                    document.getElementById('personal-tracker').innerHTML = trackerHtml;
                    document.getElementById('personal-tracker').style.display = 'block';
                }
            }
        });

        // RENDER DE PANEL PFP STAFF
        function renderPfpPanel(reqs) {
            let html = "";
            Object.entries(reqs).forEach(([id, req]) => {
                html += `
                <div class="req-box">
                    <div class="req-info">
                        <img src="${req.photo_url}" class="req-img" onerror="this.src='https://i.imgur.com/8pw98K4.png'" onclick="window.open('${req.photo_url}', '_blank')">
                        <div>
                            <h4 style="margin:0; font-size:0.9rem; color:#fff;">${req.player}</h4>
                            <p style="margin:0; font-size:0.7rem; color:#888;">Solicita cambio de foto</p>
                        </div>
                    </div>
                    <div class="req-btns">
                        <button class="btn-sm btn-ap" onclick="approvePfp('${id}', '${req.player}', '${req.photo_url}')"><i class="fas fa-check"></i> APROBAR</button>
                        <button class="btn-sm btn-rj" onclick="rejectPfp('${id}')"><i class="fas fa-times"></i> RECHAZAR</button>
                    </div>
                </div>`;
            });
            document.getElementById('pfp-requests-list').innerHTML = html || "<p style='color:#666; font-size:0.8rem; margin:0;'>Bandeja limpia. No hay solicitudes pendientes.</p>";
        }

        function approvePfp(id, playerName, photoUrl) {
            let pL = nx(fullData.players);
            let i = pL.findIndex(p => p.name.toLowerCase() === playerName.toLowerCase());
            if(i > -1) {
                pL[i].photo = photoUrl;
                db.ref('players').set(pL).then(() => {
                    db.ref(`pfp_requests/${id}`).remove();
                    db.ref('staff_logs').push({staff: myName, action: `Aprobó PFP de ${playerName}`, timestamp: Date.now()});
                });
            } else { alert("Error: Jugador no encontrado en la BD."); }
        }
        function rejectPfp(id) { db.ref(`pfp_requests/${id}`).remove(); }

        // RENDER LEADERBOARD Y PODIO
        function renderLeaderboard(players) {
            // Llenar el Podio de los Dioses (Top 3)
            let top3 = players.slice(0, 3);
            let podiumHtml = "";
            
            top3.forEach((p, index) => {
                let cos = getCosmetic(p.activeCosmetic);
                let safePfp = (p.photo && p.photo !== "null" && p.photo !== "undefined" && p.photo.trim() !== "") ? p.photo : (p.pfp && p.pfp !== "null" && p.pfp !== "undefined" && p.pfp.trim() !== "") ? p.pfp : 'https://i.imgur.com/8pw98K4.png';
                let isMe = (p.name === myName) ? "box-shadow: 0 0 30px rgba(0, 255, 255, 0.4);" : ""; // Resalta si el podio eres tú

                podiumHtml += `
                <div class="podium-card rank-${index+1} notranslate" style="${isMe}" onclick="openPlayerProfile(${index})">
                    ${index === 0 ? '<i class="fas fa-crown podium-crown"></i>' : ''}
                    <img src="${safePfp}" onerror="this.src='https://i.imgur.com/8pw98K4.png'" class="podium-pfp" style="border-color:${cos.nC || (index===0?'var(--gold)':(index===1?'#C0C0C0':'#CD7F32'))}">
                    <h3 class="${cos.eC}" style="color:${cos.nC || '#fff'}; ${cos.tG}; margin:0; font-size:1.3rem;">${p.name} ${p.verified ? '<i class="fas fa-check-circle" style="color:var(--cyan); font-size:0.9rem;"></i>' : ''}</h3>
                    <p style="color:#888; font-size:0.8rem; font-weight:800; margin:5px 0 0;">${p.pts.toFixed(1)} XP</p>
                    <div class="podium-badge">TITÁN #${index+1}</div>
                </div>`;
            });
            document.getElementById('podium-display').innerHTML = podiumHtml;

            // Llenar el resto de la lista (Desde el Top 4 en adelante)
            let html = "";
            players.slice(3).forEach((p, i) => {
                let rank = i + 4; // Empieza desde el 4
                if(p.pts === 0) return; 

                // TITULO DE TOP 10 SOLO SI ENTRA EN LA CONDICIÓN
                if (rank === 4) { html += `<div class="tier-header header-core"><i class="fas fa-meteor"></i> ELITE (TOP 10)</div>`; }
                else if (rank === 11) { html += `<div class="tier-header" style="color:#888; border-bottom:1px solid #333;">RETADORES</div>`; }

                let tierClass = rank <= 10 ? "tier-core" : "";
                let cos = getCosmetic(p.activeCosmetic);
                let verifierIcon = p.isVerifier ? `<i class="fas fa-check-circle verifier-badge" title="Verificador Original"></i>` : "";
                let vTick = p.verified ? `<i class="fas fa-check-circle" style="color:var(--cyan); font-size: 0.8rem;"></i>` : "";
                
                let flagHtml = "";
                if(p.country && p.country.trim() !== "") {
                    flagHtml = `<img src="https://flagcdn.com/w40/${p.country.toLowerCase()}.png" class="player-flag" title="${p.country.toUpperCase()}" alt="${p.country}">`;
                }

                let bio = p.bio ? p.bio : "<i>Sin biografía establecida.</i>";
                
                let safePfp = (p.photo && p.photo !== "null" && p.photo !== "undefined" && p.photo.trim() !== "") ? p.photo : (p.pfp && p.pfp !== "null" && p.pfp !== "undefined" && p.pfp.trim() !== "") ? p.pfp : 'https://i.imgur.com/8pw98K4.png';
                let isMeStyle = (p.name === myName) ? "border-color: var(--cyan); background: rgba(0, 255, 255, 0.05);" : `border: ${cos.bS};`;

                html += `
                <div class="player-card ${tierClass}" onclick="openPlayerProfile(${rank - 1})" style="${isMeStyle}">
                    <div class="rank-number">#${rank}</div>
                    
                    <img src="${safePfp}" onerror="this.src='https://i.imgur.com/8pw98K4.png'" class="player-pfp" style="border-color: ${cos.nC || 'var(--border)'};">
                    
                    <div class="player-info">
                        <h3 class="${cos.eC} notranslate" style="color: ${cos.nC || '#fff'}; ${cos.tG}">
                            ${flagHtml} ${p.name} ${vTick} ${verifierIcon}
                        </h3>
                        <p class="player-bio">${bio}</p>
                    </div>
                    
                    <div class="player-stats">
                        <div class="stat-badge xp-text" style="color: ${cos.nC || 'var(--gold)'};">${p.pts.toFixed(1)} XP</div>
                        <div class="stat-badge" style="color:#aaa;">LVL ${p.lvl}</div>
                    </div>
                </div>`;
            });
            document.getElementById('leaderboardList').innerHTML = html;
        }

        function openPlayerProfile(index) {
            const p = globalPlayers[index];
            const lvls = fullData.levels || [];
            
            const levelNamesOficiales = lvls.map(l => l.name.toLowerCase()); 
            let cos = getCosmetic(p.activeCosmetic);
            let verifHtml = ""; let verifiedNames = []; 
            
            lvls.forEach(l => {
                if(l.first?.toLowerCase() === p.name.toLowerCase()) {
                    verifiedNames.push(l.name.toLowerCase());
                    verifHtml += `<a href="https://youtu.be/${l.id}" target="_blank" class="status-pill" style="border-color:var(--cyan); color:var(--cyan); background:rgba(0,255,255,0.05);"><b>${l.name}</b> <span class="st-label" style="background:var(--cyan); color:#000;">VERIFICADOR <i class="fas fa-play"></i></span></a>`;
                }
            });

            let compHtml = "";
            let compsArray = p.completions ? (Array.isArray(p.completions) ? p.completions : Object.values(p.completions)) : [];
            
            if(compsArray.length > 0) {
                [...compsArray].reverse().forEach(c => {
                    let esNivelOficial = levelNamesOficiales.includes(c.level.toLowerCase());
                    if(!verifiedNames.includes(c.level.toLowerCase()) && esNivelOficial) {
                        compHtml += `<a href="${c.link}" target="_blank" class="status-pill"><b>${c.level}</b> <span class="st-label" style="color:var(--green)">COMPLETADO <i class="fas fa-play"></i></span></a>`;
                    }
                });
            }

            if(!verifHtml && !compHtml) compHtml = "<p style='color:#555; font-size:0.8rem; text-align:center;'>Sin récords de niveles oficiales.</p>";

            let flagProfileHtml = "";
            if(p.country && p.country.trim() !== "") { flagProfileHtml = `<img src="https://flagcdn.com/w40/${p.country.toLowerCase()}.png" class="player-flag" style="margin-right:10px;">`; }

            let vTick = p.verified ? `<i class="fas fa-check-circle" style="color:var(--cyan); font-size:1.2rem; margin-left:8px;"></i>` : "";
            let safePfpModal = (p.photo && p.photo !== "null" && p.photo !== "undefined" && p.photo.trim() !== "") ? p.photo : (p.pfp && p.pfp !== "null" && p.pfp !== "undefined" && p.pfp.trim() !== "") ? p.pfp : 'https://i.imgur.com/8pw98K4.png';

            document.getElementById('modal-body').innerHTML = `
                <span onclick="closeModal()" style="position:absolute; top:20px; right:25px; cursor:pointer; font-size:1.8rem; color:#666; transition:0.3s;">&times;</span>
                <img src="${safePfpModal}" onerror="this.src='https://i.imgur.com/8pw98K4.png'" style="width:110px; height:110px; border-radius:50%; border:3px solid ${cos.nC || 'var(--accent)'}; margin-bottom:15px; object-fit:cover;">
                <h2 style="margin:0; color:${cos.nC || '#fff'}; ${cos.tG}; text-transform:uppercase; font-size:1.8rem; display:flex; justify-content:center; align-items:center;" class="${cos.eC} notranslate">
                    ${flagProfileHtml} ${p.name} ${vTick}
                </h2>
                <div style="margin:10px 0 20px 0;">
                    <span style="background:#000; color:${cos.nC || 'var(--accent)'}; padding:8px 18px; border-radius:10px; font-size:0.8rem; font-weight:800; border:1px solid ${cos.nC || 'var(--accent)'};">
                        LVL ${p.lvl} (${p.pts.toFixed(1)} XP)
                    </span>
                </div>
                <div style="text-align:left; margin-top:25px;">
                    <h4 style="color:#888; text-transform:uppercase; font-size:0.75rem; letter-spacing:1px; border-bottom:1px solid #222; padding-bottom:8px; margin-bottom:15px;">Historial Oficial</h4>
                    <div style="max-height: 350px; overflow-y: auto; padding-right: 5px;">
                        ${verifHtml}
                        ${compHtml}
                    </div>
                </div>
            `;
            document.getElementById('playerModal').style.display = "block";
        }

        function closeModal() { document.getElementById('playerModal').style.display = "none"; }
        window.onclick = function(event) { let modal = document.getElementById('playerModal'); if (event.target == modal) { closeModal(); } }
    </script>
</body>
</html>
