<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scully List | Leaderboards</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg: #030303; --card: rgba(15,15,15,0.85); --border: rgba(255,255,255,0.05);
            --accent: #ff6600; --blue: #00ccff; --green: #00ff66; --gold: #ffd700;
        }
        body { background: var(--bg); color: #fff; font-family: 'Lexend Deca'; margin: 0; padding-bottom: 50px; }

        header { padding: 60px 20px 30px; text-align: center; }
        h1 { font-size: clamp(2rem, 5vw, 3.5rem); margin: 0; text-transform: uppercase; font-weight: 800; letter-spacing: -1px; }
        h1 span { color: var(--accent); }
        .btn-hub { background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: #fff; padding: 10px 20px; text-decoration: none; font-size: 0.75rem; border-radius: 50px; font-weight: 600; display: inline-flex; align-items: center; gap: 10px; margin-top: 15px; transition: 0.3s; }
        .btn-hub:hover { background: var(--accent); color: #000; }

        .leaderboard-container { width: 95%; max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }

        .player-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; display: flex; align-items: center; gap: 20px; position: relative; overflow: hidden; transition: 0.3s; cursor: pointer; }
        .player-card:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .player-card::after { content: 'VER PERFIL \f061'; font-family: 'Font Awesome 5 Free'; position: absolute; right: -100px; font-weight: 900; font-size: 0.7rem; color: var(--accent); transition: 0.3s; opacity: 0; }
        .player-card:hover::after { right: 20px; opacity: 1; }

        .rank-number { font-size: 2.5rem; font-weight: 800; color: rgba(255,255,255,0.1); width: 50px; text-align: center; }
        
        .player-pfp { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); background: #111; }
        
        .player-info { flex-grow: 1; }
        .player-info h3 { margin: 0 0 5px 0; font-size: 1.2rem; display: flex; align-items: center; gap: 8px; text-transform: uppercase; flex-wrap: wrap; }
        
        /* ESTILO PARA LA BANDERA */
        .player-flag { width: 24px; border-radius: 3px; box-shadow: 0 0 5px rgba(0,0,0,0.5); }
        
        .verifier-badge { font-size: 0.8rem; color: var(--blue); }
        
        .player-bio { font-size: 0.8rem; color: #aaa; margin: 0 0 10px 0; line-height: 1.4; max-width: 85%; }
        
        .social-links { display: flex; gap: 12px; font-size: 1.1rem; }
        .social-links a, .social-links span { color: #666; transition: 0.3s; text-decoration: none; cursor: pointer; }
        .social-links a.yt:hover { color: #ff3333; }
        .social-links a.tw:hover { color: #1da1f2; }
        .social-links span.dc:hover { color: #7289da; }

        .player-stats { text-align: right; display: flex; flex-direction: column; gap: 8px; z-index: 2; transition: 0.3s; }
        .player-card:hover .player-stats { transform: translateX(-30px); }
        .stat-badge { background: #000; padding: 6px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: 800; border: 1px solid var(--border); }
        .xp-text { color: var(--accent); }

        /* EFECTOS COSMÉTICOS DEL MOTOR UNIVERSAL */
        @keyframes rbwAnim { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
        .rbw-text { 
            background: linear-gradient(90deg, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000); 
            background-size: 200% auto; -webkit-background-clip: text; color: transparent !important; 
            animation: rbwAnim 3s linear infinite; font-weight: 900; 
        }

        /* MODAL DEL PERFIL COMPLETO */
        .modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); }
        .modal-content { background: #0a0a0a; margin: 5vh auto; padding: 35px; width: 90%; max-width: 550px; border-radius: 30px; border: 1px solid var(--border); text-align: center; position: relative; max-height: 85vh; overflow-y: auto; }
        .status-pill { padding: 12px; border-radius: 12px; margin-bottom: 8px; font-size: 0.8rem; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.5); border: 1px solid var(--border); text-decoration: none; color: inherit; transition: 0.3s; }
        .status-pill:hover { background: rgba(255,255,255,0.05); transform: translateX(5px); border-color: var(--accent); }
        .st-label { font-weight: 800; text-transform: uppercase; font-size: 0.65rem; padding: 4px 8px; border-radius: 6px; }
        
        /* SCROLLBAR MODAL */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

    <header>
        <h1>RANKING <span>GLOBAL</span></h1>
        <p style="color:#666; font-size:0.8rem; margin-top:5px;">Haz clic en un jugador para ver sus récords y cosméticos</p>
        <a href="index.html" class="btn-hub"><i class="fas fa-arrow-left"></i> VOLVER AL HUB</a>
        <a href="perfil.html" class="btn-hub" style="border-color:var(--blue); color:var(--blue);"><i class="fas fa-user-circle"></i> MI PERFIL</a>
    </header>

    <div class="leaderboard-container" id="leaderboardList">
        <p style="text-align:center; color:#555;"><i class="fas fa-spinner fa-spin"></i> Cargando leyendas...</p>
    </div>

    <div id="playerModal" class="modal">
        <div class="modal-content" id="modal-body"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script>
        // CONFIGURACIÓN EXACTA
        const firebaseConfig = {
            apiKey: "AIzaSyC2vrauBlplKGMjeLW3mLzZQr05khmH5v0",
            authDomain: "scullylist.firebaseapp.com",
            databaseURL: "https://scullylist-default-rtdb.firebaseio.com",
            projectId: "scullylist",
            storageBucket: "scullylist.firebasestorage.app",
            messagingSenderId: "498548914021",
            appId: "1:498548914021:web:59128b5e06b36a4e81938c",
            measurementId: "G-X3JF2DVWYH"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let globalPlayers = [];
        let fullData = {};

        // LÓGICA DE CÁLCULO DE COSMÉTICOS
        function getCosmetic(ac) {
            let nC = "", tG = "", bS = "1px solid var(--border)", eC = "";
            if(!ac) return {nC, tG, bS, eC};
            ac = ac.toUpperCase();
            
            if(ac.includes("VIP") || ac.includes("DORADO")){ nC="var(--gold)"; bS="2px solid var(--gold)"; }
            else if(ac.includes("HACKER") || ac.includes("MATRIX")){ nC="var(--green)"; tG="text-shadow:0 0 5px var(--green); font-family:'JetBrains Mono';"; bS="2px solid var(--green)"; }
            else if(ac.includes("AURA") || ac.includes("DEMON")){ nC="var(--red)"; bS="2px dashed var(--red)"; tG="text-shadow:0 0 5px var(--red);"; }
            else if(ac.includes("HIELO") || ac.includes("ICE")){ nC="#aaddff"; tG="text-shadow: 0 0 8px #00aaff;"; bS="2px solid #00aaff"; }
            else if(ac.includes("FUEGO") || ac.includes("FIRE")){ nC="#ff5500"; tG="text-shadow: 0 0 8px #ff2200;"; bS="2px solid #ff5500"; }
            else if(ac.includes("FANTASMA") || ac.includes("GHOST")){ nC="#ddd"; tG="opacity:0.8; text-shadow: 0 0 5px #fff;"; bS="2px solid #ccc"; }
            else if(ac.includes("RAINBOW") || ac.includes("ARCOIRIS")){ eC="rbw-text"; bS="2px solid #ff00ff"; }
            
            return {nC, tG, bS, eC};
        }

        db.ref('/').on('value', (s) => {
            fullData = s.val() || {};
            const levels = fullData.levels || [];
            let players = Object.values(fullData.players || {}).filter(p => !p.hidden);
            
            players.forEach(p => {
                let uniqueLevels = new Set();
                
                // Buscar verificados
                levels.forEach(l => { if(l.first?.toLowerCase() === p.name.toLowerCase()) uniqueLevels.add(l.name); });
                
                // Asegurar que completions sea un array
                let compsArray = p.completions ? (Array.isArray(p.completions) ? p.completions : Object.values(p.completions)) : [];
                compsArray.forEach(c => uniqueLevels.add(c.level));
                
                let pts = 0;
                uniqueLevels.forEach(name => {
                    let idx = levels.findIndex(l => l.name === name);
                    if(idx > -1) {
                        let bountyMult = levels[idx].bounty ? 2 : 1;
                        pts += Math.max(100 - (idx * 0.6), 5) * bountyMult;
                    }
                });
                
                // Sumar la XP manual que pueda tener
                pts += (p.totalXP || 0);

                p.pts = parseFloat(pts.toFixed(1));
                p.lvl = Math.floor(p.pts / 50);
                p.isVerifier = levels.some(l => l.first?.toLowerCase() === p.name.toLowerCase());
            });

            // Ordenar por Puntos y guardar en variable global
            globalPlayers = players.sort((a,b) => b.pts - a.pts);
            renderLeaderboard(globalPlayers);
        });

        function renderLeaderboard(players) {
            let html = "";
            players.forEach((p, index) => {
                if(p.pts === 0) return; 
                
                // Aplicar el motor de cosméticos al jugador
                let cos = getCosmetic(p.activeCosmetic);
                
                let verifierIcon = p.isVerifier ? `<i class="fas fa-check-circle verifier-badge" title="Verificador Original"></i>` : "";
                
                // LÓGICA DE BANDERA AÑADIDA
                let flagHtml = "";
                if(p.country && p.country.trim() !== "") {
                    // Usamos FlagCDN para mostrar la bandera en alta calidad
                    flagHtml = `<img src="https://flagcdn.com/w40/${p.country.toLowerCase()}.png" class="player-flag" title="${p.country.toUpperCase()}" alt="${p.country}">`;
                }

                let bio = p.bio ? p.bio : "<i>Sin biografía establecida.</i>";
                
                let socialsHtml = "";
                if(p.socials) {
                    if(p.socials.yt) socialsHtml += `<a href="${p.socials.yt}" target="_blank" class="yt" onclick="event.stopPropagation()"><i class="fab fa-youtube"></i></a>`;
                    if(p.socials.tw) socialsHtml += `<a href="${p.socials.tw}" target="_blank" class="tw" onclick="event.stopPropagation()"><i class="fab fa-twitter"></i></a>`;
                    if(p.socials.dc) socialsHtml += `<span class="dc" title="${p.socials.dc} (Cópialo)" onclick="event.stopPropagation(); alert('Discord de ${p.name}: ${p.socials.dc}');"><i class="fab fa-discord"></i></span>`;
                }

                html += `
                <div class="player-card" onclick="openPlayerProfile(${index})" style="border: ${cos.bS};">
                    <div class="rank-number">#${index + 1}</div>
                    
                    <img src="${p.pfp || p.photo || 'https://i.imgur.com/8pw98K4.png'}" class="player-pfp" style="border-color: ${cos.nC || 'var(--accent)'};">
                    
                    <div class="player-info">
                        <h3 class="${cos.eC}" style="color: ${cos.nC || '#fff'}; ${cos.tG}">
                            ${flagHtml} ${p.name} ${verifierIcon}
                        </h3>
                        <p class="player-bio">${bio}</p>
                        <div class="social-links">${socialsHtml}</div>
                    </div>
                    
                    <div class="player-stats">
                        <div class="stat-badge xp-text" style="color: ${cos.nC || 'var(--accent)'};">${p.pts} XP</div>
                        <div class="stat-badge">LVL ${p.lvl}</div>
                    </div>
                </div>`;
            });
            document.getElementById('leaderboardList').innerHTML = html || "<p style='text-align:center; color:#888;'>No hay jugadores en el ranking aún.</p>";
        }

        // FUNCIÓN PARA EL PERFIL COMPLETO (MODAL)
        function openPlayerProfile(index) {
            const p = globalPlayers[index];
            const lvls = fullData.levels || [];
            
            // Obtener cosméticos para la vista del Modal
            let cos = getCosmetic(p.activeCosmetic);

            let verifHtml = "";
            let verifiedNames = []; 
            
            lvls.forEach(l => {
                if(l.first?.toLowerCase() === p.name.toLowerCase()) {
                    verifiedNames.push(l.name.toLowerCase());
                    verifHtml += `<a href="https://youtu.be/${l.id}" target="_blank" class="status-pill" style="border-color:var(--blue); color:var(--blue); background:rgba(0,204,255,0.05);"><b>${l.name}</b> <span class="st-label" style="background:var(--blue); color:#000;">VERIFICADOR <i class="fas fa-play"></i></span></a>`;
                }
            });

            let compHtml = "";
            let compsArray = p.completions ? (Array.isArray(p.completions) ? p.completions : Object.values(p.completions)) : [];
            
            if(compsArray.length > 0) {
                // Invertimos el array para ver los recientes primero
                [...compsArray].reverse().forEach(c => {
                    if(!verifiedNames.includes(c.level.toLowerCase())) {
                        compHtml += `<a href="${c.link}" target="_blank" class="status-pill"><b>${c.level}</b> <span class="st-label" style="color:var(--green)">COMPLETADO <i class="fas fa-play"></i></span></a>`;
                    }
                });
            }

            if(!verifHtml && !compHtml) compHtml = "<p style='color:#555; font-size:0.8rem; text-align:center;'>Sin récords registrados aún.</p>";

            // Agregar la bandera también en la ventana grande del perfil
            let flagProfileHtml = "";
            if(p.country && p.country.trim() !== "") {
                flagProfileHtml = `<img src="https://flagcdn.com/w40/${p.country.toLowerCase()}.png" class="player-flag" style="margin-right:10px;">`;
            }

            document.getElementById('modal-body').innerHTML = `
                <span onclick="closeModal()" style="position:absolute; top:20px; right:25px; cursor:pointer; font-size:1.8rem; color:#666; transition:0.3s;">&times;</span>
                
                <img src="${p.pfp || p.photo || 'https://i.imgur.com/8pw98K4.png'}" style="width:110px; height:110px; border-radius:50%; border:3px solid ${cos.nC || 'var(--accent)'}; margin-bottom:15px; object-fit:cover;">
                
                <h2 style="margin:0; color:${cos.nC || '#fff'}; ${cos.tG}; text-transform:uppercase; font-size:1.8rem; display:flex; justify-content:center; align-items:center;" class="${cos.eC}">
                    ${flagProfileHtml} ${p.name}
                </h2>
                
                <div style="margin:10px 0 20px 0;">
                    <span style="background:#000; color:${cos.nC || 'var(--accent)'}; padding:8px 18px; border-radius:10px; font-size:0.8rem; font-weight:800; border:1px solid ${cos.nC || 'var(--accent)'};">
                        LVL ${p.lvl} (${p.pts} XP)
                    </span>
                </div>
                
                <div style="text-align:left; margin-top:25px;">
                    <h4 style="color:#888; text-transform:uppercase; font-size:0.75rem; letter-spacing:1px; border-bottom:1px solid #222; padding-bottom:8px; margin-bottom:15px;">Historial de Récords</h4>
                    <div style="max-height: 350px; overflow-y: auto; padding-right: 5px;">
                        ${verifHtml}
                        ${compHtml}
                    </div>
                </div>
            `;
            
            document.getElementById('playerModal').style.display = "block";
        }

        function closeModal() {
            document.getElementById('playerModal').style.display = "none";
        }

        window.onclick = function(event) {
            let modal = document.getElementById('playerModal');
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
