<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scully Leaderboards | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root { --accent: #ff6600; --bg: #050505; --card: #0a0a0a; --glow: 0 0 15px rgba(255, 102, 0, 0.3); }
        body { background: var(--bg); color: #fff; font-family: 'Lexend Deca', sans-serif; margin: 0; text-align: center; }
        .wrapper { width: 95%; max-width: 850px; margin: 20px auto; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { color: var(--accent); font-size: 0.65rem; text-transform: uppercase; padding: 10px; border-bottom: 1px solid #111; }
        .rank-row { background: var(--card); cursor: pointer; transition: 0.2s; }
        td { padding: 15px; border-top: 1px solid #151515; border-bottom: 1px solid #151515; }
        #adminPanel { display: none; background: #000; border: 1px solid var(--accent); padding: 25px; margin: 40px auto; width: 90%; max-width: 900px; border-radius: 10px; text-align: left; }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        input, select, textarea { width: 100%; background: #0a0a0a; border: 1px solid #222; color: #fff; padding: 10px; margin-bottom: 10px; font-family: 'Lexend Deca'; box-sizing: border-box; }
        h4 { color: var(--accent); font-size: 0.7rem; margin-bottom: 10px; text-transform: uppercase; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .btn-scully { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 10px 25px; cursor: pointer; font-family: 'Lexend Deca'; text-decoration: none; display: inline-block; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(8px); }
        .modal-content { background: #080808; margin: 10% auto; padding: 30px; width: 90%; max-width: 450px; border: 1px solid var(--accent); border-radius: 15px; position: relative; }
    </style>
</head>
<body>
    <header style="padding:40px 0;">
        <h1>SCULLY <span>LEADERBOARDS</span></h1>
        <a href="index.html" class="btn-scully">VOLVER AL INICIO</a>
    </header>

    <main class="wrapper">
        <table>
            <thead><tr><th>#</th><th style="text-align:left">Identidad</th><th>Puntos</th><th>Lvls</th></tr></thead>
            <tbody id="leaderboardBody"></tbody>
        </table>

        <div style="margin-top: 60px; opacity: 0.05;">
            <input type="password" id="tokenInput" placeholder="..." style="width:120px; text-align:center;">
            <button class="btn-scully" onclick="checkAuth()">ENTRAR</button>
        </div>

        <div id="adminPanel">
            <div class="admin-grid">
                <div>
                    <h4>JUGADORES</h4>
                    <input type="text" id="targetUser" placeholder="Nombre">
                    <select id="targetCountry"><option value="cl">Chile</option><option value="ar">Argentina</option><option value="mx">México</option></select>
                    <textarea id="targetList" placeholder="Lista (Separada por coma)"></textarea>
                    <button class="btn-scully" style="width:100%;" onclick="saveUser()">GUARDAR</button>
                </div>
                <div>
                    <h4>DIRECTORIO</h4>
                    <input type="text" id="lvlName" placeholder="Nombre Nivel">
                    <input type="text" id="lvlYT" placeholder="ID YouTube">
                    <input type="text" id="lvlFirst" placeholder="Primer Victor">
                    <input type="number" id="lvlPos" placeholder="Puesto">
                    <textarea id="lvlVictors" placeholder="Otros Victors..."></textarea>
                    <button class="btn-scully" style="width:100%;" onclick="saveLevel()">PUBLICAR</button>
                </div>
                <div style="grid-column: 1 / -1; text-align: center; border-top: 1px solid var(--accent); padding-top: 20px;">
                    <button class="btn-scully" onclick="descargarScript()" style="background:var(--accent); color:#000; font-weight:bold; padding:15px 30px;">
                        DESCARGAR SCRIPT.JS PARA CLOUDFLARE
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div id="uModal" class="modal"><div class="modal-content" id="uModalContent"></div></div>

    <script src="script.js"></script>
    <script>
        const TOKEN = "GdfuFCRy";
        function checkAuth() { if(document.getElementById('tokenInput').value === TOKEN) { sessionStorage.setItem('scully_session', 'active'); location.reload(); } }
        window.onload = function() { if(sessionStorage.getItem('scully_session') === 'active') document.getElementById('adminPanel').style.display = "block"; if(typeof renderLeaderboard === 'function') renderLeaderboard(); };

        function descargarScript() {
            const n = localStorage.getItem('scully_db_levels') || "[]";
            const r = localStorage.getItem('scully_ranks') || "[]";
            const script = `
// REINICIO DE DATOS
const niveles = ${n};
const ranking = ${r};
localStorage.setItem('scully_db_levels', JSON.stringify(niveles));
localStorage.setItem('scully_ranks', JSON.stringify(ranking));

function calculatePoints(i) { return Math.max(100 - (i * 0.6), 5).toFixed(1); }

function renderLevels() {
    const cont = document.getElementById('list-container');
    if(!cont) return;
    cont.innerHTML = "";
    niveles.forEach((l, i) => {
        cont.innerHTML += '<div class="level-card" onclick="openDetails(' + i + ')"><div class="level-thumb"><img src="https://img.youtube.com/vi/' + l.id + '/mqdefault.jpg"></div><div class="level-info"><h2>' + l.name + '</h2><p style="color:#ff6600; font-weight:bold;">+' + calculatePoints(i) + ' PTS</p></div><div class="rank-number">#' + (i + 1) + '</div></div>';
    });
}

function openDetails(i) {
    const l = niveles[i];
    const modal = document.getElementById('levelModal');
    document.getElementById('modal-body').innerHTML = '<h1 style="color:#ff6600;">' + l.name + '</h1><iframe width="100%" height="250" src="https://www.youtube.com/embed/' + l.id + '" frameborder="0" allowfullscreen></iframe><p><b>FIRST:</b> ' + (l.first || "Nadie") + '</p>';
    modal.style.display = "block";
}

function renderLeaderboard() {
    const b = document.getElementById('leaderboardBody');
    if(!b) return;
    ranking.forEach(u => {
        let t = 0;
        let list = u.levelList ? u.levelList.split(",") : [];
        list.forEach(lvl => {
            const idx = niveles.findIndex(item => item.name.trim().toLowerCase() === lvl.trim().toLowerCase());
            if(idx > -1) t += parseFloat(calculatePoints(idx));
        });
        u.pts = t.toFixed(1); u.cnt = list.filter(x => x.trim() !== "").length;
    });
    ranking.sort((a,b) => b.pts - a.pts);
    b.innerHTML = ranking.map((u, i) => '<tr class="rank-row" onclick="openUserProfile(\\'' + u.name + '\\')"><td>#' + (i + 1) + '</td><td style="text-align:left;"><img src="https://flagcdn.com/w20/' + u.country + '.png" style="margin-right:10px;">' + u.name + '</td><td style="color:#ff6600; font-weight:bold;">' + u.pts + '</td><td>' + u.cnt + '</td></tr>').join("");
}

function openUserProfile(n) {
    const u = ranking.find(x => x.name === n);
    document.getElementById('uModalContent').innerHTML = '<span onclick="closeM()" style="cursor:pointer; color:#ff6600; position:absolute; right:20px; top:10px; font-size:2rem;">&times;</span><img src="https://flagcdn.com/w80/' + u.country + '.png" style="width:60px;"><h2 style="color:#ff6600">' + u.name + '</h2><p>Puntos: ' + u.pts + '</p><div style="text-align:left; font-size:0.8rem;">' + u.levelList + '</div>';
    document.getElementById('uModal').style.display = "block";
}

function closeM() { document.querySelectorAll(".modal").forEach(m => m.style.display = "none"); }
document.addEventListener("DOMContentLoaded", () => { renderLevels(); renderLeaderboard(); });
`;
            const blob = new Blob([script], { type: 'text/javascript' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'script.js'; a.click();
        }

        function saveLevel() {
            const name = document.getElementById('lvlName').value.trim();
            const id = document.getElementById('lvlYT').value.trim();
            const first = document.getElementById('lvlFirst').value.trim();
            const pos = parseInt(document.getElementById('lvlPos').value) - 1;
            const victors = document.getElementById('lvlVictors').value.split(',').filter(v => v.trim() !== "");
            let db = JSON.parse(localStorage.getItem('scully_db_levels')) || [];
            db = db.filter(l => l.name.toLowerCase() !== name.toLowerCase());
            db.splice(pos >= 0 ? pos : db.length, 0, { name, id, first, victors });
            localStorage.setItem('scully_db_levels', JSON.stringify(db));
            location.reload();
        }

        function saveUser() {
            const name = document.getElementById('targetUser').value.trim();
            const list = document.getElementById('targetList').value;
            const country = document.getElementById('targetCountry').value;
            let users = JSON.parse(localStorage.getItem('scully_ranks')) || [];
            const idx = users.findIndex(u => u.name.toLowerCase() === name.toLowerCase());
            if(idx > -1) users[idx] = { name, levelList: list, country };
            else users.push({ name, levelList: list, country });
            localStorage.setItem('scully_ranks', JSON.stringify(users));
            location.reload();
        }
    </script>
</body>
</html>
