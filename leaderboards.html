<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scully Leaderboards | Ranking</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root { --accent: #ff6600; --bg: #050505; --card: #0a0a0a; --glow: 0 0 15px rgba(255, 102, 0, 0.3); }
        body { background: var(--bg); color: #fff; font-family: 'Lexend Deca', sans-serif; margin: 0; text-align: center; }
        .top-credits { display: flex; justify-content: center; gap: 20px; padding: 12px; background: rgba(0,0,0,0.8); border-bottom: 1px solid #111; font-size: 0.65rem; position: sticky; top: 0; z-index: 1000; }
        .credit-box i { color: var(--accent); margin-right: 5px; }
        header { padding: 40px 20px; }
        h1 { font-weight: 700; letter-spacing: 4px; text-transform: uppercase; }
        h1 span { color: var(--accent); text-shadow: var(--glow); }
        .btn-scully { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 10px 25px; cursor: pointer; text-decoration: none; display: inline-block; font-family: 'Lexend Deca'; }
        table { width: 95%; max-width: 850px; margin: 20px auto; border-collapse: separate; border-spacing: 0 8px; }
        th { color: var(--accent); font-size: 0.65rem; text-transform: uppercase; padding: 10px; border-bottom: 1px solid #111; }
        .rank-row { background: var(--card); cursor: pointer; transition: 0.2s; }
        td { padding: 15px; border-top: 1px solid #151515; border-bottom: 1px solid #151515; }
        #adminPanel { display: none; background: #000; border: 1px solid var(--accent); padding: 25px; width: 90%; max-width: 800px; margin: 40px auto; border-radius: 10px; text-align: left; }
        .admin-flex { display: flex; flex-wrap: wrap; gap: 20px; }
        input, select, textarea { width: 100%; background: #0a0a0a; border: 1px solid #222; color: #fff; padding: 10px; margin-bottom: 8px; font-family: 'Lexend Deca'; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(8px); }
        .modal-content { background: #080808; margin: 10% auto; padding: 30px; width: 90%; max-width: 450px; border: 1px solid var(--accent); border-radius: 15px; position: relative; }
    </style>
</head>
<body>
    <nav class="top-credits">
        <div class="credit-box"><i class="fas fa-crown"></i> OWNER <span>score</span></div>
        <div class="credit-box"><i class="fas fa-user-shield"></i> ADMIN <span>Vegardo</span></div>
        <div class="credit-box"><i class="fas fa-hands-helping"></i> HELPER <span>Blitz</span></div>
        <div class="credit-box"><i class="fas fa-code"></i> CODIFICADOR <span>score</span></div>
    </nav>
    <header>
        <h1>SCULLY <span>LEADERBOARDS</span></h1>
        <a href="index.html" class="btn-scully">REGRESAR AL DIRECTORIO</a>
    </header>
    <table>
        <thead><tr><th>#</th><th style="text-align:left">Identidad</th><th>Puntos</th><th>Lvls</th></tr></thead>
        <tbody id="leaderboardBody"></tbody>
    </table>

    <div style="margin-top: 60px; opacity: 0.05;" id="authBox">
        <input type="password" id="tokenInput" placeholder="..." style="width:100px; text-align:center; border:none; background:none;">
        <button onclick="checkAuth()" style="border:none; background:none; cursor:pointer;">.</button>
    </div>
    <div id="adminPanel">
        <h4 style="color:var(--accent); margin-bottom: 15px;">GESTIÓN DE JUGADORES</h4>
        <div class="admin-flex">
            <div style="flex:1; min-width:300px;">
                <input type="text" id="targetUser" placeholder="Nombre Jugador">
                <select id="targetCountry"><option value="cl">Chile</option><option value="ar">Argentina</option><option value="mx">México</option></select>
                <textarea id="targetList" placeholder="Acu, Bloodbath..."></textarea>
                <button class="btn-scully" style="width:100%; background:var(--accent); color:#000;" onclick="saveUser()">GUARDAR JUGADOR</button>
                <button class="btn-scully" style="width:100%; margin-top:10px; border-color:#fff; color:#fff;" onclick="descargarScript()">DESCARGAR SCRIPT.JS</button>
            </div>
            <div id="adminUserList" style="flex:1; background:#080808; padding:10px; max-height:300px; overflow-y:auto;"></div>
        </div>
    </div>

    <div id="uModal" class="modal"><div class="modal-content" id="uModalContent"></div></div>

    <script src="script.js"></script>
    <script>
        const TOKEN = "GdfuFCRy";
        function checkAuth() { if(document.getElementById('tokenInput').value === TOKEN) { sessionStorage.setItem('scully_session', 'active'); location.reload(); } }
        window.onload = function() { 
            if(sessionStorage.getItem('scully_session') === 'active') { document.getElementById('adminPanel').style.display = "block"; document.getElementById('authBox').style.display = "none"; updateAdminUserList(); }
            if(typeof renderLeaderboard === 'function') renderLeaderboard(); 
        };
        function saveUser() {
            const name = document.getElementById('targetUser').value.trim();
            const list = document.getElementById('targetList').value;
            const country = document.getElementById('targetCountry').value;
            let users = JSON.parse(localStorage.getItem('scully_ranks')) || [];
            const idx = users.findIndex(u => u.name.toLowerCase() === name.toLowerCase());
            if(idx > -1) users[idx] = { name, levelList: list, country };
            else users.push({ name, levelList: list, country });
            localStorage.setItem('scully_ranks', JSON.stringify(users));
            location.reload();
        }
        function deleteUser(i) {
            let users = JSON.parse(localStorage.getItem('scully_ranks')) || [];
            users.splice(i, 1);
            localStorage.setItem('scully_ranks', JSON.stringify(users));
            location.reload();
        }
        function updateAdminUserList() {
            const users = JSON.parse(localStorage.getItem('scully_ranks')) || [];
            document.getElementById('adminUserList').innerHTML = users.map((u, i) => `<div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #111; font-size:0.8rem;"><span>${u.name}</span><i class="fas fa-trash" style="color:#f44; cursor:pointer;" onclick="deleteUser(${i})"></i></div>`).join("");
        }
        function closeM() { document.querySelectorAll(".modal").forEach(m => m.style.display = "none"); }

        function descargarScript() {
            // Reutiliza la misma función de descarga del index.html
            // (La función descargarScript debe ser la misma en ambos archivos para consistencia)
            // [Copia la misma función descargarScript() del index.html aquí]
        }
    </script>
</body>
</html>
