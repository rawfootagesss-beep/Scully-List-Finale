<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scully Versus | Motor de Duelos</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@400;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #ff6600; --bg: #030303; --card: rgba(15,15,15,0.9); --border: rgba(255,255,255,0.05); }
        body { background: var(--bg); color: #fff; font-family: 'Lexend Deca'; margin: 0; }
        .staff-bar { display: flex; justify-content: center; gap: 25px; padding: 15px; background: rgba(255,255,255,0.02); font-size: 0.6rem; border-bottom: 1px solid var(--border); }
        .main-nav { margin: 40px 0; display: flex; justify-content: center; gap: 15px; }
        .btn-scully { background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: #fff; padding: 12px 24px; text-decoration: none; font-size: 0.7rem; border-radius: 50px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .wrapper { width: 95%; max-width: 800px; margin: 0 auto; text-align: center; }
        input { background: #000; border: 1px solid #222; color: #fff; padding: 15px; border-radius: 15px; width: 250px; margin: 10px; font-family: 'Lexend Deca'; }
        .versus-card { background: var(--card); border: 2px solid var(--accent); border-radius: 30px; display: grid; grid-template-columns: 1fr 0.2fr 1fr; padding: 40px; align-items: center; margin-top: 30px; box-shadow: 0 0 30px rgba(255,102,0,0.1); }
        .v-pfp { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--accent); object-fit: cover; margin-bottom: 15px; }
        .win-tag { color: #00ff66; font-weight: 800; }
    </style>
</head>
<body>
    <nav class="staff-bar"><div style="color:#fff; font-weight:800;">SCULLY VERSUS ENGINE</div></nav>
    <div class="main-nav">
        <a href="index.html" class="btn-scully">VOLVER</a>
        <a href="leaderboards.html" class="btn-scully">RANKING</a>
        <a href="admin.html" id="adminHubBtn" class="btn-scully" style="display:none; background:var(--accent); color:#000;">ADMIN</a>
    </div>
    <div class="wrapper">
        <h1 style="font-size:2.5rem;">DUELO DE <span style="color:var(--accent);">PRESTIGIO</span></h1>
        <input type="text" id="vNick1" placeholder="Primer Jugador">
        <input type="text" id="vNick2" placeholder="Segundo Jugador"><br>
        <button class="btn-scully" style="margin: 20px auto; background:var(--accent); color:#000;" onclick="comparePlayers()">INICIAR COMBATE</button>
        <div id="versusResult"></div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://scullylist-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        if(sessionStorage.getItem('scully_session') === 'active') document.getElementById('adminHubBtn').style.display = "flex";
        const savedColor = localStorage.getItem('scully-theme-color') || '#ff6600';
        document.documentElement.style.setProperty('--accent', savedColor);

        let fullData = {};
        db.ref('/').on('value', s => fullData = s.val());

        function calcUserStats(n) {
            const p = Object.values(fullData.players || {}).find(x => x.name.toLowerCase() === n.toLowerCase());
            if(!p) return { pts: 0 };
            let pts = 0;
            p.completions?.forEach(c => {
                const idx = fullData.levels.findIndex(l => l.name.toLowerCase() === c.level.toLowerCase());
                if(idx > -1) pts += parseFloat(Math.max(100 - (idx * 0.6), 5));
            });
            return { name: p.name, pts: pts.toFixed(1), lvl: Math.floor(pts / 50), recCount: p.completions?.length || 0, pfp: p.pfp || "https://i.imgur.com/8pw98K4.png" };
        }

        function comparePlayers() {
            const p1 = calcUserStats(document.getElementById('vNick1').value.trim());
            const p2 = calcUserStats(document.getElementById('vNick2').value.trim());
            if(!p1.name || !p2.name) return alert("Jugador no encontrado.");
            const wXP = parseFloat(p1.pts) > parseFloat(p2.pts);
            document.getElementById('versusResult').innerHTML = `
                <div class="versus-card">
                    <div><img src="${p1.pfp}" class="v-pfp"><h3>${p1.name}</h3><div class="${wXP?'win-tag':''}">XP: ${p1.pts}</div><div>LVL: ${p1.lvl}</div></div>
                    <div style="font-weight:900; color:var(--accent); font-size:1.5rem;">VS</div>
                    <div><img src="${p2.pfp}" class="v-pfp"><h3>${p2.name}</h3><div class="${!wXP?'win-tag':''}">XP: ${p2.pts}</div><div>LVL: ${p2.lvl}</div></div>
                </div>`;
        }
    </script>
</body>
</html>
