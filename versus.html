<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scully Versus | Duelos</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff6600; --bg: #030303; --card: rgba(15,15,15,0.9); --border: rgba(255,255,255,0.05); }
        body { background: var(--bg); color: #fff; font-family: 'Lexend Deca'; margin: 0; text-align: center; }
        header { padding: 60px 20px 20px; }
        h1 { font-size: 3rem; margin: 0; text-transform: uppercase; font-weight: 800; letter-spacing: -1px; }
        .btn-scully { background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: #fff; padding: 12px 24px; text-decoration: none; font-size: 0.7rem; border-radius: 50px; font-weight: 600; display: inline-flex; align-items: center; margin: 20px 10px; cursor: pointer; transition: 0.3s; }
        .btn-scully:hover { background: var(--accent); color: #000; }
        input { background: #000; border: 1px solid #222; color: #fff; padding: 15px; border-radius: 15px; width: 250px; margin: 10px; font-family: 'Lexend Deca'; text-align: center; }
        .versus-card { background: var(--card); border: 2px solid var(--accent); border-radius: 30px; display: grid; grid-template-columns: 1fr 0.2fr 1fr; padding: 40px; align-items: center; width: 90%; max-width: 800px; margin: 40px auto; box-shadow: 0 0 30px rgba(255,102,0,0.1); }
        .win-tag { color: #00ff66; font-weight: 800; font-size: 1.2rem; }
    </style>
</head>
<body>
    <header>
        <h1>SCULLY <span style="color:var(--accent);">VERSUS</span></h1>
        <a href="index.html" class="btn-scully">VOLVER AL HUB</a>
    </header>

    <div>
        <input type="text" id="v1" placeholder="Jugador 1">
        <input type="text" id="v2" placeholder="Jugador 2"><br>
        <button class="btn-scully" style="background:var(--accent); color:#000; border:none;" onclick="compare()">INICIAR DUELO</button>
    </div>
    
    <div id="res"></div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://scullylist-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const savedColor = localStorage.getItem('scully-theme-color') || '#ff6600';
        document.documentElement.style.setProperty('--accent', savedColor);
        
        let fullData = {}; 
        db.ref('/').on('value', s => fullData = s.val() || {});

        // EL CEREBRO DE XP ARREGLADO
        function calcUserStats(nick) {
            const nickL = nick.toLowerCase();
            const p = Object.values(fullData.players || {}).find(x => x.name.toLowerCase() === nickL);
            const lvls = fullData.levels || [];
            
            let uniqueLevels = new Set();
            lvls.forEach(l => { if(l.first?.toLowerCase() === nickL) uniqueLevels.add(l.name); });
            p?.completions?.forEach(c => uniqueLevels.add(c.level));
            
            let pts = 0;
            uniqueLevels.forEach(name => {
                const idx = lvls.findIndex(l => l.name === name);
                if(idx > -1) pts += parseFloat(Math.max(100 - (idx * 0.6), 5));
            });
            
            return { 
                name: p?.name || nick, 
                pts: pts, // Número real para comparar
                ptsF: pts.toFixed(1), // String formateado para mostrar
                lvl: Math.floor(pts/50), 
                pfp: p?.pfp || 'https://i.imgur.com/8pw98K4.png' 
            };
        }

        function compare() { 
            const n1 = document.getElementById('v1').value.trim();
            const n2 = document.getElementById('v2').value.trim();
            if(!n1 || !n2) return alert("Ingresa ambos jugadores.");

            const p1 = calcUserStats(n1); 
            const p2 = calcUserStats(n2); 

            if(p1.pts === 0 && p2.pts === 0) return alert("Ninguno tiene estadísticas.");

            const p1Wins = p1.pts > p2.pts;
            const p2Wins = p2.pts > p1.pts;

            document.getElementById('res').innerHTML = `
                <div class="versus-card">
                    <div>
                        <img src="${p1.pfp}" style="width:100px; height:100px; object-fit:cover; border-radius:50%; border:3px solid var(--accent); margin-bottom:15px;">
                        <h3 style="margin:0 0 10px 0;">${p1.name.toUpperCase()}</h3>
                        <div class="${p1Wins ? 'win-tag' : ''}">XP: ${p1.ptsF}</div>
                        <div style="font-size:0.8rem; color:#888;">LVL ${p1.lvl}</div>
                    </div>
                    <div style="font-weight:900; color:var(--accent); font-size:2rem;">VS</div>
                    <div>
                        <img src="${p2.pfp}" style="width:100px; height:100px; object-fit:cover; border-radius:50%; border:3px solid var(--accent); margin-bottom:15px;">
                        <h3 style="margin:0 0 10px 0;">${p2.name.toUpperCase()}</h3>
                        <div class="${p2Wins ? 'win-tag' : ''}">XP: ${p2.ptsF}</div>
                        <div style="font-size:0.8rem; color:#888;">LVL ${p2.lvl}</div>
                    </div>
                </div>`; 
        }
    </script>
</body>
</html>
