<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scully Admin | Command Center Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@400;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #ff6600; --bg: #000; --card: #080808; --border: #111; --green: #00ff66; --red: #ff3333; --blue: #00ccff; }
        body { background: var(--bg); color: #fff; font-family: 'Lexend Deca'; margin: 0; padding: 20px; overflow-x: auto; }
        
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: var(--card); padding: 15px 25px; border-radius: 15px; border: 1px solid var(--border); }
        
        .admin-layout { display: flex; gap: 15px; min-width: 2100px; height: 85vh; }
        .admin-col { flex: 1; background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 15px; display: flex; flex-direction: column; min-width: 280px; }
        .admin-list-scroll { flex-grow: 1; overflow-y: auto; padding-right: 5px; margin-bottom: 10px; }
        
        h2 { font-size: 0.6rem; text-transform: uppercase; color: #555; border-bottom: 1px solid #111; padding-bottom: 10px; margin-top: 0; letter-spacing: 1px; }
        input, select, button { width: 100%; background: #000; border: 1px solid #222; color: #fff; padding: 10px; border-radius: 8px; margin-bottom: 8px; font-family: 'Lexend Deca'; font-size: 0.7rem; box-sizing: border-box; }
        
        .sub-card { background: #000; padding: 12px; border-radius: 10px; margin-bottom: 10px; border-left: 3px solid var(--accent); font-size: 0.65rem; border-top: 1px solid #111; border-right: 1px solid #111; }
        .manage-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #111; font-size: 0.6rem; transition: 0.2s; }
        .manage-item:hover { background: rgba(255,255,255,0.02); }

        .btn-tool { background: var(--accent); color: #000; border: none; font-weight: 800; cursor: pointer; padding: 12px; transition: 0.3s; }
        .btn-tool:hover { transform: scale(1.02); filter: brightness(1.2); }
        .btn-red { border-color: var(--red); color: var(--red); }
        .btn-green { border-color: var(--green); color: var(--green); }

        /* LISTA DE VICTORS EN EDITOR */
        .victor-edit-item { display: flex; justify-content: space-between; background: #050505; padding: 6px 10px; border-radius: 5px; margin-bottom: 4px; border: 1px solid #111; font-size: 0.55rem; align-items: center; }
        .victor-edit-item i { color: var(--red); cursor: pointer; padding: 5px; }
        .victor-edit-item i:hover { color: #fff; background: var(--red); border-radius: 4px; }
    </style>
</head>
<body>

    <div class="admin-header">
        <h1 style="font-size:1rem; margin:0;"><i class="fas fa-terminal" style="color:var(--accent); margin-right:10px;"></i>SCULLY <span style="color:var(--accent);">COMMAND CENTER</span></h1>
        <div style="display:flex; gap:15px; align-items:center;">
            <span style="font-size:0.6rem; color:#444;">ENGINE v8.0</span>
            <a href="index.html" style="color:#fff; text-decoration:none; font-size:0.7rem; background:#111; padding:8px 15px; border-radius:5px; border:1px solid #222;">VOLVER AL HUB</a>
        </div>
    </div>

    <div class="admin-layout">
        <div class="admin-col">
            <h2>1. Editor de Niveles & Victors</h2>
            <div id="adminLevelsList" class="admin-list-scroll"></div>
            <div id="editorBox" style="background:rgba(0,0,0,0.5); padding:10px; border-radius:10px; border:1px solid #111;">
                <input type="hidden" id="editLvlIdx">
                <input type="text" id="lvlName" placeholder="Nombre Nivel">
                <input type="text" id="lvlYT" placeholder="ID Video YT">
                <input type="text" id="lvlFirst" placeholder="Verifier">
                <input type="number" id="lvlPos" placeholder="Posición">
                <button onclick="saveLevel()" class="btn-tool">GUARDAR CAMBIOS</button>
                
                <p style="font-size:0.5rem; color:var(--green); margin:10px 0 5px;">INYECTAR VICTOR:</p>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="manualNick" placeholder="Nick" style="margin:0;">
                    <button onclick="injectVictor()" style="width:auto; margin:0;" class="btn-green"><i class="fas fa-plus"></i></button>
                </div>

                <p style="font-size:0.5rem; color:var(--red); margin:15px 0 5px;">GESTIONAR VICTORS (QUITAR):</p>
                <div id="lvlVictorsList" style="max-height:120px; overflow-y:auto;"></div>
            </div>
        </div>

        <div class="admin-col">
            <h2>2. Moderación Récords</h2>
            <div id="submissionsList" class="admin-list-scroll"></div>
        </div>

        <div class="admin-col">
            <h2>3. Mercado</h2>
            <div id="marketSubList" class="admin-list-scroll"></div>
        </div>

        <div class="admin-col">
            <h2>4. Fotos Perfil</h2>
            <div id="pfpSubList" class="admin-list-scroll"></div>
        </div>

        <div class="admin-col">
            <h2>5. Lista Negra</h2>
            <div id="banListInteractive" class="admin-list-scroll"></div>
            <input type="text" id="banUser" placeholder="Nick Jugador"><button onclick="banPlayer()" class="btn-red">BANEAR</button>
        </div>

        <div class="admin-col">
            <h2>6. Logs Recientes</h2>
            <div id="adminLogList" class="admin-list-scroll"></div>
        </div>

        <div class="admin-col">
            <h2>7. Historial Recientes</h2>
            <div id="adminHistoryList" class="admin-list-scroll"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script>
        if(sessionStorage.getItem('scully_session') !== 'active') location.href = 'index.html';
        const firebaseConfig = { databaseURL: "https://scullylist-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const savedColor = localStorage.getItem('scully-theme-color') || '#ff6600';
        document.documentElement.style.setProperty('--accent', savedColor);

        let fullData = {};

        db.ref('/').on('value', (s) => {
            fullData = s.val() || {};
            renderAdminLevelsList(fullData.levels || []);
            renderSubmissions(fullData.submissions || {});
            renderMarketModeration(fullData.market_requests || {});
            renderPFPModeration(fullData.pfp_requests || {});
            renderBanList(fullData.bans || {});
            renderAdminLogs(fullData.logs || {});
            renderAdminHistory(fullData.history || {});
        });

        // --- GESTIÓN DE NIVELES Y VICTORS ---
        function renderAdminLevelsList(l) { 
            document.getElementById('adminLevelsList').innerHTML = l.map((x,i) => `
                <div class="manage-item">
                    <span>#${i+1} ${x.name}</span>
                    <button onclick="loadLevelToEditor(${i})" style="width:auto; padding:3px 8px; font-size:0.5rem; background:none; color:var(--accent); border-color:var(--accent);">EDIT</button>
                </div>`).join(""); 
        }

        function loadLevelToEditor(i) {
            const x = fullData.levels[i];
            document.getElementById('editLvlIdx').value = i;
            document.getElementById('lvlName').value = x.name;
            document.getElementById('lvlYT').value = x.id;
            document.getElementById('lvlFirst').value = x.first || "";
            document.getElementById('lvlPos').value = i + 1;
            
            // Buscar victors de este nivel
            const players = Object.values(fullData.players || {});
            const victors = players.filter(p => p.completions?.some(c => c.level === x.name));
            
            document.getElementById('lvlVictorsList').innerHTML = victors.map(v => `
                <div class="victor-edit-item">
                    <span>${v.name}</span>
                    <i class="fas fa-trash-alt" onclick="removeVictor('${x.name}', '${v.name}')" title="Quitar victor"></i>
                </div>`).join("") || "<p style='font-size:0.5rem; color:#333;'>Sin victors.</p>";
        }

        function removeVictor(levelName, playerNick) {
            if(!confirm(`¿Borrar el récord de ${playerNick} en ${levelName}? Sus puntos se recalcularán.`)) return;
            db.ref('players').once('value', s => {
                let players = Object.values(s.val() || {});
                let i = players.findIndex(p => p.name === playerNick);
                if(i > -1) {
                    players[i].completions = players[i].completions.filter(c => c.level !== levelName);
                    db.ref('players').set(players);
                    alert("Récord eliminado.");
                    // Forzar recarga del editor
                    loadLevelToEditor(document.getElementById('editLvlIdx').value);
                }
            });
        }

        function injectVictor() {
            const idx = document.getElementById('editLvlIdx').value;
            const nick = document.getElementById('manualNick').value.trim();
            if(idx === "" || !nick) return alert("Selecciona un nivel y escribe un nombre.");
            const lName = fullData.levels[idx].name;

            db.ref('players').once('value', s => {
                let p = Object.values(s.val() || {});
                let i = p.findIndex(x => x.name.toLowerCase() === nick.toLowerCase());
                let rec = { level: lName, link: "Añadido por Admin" };
                if(i > -1) {
                    if(!p[i].completions) p[i].completions = [];
                    if(p[i].completions.find(c => c.level === lName)) return alert("Ya tiene este nivel.");
                    p[i].completions.push(rec);
                } else {
                    p.push({ name: nick, country: 'es', completions: [rec] });
                }
                db.ref('players').set(p);
                alert("Victor inyectado!");
                document.getElementById('manualNick').value = "";
                loadLevelToEditor(idx);
            });
        }

        function saveLevel() {
            const idx = document.getElementById('editLvlIdx').value;
            const n = document.getElementById('lvlName').value.trim();
            const y = document.getElementById('lvlYT').value.trim();
            const f = document.getElementById('lvlFirst').value.trim();
            const p = parseInt(document.getElementById('lvlPos').value) - 1;
            if(!n || !y) return alert("Nombre e ID YT obligatorios.");

            db.ref('levels').once('value', s => {
                let lvls = s.val() || [];
                if(idx !== "") lvls.splice(idx, 1);
                lvls.splice(p >= 0 ? p : lvls.length, 0, { name: n, id: y, first: f });
                db.ref('levels').set(lvls);
                alert("Nivel Guardado/Actualizado");
            });
        }

        // --- RESTO DE MODERACIÓN (Récords, Mercado, PFPs) ---
        function setStatus(k, s) {
            const sub = fullData.submissions[k]; const staff = prompt("Nombre Staff:"); if(!staff) return;
            if(s === 'Aceptado') {
                db.ref('players').once('value', v => {
                    let p = Object.values(v.val() || {}); let i = p.findIndex(u => u.name.toLowerCase() === sub.player.toLowerCase());
                    let rec = { level: sub.level, link: sub.link };
                    if(i > -1) { if(!p[i].completions) p[i].completions = []; p[i].completions.push(rec); }
                    else { p.push({ name: sub.player, country: 'es', completions: [rec] }); }
                    db.ref('players').set(p);
                });
                db.ref('history').push({...sub, status: 'Aceptado'});
                db.ref('logs').push({type:'accept', msg:`✅ ${sub.player} -> ${sub.level} POR ${staff}`});
                db.ref('submissions/'+k).remove();
            } else if(s === 'Rechazado') {
                db.ref('history').push({...sub, status: 'Rechazado'});
                db.ref('logs').push({type:'reject', msg:`❌ ${sub.player} RECHAZADO POR ${staff}`});
                db.ref('submissions/'+k).remove();
            }
        }

        function renderSubmissions(s) { document.getElementById('submissionsList').innerHTML = Object.entries(s).map(([k,x]) => `<div class="sub-card"><b>${x.player}</b> -> ${x.level}<br><button onclick="setStatus('${k}','Aceptado')" class="btn-green">ACEPTAR</button><button onclick="setStatus('${k}','Rechazado')" class="btn-red">RECHAZAR</button></div>`).join(""); }
        function renderBanList(b) { document.getElementById('banListInteractive').innerHTML = Object.entries(b).map(([k,v]) => `<div class="manage-item"><span>${v}</span><i class="fas fa-trash-alt" style="color:var(--red); cursor:pointer;" onclick="db.ref('bans/${k}').remove()"></i></div>`).join(""); }
        function banPlayer() { const n = document.getElementById('banUser').value; if(!n) return; db.ref('bans').push(n); db.ref('logs').push({type:'reject', msg:`⛔ ${n} BANEADO`}); }
        function renderAdminLogs(l) { document.getElementById('adminLogList').innerHTML = Object.entries(l).reverse().map(([k,v]) => `<div class="manage-item"><span>${v.msg}</span><i class="fas fa-trash" style="cursor:pointer;" onclick="db.ref('logs/${k}').remove()"></i></div>`).join(""); }
        function renderAdminHistory(h) { document.getElementById('adminHistoryList').innerHTML = Object.entries(h).reverse().map(([k,v]) => `<div class="manage-item"><span>${v.player}</span><i class="fas fa-trash" style="cursor:pointer;" onclick="db.ref('history/${k}').remove()"></i></div>`).join(""); }
        function renderMarketModeration(m) { document.getElementById('marketSubList').innerHTML = Object.entries(m).map(([k,v]) => `<div class="sub-card">${v.nick}: <b>${v.item}</b><button onclick="approveCosmetic('${k}')" class="btn-green">APROBAR</button></div>`).join(""); }
        function approveCosmetic(k) { 
            const r = fullData.market_requests[k]; 
            db.ref('players').once('value', s => { 
                let p = Object.values(s.val()); let i = p.findIndex(x => x.name === r.nick);
                if(i>-1) { if(!p[i].cosmetics) p[i].cosmetics={}; p[i].cosmetics[r.item]=true; db.ref('players').set(p); db.ref('market_requests/'+k).remove(); } 
            }); 
        }
        function renderPFPModeration(p) { document.getElementById('pfpSubList').innerHTML = Object.entries(p).map(([k,v]) => `<div class="sub-card">${v.nick}<br><img src="${v.url}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;margin:5px 0;"><button onclick="approvePFP('${k}')" class="btn-green">ACEPTAR</button></div>`).join(""); }
        function approvePFP(k) { 
            const r = fullData.pfp_requests[k]; 
            db.ref('players').once('value', s => { 
                let p = Object.values(s.val()); let i = p.findIndex(x => x.name === r.nick);
                if(i>-1) { p[i].pfp=r.url; db.ref('players').set(p); db.ref('pfp_requests/'+k).remove(); } 
            }); 
        }
    </script>
</body>
</html>
