<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scully Admin | Master Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@400;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #ff6600; --bg: #000; --card: #080808; --border: #111; --green: #00ff66; --red: #ff3333; --blue: #00ccff; }
        body { background: var(--bg); color: #fff; font-family: 'Lexend Deca'; margin: 0; padding: 20px; overflow-x: auto; }
        .admin-layout { display: flex; gap: 15px; min-width: 2600px; height: 85vh; }
        .admin-col { flex: 1; background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 15px; display: flex; flex-direction: column; min-width: 310px; }
        .admin-list-scroll { flex-grow: 1; overflow-y: auto; padding-right: 5px; }
        h2 { font-size: 0.6rem; text-transform: uppercase; color: #555; border-bottom: 1px solid #111; padding-bottom: 10px; margin-top: 0; display: flex; justify-content: space-between; align-items: center; }
        input, select, button { width: 100%; background: #000; border: 1px solid #222; color: #fff; padding: 10px; border-radius: 8px; margin-bottom: 8px; font-family: 'Lexend Deca'; font-size: 0.7rem; cursor: pointer; transition: 0.3s; }
        button:hover { filter: brightness(1.2); transform: scale(1.02); }
        .manage-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #111; font-size: 0.6rem; }
        .sub-card { background: #000; padding: 12px; border-radius: 10px; margin-bottom: 10px; border-left: 3px solid var(--accent); font-size: 0.65rem; border-top: 1px solid #111; }
        .proof-box { display: flex; gap: 5px; margin: 8px 0; }
        .btn-proof { flex: 1; text-decoration: none; text-align: center; font-size: 0.5rem; font-weight: 800; padding: 5px; border-radius: 4px; border: 1px solid #222; color: #fff; }
        .btn-proof:hover { background: #222; }
    </style>
</head>
<body>
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; background:#080808; padding:15px; border-radius:15px; border:1px solid #111;">
        <h1 style="font-size:1.2rem; margin:0;">SCULLY <span style="color:var(--accent);">MASTER CONSOLE</span></h1>
        <a href="index.html" style="color:#fff; text-decoration:none; font-size:0.8rem; background:#111; padding:8px 15px; border-radius:5px;">VOLVER AL HUB</a>
    </div>
    
    <div class="admin-layout">
        <div class="admin-col">
            <h2>1. Editor Niveles</h2>
            <div id="adminLevelsList" class="admin-list-scroll"></div>
            
            <input type="hidden" id="editLvlIdx">
            <input type="text" id="lvlName" placeholder="Nombre Nivel">
            <input type="text" id="lvlYT" placeholder="ID Video YT">
            <input type="text" id="lvlFirst" placeholder="First Victor (Verificador)">
            <input type="number" id="lvlPos" placeholder="Posición en lista (Vacío = Al final)">
            
            <button onclick="saveLevel()" style="background:var(--accent); color:#000; font-weight:800;">GUARDAR / MOVER MANUAL</button>
            <div style="display:flex; gap:5px;">
                <button id="syncBtn" onclick="syncWithAREDL()" style="background:var(--blue); color:#000; font-weight:800; font-size:0.6rem;"><i class="fas fa-sync-alt"></i> SYNC AREDL</button>
                <button id="revertBtn" onclick="revertAREDL()" style="background:var(--red); color:#000; font-weight:800; font-size:0.6rem;"><i class="fas fa-undo"></i> REVERTIR</button>
            </div>

            <div id="lvlVictorsList" style="max-height:100px; overflow-y:auto; border-top:1px solid #111; padding-top:10px; margin-top:5px;"></div>
        </div>

        <div class="admin-col">
            <h2>2. Moderación Récords</h2>
            <div id="submissionsList" class="admin-list-scroll"></div>
        </div>
        
        <div class="admin-col">
            <h2>3. Identidad Jugadores</h2>
            <div id="adminUserList" class="admin-list-scroll"></div>
            <div id="playerEditor" style="display:none; background:#000; padding:10px; border:1px solid var(--blue); border-radius:10px;">
                <input type="hidden" id="editPIdx">
                <input type="text" id="editNick" placeholder="Nick">
                <select id="editCountry">
                    <option value="ar">Argentina</option><option value="bo">Bolivia</option><option value="br">Brasil</option>
                    <option value="cl">Chile</option><option value="co">Colombia</option><option value="cr">Costa Rica</option>
                    <option value="cu">Cuba</option><option value="ec">Ecuador</option><option value="sv">El Salvador</option>
                    <option value="es">España</option><option value="gt">Guatemala</option><option value="hn">Honduras</option>
                    <option value="mx">México</option><option value="ni">Nicaragua</option><option value="pa">Panamá</option>
                    <option value="py">Paraguay</option><option value="pe">Perú</option><option value="pr">Puerto Rico</option>
                    <option value="do">Rep. Dominicana</option><option value="uy">Uruguay</option><option value="ve">Venezuela</option>
                </select>
                
                <label style="font-size:0.6rem; color:var(--red); font-weight:800;"><input type="checkbox" id="editHidden"> OCULTAR (SHADOWBAN)</label>
                <button onclick="savePlayerEdits()" style="border-color:var(--blue); color:var(--blue); background:none; font-weight:800; margin-top:10px;">APLICAR CAMBIOS</button>
                
                <p style="font-size:0.5rem; color:var(--accent); margin:15px 0 5px;">COSMÉTICOS DEL JUGADOR:</p>
                <div id="playerCosmeticsInternal" style="max-height:60px; overflow-y:auto; margin-bottom:10px; border-bottom:1px solid #111; padding-bottom:5px;"></div>

                <p style="font-size:0.5rem; color:var(--red); margin:10px 0 5px;">RÉCORDS DEL JUGADOR:</p>
                <div id="playerLevelsInternal" style="max-height:80px; overflow-y:auto;"></div>
            </div>
        </div>
        
        <div class="admin-col"><h2>4. Mercado</h2><div id="marketSubList" class="admin-list-scroll"></div></div>
        <div class="admin-col"><h2>5. PFPs</h2><div id="pfpSubList" class="admin-list-scroll"></div></div>
        <div class="admin-col">
            <h2>6. Baneos</h2>
            <div id="banListInteractive" class="admin-list-scroll"></div>
            <input type="text" id="banUser" placeholder="Nick a banear">
            <button onclick="db.ref('bans').push(document.getElementById('banUser').value)" style="border-color:var(--red); color:var(--red); background:none; font-weight:800;">BANEAR USUARIO</button>
        </div>
        <div class="admin-col"><h2>7. Logs</h2><div id="adminLogList" class="admin-list-scroll"></div></div>
        <div class="admin-col"><h2>8. Historial</h2><div id="adminHistoryList" class="admin-list-scroll"></div></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script>
        if(sessionStorage.getItem('scully_session') !== 'active') location.href = 'index.html';
        
        const firebaseConfig = { databaseURL: "https://scullylist-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let fullData = {};

        db.ref('/').on('value', (s) => {
            fullData = s.val() || {}; 
            // Fuerza la conversión de niveles a Array por si Firebase lo guardó como Objeto
            let lvls = fullData.levels ? (Array.isArray(fullData.levels) ? fullData.levels : Object.values(fullData.levels)) : [];
            lvls = lvls.filter(l => l && l.name); // Limpiar nulos
            fullData.levels = lvls;

            renderAdminLevelsList(lvls); 
            renderSubmissions(fullData.submissions || {}); 
            renderAdminUserList(Object.values(fullData.players || {})); 
            renderMarketModeration(fullData.market_requests || {}); 
            renderPFPModeration(fullData.pfp_requests || {}); 
            renderBanList(fullData.bans || {}); 
            renderAdminLogs(fullData.logs || {}); 
            renderAdminHistory(fullData.history || {});
        });

        // ==========================================
        // 1. SISTEMA DE NIVELES Y AREDL
        // ==========================================
        function renderAdminLevelsList(l) { 
            document.getElementById('adminLevelsList').innerHTML = l.map((x,i) => `
                <div class="manage-item">
                    <span><b>#${i+1}</b> ${x.name}</span>
                    <button onclick="loadLevelToEditor(${i})" style="width:auto; padding:3px 8px; border-color:var(--accent); color:var(--accent); background:none; font-size:0.5rem; margin:0;">EDIT</button>
                </div>
            `).join(""); 
        }
        
        function loadLevelToEditor(i) { 
            const x = fullData.levels[i]; 
            document.getElementById('editLvlIdx').value=i; 
            document.getElementById('lvlName').value=x.name; 
            document.getElementById('lvlYT').value=x.id; 
            document.getElementById('lvlFirst').value=x.first||""; 
            document.getElementById('lvlPos').value=i+1; 
            
            const victors = Object.values(fullData.players || {}).filter(p => p.completions?.some(c => c.level === x.name)); 
            document.getElementById('lvlVictorsList').innerHTML = victors.map(v => `
                <div class="manage-item">
                    <span>${v.name}</span>
                    <i class="fas fa-trash-alt" style="color:var(--red); cursor:pointer;" onclick="removeVictorFromLevel('${x.name}', '${v.name}')"></i>
                </div>
            `).join(""); 
        }

        function saveLevel() { 
            const idx = document.getElementById('editLvlIdx').value; 
            const n = document.getElementById('lvlName').value; 
            const y = document.getElementById('lvlYT').value; 
            const pVal = document.getElementById('lvlPos').value;
            
            if(!n || !y) return alert("Faltan datos del nivel.");

            let lvls = [...fullData.levels]; 
            const newL = { name:n, id:y, first:document.getElementById('lvlFirst').value }; 
            
            if(idx !== "") lvls.splice(idx, 1); // Remover del puesto antiguo
            
            const p = pVal ? parseInt(pVal) - 1 : lvls.length;
            lvls.splice(p >= 0 ? p : lvls.length, 0, newL); // Insertar en nuevo puesto
            
            db.ref('levels').set(lvls).then(() => {
                alert(`Nivel Guardado Manualmente en Top #${p + 1}`);
                document.getElementById('editLvlIdx').value=""; 
                document.getElementById('lvlName').value=""; 
                document.getElementById('lvlYT').value=""; 
                document.getElementById('lvlFirst').value="";
                document.getElementById('lvlPos').value="";
            });
        }

        // --- LÓGICA DE API AREDL BLINDADA ---
        async function syncWithAREDL() {
            if(!confirm("¿Sincronizar las posiciones con la AREDL oficial?\n(Se creará un respaldo de seguridad).")) return;
            const btn = document.getElementById('syncBtn');
            const originalText = btn.innerHTML;
            
            try {
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> SINCRONIZANDO...';
                
                // Proxy de Codetabs es más confiable para evitar bloqueos
                const res = await fetch('https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent('https://api.aredl.net/api/aredl/levels'));
                if(!res.ok) throw new Error("Error conectando a API AREDL");
                
                const aredlData = await res.json();
                
                // Detectar si los datos están directos o envueltos en "data"
                const dataArray = Array.isArray(aredlData) ? aredlData : (aredlData.data || []);
                if(dataArray.length === 0) throw new Error("AREDL Devolvió 0 niveles.");

                // Mapeo Inteligente
                const aredlMap = new Map();
                dataArray.forEach((lvl, idx) => {
                    let position = lvl.position ? lvl.position : (idx + 1);
                    aredlMap.set(lvl.name.toLowerCase().trim(), position);
                });

                let lvls = [...fullData.levels];
                if(lvls.length === 0) {
                    btn.innerHTML = originalText;
                    return alert("No hay niveles registrados en tu base de datos para ordenar.");
                }

                // 1. RESPALDO
                db.ref('levels_backup').set(lvls);

                // 2. ORDENAMIENTO (Los que no están en AREDL se van al puesto 9999)
                lvls.sort((a, b) => {
                    let posA = aredlMap.has(a.name.toLowerCase().trim()) ? aredlMap.get(a.name.toLowerCase().trim()) : 999999;
                    let posB = aredlMap.has(b.name.toLowerCase().trim()) ? aredlMap.get(b.name.toLowerCase().trim()) : 999999;
                    return posA - posB;
                });

                // 3. GUARDAR
                db.ref('levels').set(lvls).then(() => {
                    alert("¡ÉXITO! Niveles reordenados de forma idéntica a la AREDL.");
                    btn.innerHTML = originalText;
                });

            } catch (error) {
                console.error(error);
                alert("Error de conexión con la AREDL. \n1. Revisa tu internet.\n2. La API de AREDL puede estar en mantenimiento.");
                btn.innerHTML = originalText;
            }
        }

        function revertAREDL() {
            if(!confirm("¿Estás súper seguro de REVERTIR la lista a tu último respaldo?")) return;
            const btn = document.getElementById('revertBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> REVIRTIENDO...';

            db.ref('levels_backup').once('value', s => {
                let backup = s.val();
                if(!backup) {
                    btn.innerHTML = '<i class="fas fa-undo"></i> REVERTIR';
                    return alert("No existe ningún respaldo guardado.");
                }
                
                let lvls = Array.isArray(backup) ? backup : Object.values(backup);
                lvls = lvls.filter(x => x && x.name);

                db.ref('levels').set(lvls).then(() => {
                    alert("¡Lista restaurada al estado anterior con éxito!");
                    btn.innerHTML = '<i class="fas fa-undo"></i> REVERTIR';
                });
            });
        }

        // ==========================================
        // 2. GESTIÓN DE JUGADORES Y COSMÉTICOS
        // ==========================================
        function renderAdminUserList(p) { 
            document.getElementById('adminUserList').innerHTML = p.map((u, i) => `
                <div class="manage-item">
                    <span style="${u.hidden?'text-decoration:line-through; color:#ff3333; opacity:0.8':'font-weight:800;'}">${u.name}</span>
                    <button onclick="loadPlayerToEditor(${i})" style="width:auto; padding:3px 8px; border-color:var(--blue); color:var(--blue); background:none; font-size:0.5rem; margin:0;">EDIT</button>
                </div>
            `).join(""); 
        }
        
        function loadPlayerToEditor(idx) { 
            const u = Object.values(fullData.players)[idx]; 
            document.getElementById('playerEditor').style.display = "block"; 
            document.getElementById('editPIdx').value = idx; 
            document.getElementById('editNick').value = u.name; 
            document.getElementById('editCountry').value = u.country || 'es'; 
            document.getElementById('editHidden').checked = u.hidden || false; 
            
            // Cosméticos
            const cosHTML = Object.entries(u.cosmetics || {}).filter(([k,v]) => v).map(([k,v]) => `
                <div class="manage-item">
                    <span>${k}</span>
                    <i class="fas fa-trash-alt" style="color:var(--red); cursor:pointer;" onclick="removeCosmeticFromUser(${idx}, '${k}')"></i>
                </div>
            `).join("") || "<span style='font-size:0.5rem; color:#555;'>Sin cosméticos activos.</span>";
            document.getElementById('playerCosmeticsInternal').innerHTML = cosHTML;

            // Récords
            document.getElementById('playerLevelsInternal').innerHTML = (u.completions || []).map((c, i) => `
                <div class="manage-item">
                    <span>${c.level}</span>
                    <i class="fas fa-times" style="color:var(--red); cursor:pointer;" onclick="removeLevelFromUser(${idx}, ${i})"></i>
                </div>
            `).join(""); 
        }

        function removeVictorFromLevel(l, p) { if(confirm(`¿Quitar récord de ${p} en ${l}?`)) { db.ref('players').once('value', s => { let list = Object.values(s.val()); let i = list.findIndex(x => x.name === p); if(i > -1) { list[i].completions = list[i].completions.filter(c => c.level !== l); db.ref('players').set(list); alert("Borrado"); loadLevelToEditor(document.getElementById('editLvlIdx').value); } }); } }
        function removeCosmeticFromUser(pIdx, cosKey) { if(!confirm("¿Quitar este cosmético del jugador?")) return; db.ref('players').once('value', s => { let list = Object.values(s.val()); if(list[pIdx].cosmetics) { list[pIdx].cosmetics[cosKey] = false; db.ref('players').set(list); alert("Cosmético removido."); loadPlayerToEditor(pIdx); } }); }
        function savePlayerEdits() { const idx = document.getElementById('editPIdx').value; db.ref('players').once('value', s => { let list = Object.values(s.val()); list[idx].name = document.getElementById('editNick').value; list[idx].country = document.getElementById('editCountry').value; list[idx].hidden = document.getElementById('editHidden').checked; db.ref('players').set(list); alert("Perfil Actualizado"); }); }
        function removeLevelFromUser(pI, lI) { if(!confirm("¿Borrar nivel de este jugador?")) return; db.ref('players').once('value', s => { let list = Object.values(s.val()); list[pI].completions.splice(lI, 1); db.ref('players').set(list); loadPlayerToEditor(pI); }); }
        
        // ==========================================
        // 3. MODERACIÓN GENERAL
        // ==========================================
        function renderSubmissions(s) { 
            document.getElementById('submissionsList').innerHTML = Object.entries(s).map(([k,x]) => `
                <div class="sub-card">
                    <b>${x.player}</b> -> ${x.level}
                    <div class="proof-box">
                        <a href="${x.link}" target="_blank" class="btn-proof" style="color:#ff3333; border-color:#ff3333;"><i class="fab fa-youtube"></i> YT</a>
                        <a href="${x.raw}" target="_blank" class="btn-proof" style="color:var(--blue); border-color:var(--blue);"><i class="fab fa-google-drive"></i> RAW</a>
                    </div>
                    <div style="display:flex; gap:5px; margin-top:8px;">
                        <button onclick="setStatus('${k}','Aceptado')" style="border-color:var(--green); color:var(--green); background:none; font-weight:800; margin:0;">OK</button>
                        <button onclick="setStatus('${k}','Rechazado')" style="border-color:var(--red); color:var(--red); background:none; font-weight:800; margin:0;">X</button>
                    </div>
                </div>
            `).join(""); 
        }

        function setStatus(k, s) { 
            const sub = fullData.submissions[k]; const staff = prompt("Firma del Staff:"); if(!staff) return;
            if(s === 'Aceptado') { 
                db.ref('players').once('value', v => { 
                    let p = Object.values(v.val() || {}); let i = p.findIndex(u => u.name.toLowerCase() === sub.player.toLowerCase()); 
                    if(i > -1) { if(!p[i].completions) p[i].completions = []; p[i].completions.push({level:sub.level, link:sub.link}); } 
                    else { p.push({ name: sub.player, country: sub.country || 'es', completions: [{level:sub.level, link:sub.link}] }); } 
                    db.ref('players').set(p); 
                }); 
                db.ref('history').push({...sub, status: 'Aceptado'}); db.ref('logs').push({type:'accept', msg:`✅ ${sub.player} -> ${sub.level} (${staff})`}); db.ref('submissions/'+k).remove(); 
            } else {
                db.ref('history').push({...sub, status: 'Rechazado'}); db.ref('logs').push({type:'reject', msg:`❌ ${sub.player} RECHAZADO`}); db.ref('submissions/'+k).remove(); 
            }
        }

        function renderMarketModeration(m) { document.getElementById('marketSubList').innerHTML = Object.entries(m).map(([k,v]) => `<div class="sub-card">${v.nick}: <b>${v.item}</b><br><button onclick="approveCosmetic('${k}')" style="border-color:var(--green); color:var(--green); background:none; font-weight:800; margin-top:5px;">APROBAR</button></div>`).join(""); }
        function approveCosmetic(k) { const r = fullData.market_requests[k]; db.ref('players').once('value', s => { let p = Object.values(s.val()); let i = p.findIndex(x => x.name === r.nick); if(i>-1) { if(!p[i].cosmetics) p[i].cosmetics={}; p[i].cosmetics[r.item]=true; db.ref('players').set(p); db.ref('market_requests/'+k).remove(); } }); }
        
        function renderPFPModeration(p) { document.getElementById('pfpSubList').innerHTML = Object.entries(p).map(([k,v]) => `<div class="sub-card">${v.nick}<br><img src="${v.url}" style="width:40px;height:40px;border-radius:50%; margin:5px 0; object-fit:cover;"><br><button onclick="approvePFP('${k}')" style="border-color:var(--green); color:var(--green); background:none; font-weight:800;">APROBAR</button></div>`).join(""); }
        function approvePFP(k) { const r = fullData.pfp_requests[k]; db.ref('players').once('value', s => { let p = Object.values(s.val()); let i = p.findIndex(x => x.name === r.nick); if(i>-1) { p[i].pfp=r.url; db.ref('players').set(p); db.ref('pfp_requests/'+k).remove(); } }); }
        
        function renderBanList(b) { document.getElementById('banListInteractive').innerHTML = Object.entries(b).map(([k,v]) => `<div class="manage-item"><span>${v}</span><i class="fas fa-trash-alt" style="color:var(--red); cursor:pointer;" onclick="db.ref('bans/${k}').remove()"></i></div>`).join(""); }
        function renderAdminLogs(l) { document.getElementById('adminLogList').innerHTML = Object.entries(l).reverse().map(([k,v]) => `<div class="manage-item"><span>${v.msg}</span><i class="fas fa-trash" style="cursor:pointer;" onclick="db.ref('logs/${k}').remove()"></i></div>`).join(""); }
        function renderAdminHistory(h) { document.getElementById('adminHistoryList').innerHTML = Object.entries(h).reverse().map(([k,v]) => `<div class="manage-item"><span>${v.player} (${v.status})</span><i class="fas fa-trash" style="cursor:pointer;" onclick="db.ref('history/${k}').remove()"></i></div>`).join(""); }
    </script>
</body>
</html>
