<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Scully List | Central</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root { --accent: #ff6600; --bg: #050505; --card: #0a0a0a; --glow: 0 0 15px rgba(255, 102, 0, 0.3); }
        body { background: var(--bg); color: #fff; font-family: 'Lexend Deca', sans-serif; margin: 0; padding: 0; }
        
        .top-credits { display: flex; justify-content: center; gap: 20px; padding: 12px; background: rgba(0,0,0,0.8); border-bottom: 1px solid #111; font-size: 0.65rem; position: sticky; top: 0; z-index: 1000; }
        .credit-box i { color: var(--accent); margin-right: 5px; }
        .credit-box span { color: #888; }

        header { padding: 50px 20px; text-align: center; }
        h1 { font-size: 2.5rem; letter-spacing: 5px; margin: 0; text-transform: uppercase; }
        h1 span { color: var(--accent); text-shadow: var(--glow); }
        
        #searchBar { width: 90%; max-width: 400px; background: #000; border: 1px solid #222; color: #fff; padding: 12px; border-radius: 5px; margin-top: 20px; font-family: 'Lexend Deca'; }
        
        .header-buttons { margin-top: 25px; display: flex; justify-content: center; gap: 15px; }
        .btn-scully { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 10px 20px; text-decoration: none; font-size: 0.8rem; transition: 0.3s; cursor: pointer; font-family: 'Lexend Deca'; }
        .btn-scully:hover { background: var(--accent); color: #000; box-shadow: var(--glow); }

        #list-container { width: 95%; max-width: 900px; margin: 40px auto; display: grid; gap: 15px; min-height: 100px; }
        .level-card { background: var(--card); border: 1px solid #111; display: flex; align-items: center; padding: 15px; position: relative; transition: 0.3s; cursor: pointer; }
        .level-card:hover { transform: scale(1.02); border-color: var(--accent); }
        .level-thumb img { width: 120px; border-radius: 4px; margin-right: 20px; }
        .level-info h2 { margin: 0; font-size: 1.2rem; text-transform: uppercase; }
        .rank-number { position: absolute; right: 20px; font-size: 2rem; font-weight: 700; color: rgba(255,255,255,0.05); }

        #adminPanel { display: none; background: #000; border: 1px solid var(--accent); padding: 25px; width: 90%; max-width: 500px; margin: 50px auto; border-radius: 10px; text-align: left; }
        input, textarea { width: 100%; background: #0a0a0a; border: 1px solid #222; color: #fff; padding: 10px; margin-bottom: 10px; font-family: 'Lexend Deca'; box-sizing: border-box; }
        
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(8px); }
        .modal-content { background: #080808; margin: 5% auto; padding: 30px; width: 90%; max-width: 500px; border: 1px solid var(--accent); border-radius: 15px; position: relative; text-align: center; }
        .close-btn { position: absolute; right: 20px; top: 15px; color: var(--accent); font-size: 2rem; cursor: pointer; }
    </style>
</head>
<body>
    <nav class="top-credits">
        <div class="credit-box"><i class="fas fa-crown"></i> OWNER <span>score</span></div>
        <div class="credit-box"><i class="fas fa-user-shield"></i> ADMIN <span>Vegardo</span></div>
        <div class="credit-box"><i class="fas fa-hands-helping"></i> HELPER <span>Blitz</span></div>
        <div class="credit-box"><i class="fas fa-code"></i> CODIFICADOR <span>score</span></div>
    </nav>

    <header>
        <h1>THE <span>SCULLY</span> LIST</h1>
        <input type="text" id="searchBar" placeholder="Filtrar niveles..." onkeyup="renderLevels(this.value)">
        <div class="header-buttons">
            <a href="leaderboards.html" class="btn-scully">LEADERBOARDS</a>
            <a href="https://docs.google.com/forms/d/..." target="_blank" class="btn-scully">SUBIR RECORD</a>
        </div>
    </header>

    <main id="list-container"></main>

    <div style="margin-top: 100px; opacity: 0.05;" id="authBox">
        <input type="password" id="tokenInput" placeholder="..." style="width:100px; text-align:center;">
        <button class="btn-scully" onclick="checkAuth()">ADMIN</button>
    </div>

    <div id="adminPanel">
        <h4 style="color:var(--accent); margin:0 0 15px 0;">GESTIÓN DE DIRECTORIO</h4>
        <input type="text" id="lvlName" placeholder="Nombre Nivel">
        <input type="text" id="lvlYT" placeholder="ID YouTube (ej: d9mbeV4f64c)">
        <input type="text" id="lvlFirst" placeholder="Primer Victor">
        <input type="number" id="lvlPos" placeholder="Puesto (1 para Top 1)">
        <textarea id="lvlVictors" placeholder="Otros Victors (separados por coma)"></textarea>
        <button class="btn-scully" style="width:100%; background:var(--accent); color:#000;" onclick="saveLevel()">PUBLICAR CAMBIO</button>
        <button class="btn-scully" style="width:100%; margin-top:10px;" onclick="generarScriptJS()">DESCARGAR SCRIPT.JS PARA CLOUDFLARE</button>
    </div>

    <div id="levelModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        const TOKEN = "GdfuFCRy";
        
        function checkAuth() { 
            if(document.getElementById('tokenInput').value === TOKEN) { 
                sessionStorage.setItem('scully_session', 'active'); 
                document.getElementById('adminPanel').style.display = "block";
                document.getElementById('authBox').style.display = "none";
            } 
        }

        window.onload = function() { 
            if(sessionStorage.getItem('scully_session') === 'active') {
                document.getElementById('adminPanel').style.display = "block";
                document.getElementById('authBox').style.display = "none";
            }
            renderLevels(); 
        };

        function closeModal() { document.getElementById('levelModal').style.display = "none"; }

        // ESTA FUNCIÓN AHORA ACTUALIZA LA LISTA AL INSTANTE
        function saveLevel() {
            const name = document.getElementById('lvlName').value.trim();
            const id = document.getElementById('lvlYT').value.trim();
            const first = document.getElementById('lvlFirst').value.trim();
            const pos = parseInt(document.getElementById('lvlPos').value) - 1;
            const victors = document.getElementById('lvlVictors').value.split(',').filter(v => v.trim() !== "");
            
            if(!name || !id) return alert("Nombre e ID de YouTube son obligatorios");

            let db = JSON.parse(localStorage.getItem('scully_db_levels')) || [];
            db = db.filter(l => l.name.toLowerCase() !== name.toLowerCase());
            db.splice(pos >= 0 ? pos : db.length, 0, { name, id, first, victors });
            
            localStorage.setItem('scully_db_levels', JSON.stringify(db));
            
            // Actualizamos la lista visual sin recargar para que el usuario vea el cambio
            renderLevels();
            alert("Nivel añadido localmente. Ahora descarga el script.js");
        }

        function generarScriptJS() {
            const n = localStorage.getItem('scully_db_levels') || "[]";
            const r = localStorage.getItem('scully_ranks') || "[]";
            const script = `
localStorage.setItem('scully_db_levels', JSON.stringify(${n}));
localStorage.setItem('scully_ranks', JSON.stringify(${r}));
function getDBLevels() { return JSON.parse(localStorage.getItem('scully_db_levels')) || []; }
function calculatePoints(i) { return Math.max(100 - (i * 0.6), 5).toFixed(1); }
function renderLevels(f = "") {
    const c = document.getElementById('list-container'); if (!c) return;
    const db = getDBLevels(); c.innerHTML = "";
    db.forEach((l, i) => { if (l.name.toLowerCase().includes(f.toLowerCase())) {
        c.innerHTML += '<div class="level-card" onclick="openDetails(' + i + ')"><div class="level-thumb"><img src="https://img.youtube.com/vi/' + l.id + '/mqdefault.jpg"></div><div class="level-info"><h2>' + l.name + '</h2><p style="color:#ff6600; font-weight:bold;">+' + calculatePoints(i) + ' PTS</p></div><div class="rank-number">#' + (i + 1) + '</div></div>';
    }});
}
function openDetails(i) {
    const l = getDBLevels()[i];
    document.getElementById('modal-body').innerHTML = '<h1 style="color:#ff6600;">' + l.name + '</h1><iframe width="100%" height="250" src="https://www.youtube.com/embed/' + l.id + '" frameborder="0" allowfullscreen></iframe><p><b>FIRST:</b> ' + (l.first || "Nadie") + '</p>';
    document.getElementById('levelModal').style.display = "block";
}
document.addEventListener("DOMContentLoaded", renderLevels);`;

            const blob = new Blob([script], { type: 'text/javascript' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'script.js'; a.click();
        }
    </script>
</body>
</html>
