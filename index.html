<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Scully List | Central</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root { --accent: #ff6600; --bg: #050505; --card: #0a0a0a; --glow: 0 0 15px rgba(255, 102, 0, 0.3); }
        body { background: var(--bg); color: #fff; font-family: 'Lexend Deca', sans-serif; margin: 0; padding: 0; }
        
        .top-credits { display: flex; justify-content: center; gap: 20px; padding: 12px; background: rgba(0,0,0,0.8); border-bottom: 1px solid #111; font-size: 0.65rem; position: sticky; top: 0; z-index: 1000; }
        .credit-box i { color: var(--accent); margin-right: 5px; }
        .credit-box span { color: #888; }

        header { padding: 60px 20px; text-align: center; }
        h1 { font-size: 3rem; letter-spacing: 8px; margin: 0; text-transform: uppercase; font-weight: 700; }
        h1 span { color: var(--accent); text-shadow: var(--glow); }

        .btn-container { margin-top: 30px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .btn-scully { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 12px 25px; text-decoration: none; font-size: 0.8rem; transition: 0.3s; cursor: pointer; display: inline-block; font-weight: bold; }
        .btn-scully:hover { background: var(--accent); color: #000; box-shadow: var(--glow); }
        .btn-discord { border-color: #5865F2; color: #5865F2; }
        .btn-discord:hover { background: #5865F2; color: #fff; box-shadow: 0 0 15px rgba(88, 101, 242, 0.4); }

        .wrapper { width: 95%; max-width: 1000px; margin: 40px auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .level-card { background: var(--card); border: 1px solid #111; border-radius: 8px; overflow: hidden; display: flex; align-items: center; cursor: pointer; transition: 0.3s; position: relative; }
        .level-card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .level-thumb { width: 120px; height: 70px; flex-shrink: 0; }
        .level-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .level-info { padding: 15px; }
        .rank-number { position: absolute; right: 15px; font-size: 1.2rem; font-weight: 700; color: rgba(255,255,255,0.05); }

        #adminPanel { display: none; background: #000; border: 1px solid var(--accent); padding: 25px; width: 95%; max-width: 900px; margin: 50px auto; border-radius: 10px; }
        input { width: 100%; background: #0a0a0a; border: 1px solid #222; color: #fff; padding: 12px; margin-bottom: 10px; font-family: 'Lexend Deca'; box-sizing: border-box; }
        
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); }
        .modal-content { background: #080808; margin: 5% auto; padding: 30px; width: 90%; max-width: 600px; border: 1px solid var(--accent); border-radius: 15px; position: relative; text-align: center; }
        
        .admin-access { margin: 100px 0 30px; text-align: center; opacity: 0.05; transition: 0.3s; }
        .admin-access:hover { opacity: 1; }
    </style>
</head>
<body>
    <nav class="top-credits">
        <div class="credit-box"><i class="fas fa-crown"></i> OWNER <span>score</span></div>
        <div class="credit-box"><i class="fas fa-user-shield"></i> ADMIN <span>Vegardo</span></div>
        <div class="credit-box"><i class="fas fa-hands-helping"></i> HELPER <span>Blitz</span></div>
        <div class="credit-box"><i class="fas fa-code"></i> CODIFICADOR <span>score</span></div>
    </nav>

    <header>
        <h1>THE SCULLY <span>LIST</span></h1>
        <div class="btn-container">
            <a href="leaderboards.html" class="btn-scully">LEADERBOARDS</a>
            <a href="https://discord.gg/HDGzCVazwT" target="_blank" class="btn-scully btn-discord"><i class="fab fa-discord"></i> DISCORD OFICIAL</a>
        </div>
    </header>

    <main class="wrapper" id="list-container"></main>

    <div class="admin-access"><i class="fas fa-lock" onclick="toggleAuth()"></i><div id="authBox" style="display:none;"><input type="password" id="tokenInput" placeholder="Token"><button class="btn-scully" onclick="checkAuth()">ENTRAR</button></div></div>

    <div id="adminPanel">
        <h2 style="color:var(--accent); text-align:center;">ADMIN DIRECTORIO</h2>
        <input type="text" id="lvlName" placeholder="Nombre Nivel">
        <input type="text" id="lvlYT" placeholder="ID YouTube">
        <input type="text" id="lvlFirst" placeholder="First Victor">
        <input type="number" id="lvlPos" placeholder="Posición (1, 2...)">
        <button class="btn-scully" style="width:100%; background:var(--accent); color:#000;" onclick="saveLevel()">PUBLICAR EN LA NUBE</button>
        <div id="adminLvlList" style="margin-top:20px; max-height: 200px; overflow-y: auto;"></div>
    </div>

    <div id="levelModal" class="modal"><div class="modal-content"><span onclick="closeM()" style="position:absolute; right:20px; top:10px; cursor:pointer; font-size:2rem; color:var(--accent)">&times;</span><div id="modal-body"></div></div></div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://scullylist-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const TOKEN = "GdfuFCRy";

        db.ref('levels').on('value', (snapshot) => {
            const niveles = snapshot.val() || [];
            renderLevels(niveles);
            if(sessionStorage.getItem('scully_session') === 'active') updateAdminList(niveles);
        });

        function calculatePoints(i) { return Math.max(100 - (i * 0.6), 5).toFixed(1); }
        function renderLevels(niveles) {
            document.getElementById('list-container').innerHTML = niveles.map((l, i) => `
                <div class="level-card" onclick="openDetails('${l.id}', '${l.name}', ${i}, '${l.first}')">
                    <div class="level-thumb"><img src="https://img.youtube.com/vi/${l.id}/mqdefault.jpg"></div>
                    <div class="level-info"><h2>${l.name}</h2><p style="color:#ff6600;">+${calculatePoints(i)} PTS</p></div>
                    <div class="rank-number">#${i + 1}</div>
                </div>`).join("");
        }
        function openDetails(id, name, i, first) {
            document.getElementById('modal-body').innerHTML = `<h1>${name}</h1><iframe width="100%" height="315" src="https://www.youtube.com/embed/${id}" frameborder="0" allowfullscreen></iframe><p style="margin-top:15px;"><b>FIRST VICTOR:</b> ${first || 'Nadie'}</p>`;
            document.getElementById('levelModal').style.display = "block";
        }
        function toggleAuth() { const b = document.getElementById('authBox'); b.style.display = b.style.display === "block" ? "none" : "block"; }
        function checkAuth() { if(document.getElementById('tokenInput').value === TOKEN) { sessionStorage.setItem('scully_session', 'active'); location.reload(); } }
        function saveLevel() {
            const name = document.getElementById('lvlName').value.trim();
            const id = document.getElementById('lvlYT').value.trim();
            const first = document.getElementById('lvlFirst').value.trim();
            const pos = parseInt(document.getElementById('lvlPos').value) - 1;
            db.ref('levels').once('value', (s) => {
                let lvls = s.val() || [];
                lvls = lvls.filter(l => l.name.toLowerCase() !== name.toLowerCase());
                lvls.splice(pos >= 0 ? pos : lvls.length, 0, { name, id, first });
                db.ref('levels').set(lvls); alert("¡Guardado en la Nube!");
            });
        }
        function deleteLvl(index) { if(confirm("¿Borrar?")) db.ref('levels').once('value', (s) => { let l = s.val() || []; l.splice(index, 1); db.ref('levels').set(l); }); }
        function updateAdminList(l) { document.getElementById('adminLvlList').innerHTML = l.map((lvl, i) => `<div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #111;"><span>#${i+1} ${lvl.name}</span><i class="fas fa-trash" onclick="deleteLvl(${i})" style="color:red; cursor:pointer;"></i></div>`).join(""); }
        window.onload = () => { if(sessionStorage.getItem('scully_session') === 'active') document.getElementById('adminPanel').style.display = "block"; };
        function closeM() { document.getElementById('levelModal').style.display = "none"; }
    </script>
</body>
</html>
