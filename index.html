<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Scully List | Hub Interactivo</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root { 
            --accent: #ff6600; --accent-grad: linear-gradient(135deg, #ff6600 0%, #ff9900 100%);
            --bg: #030303; --card-bg: rgba(15, 15, 15, 0.7);
            --glow: 0 0 20px rgba(255, 102, 0, 0.2); --border: rgba(255, 255, 255, 0.05);
            --green: #00ff66; --red: #ff3333;
        }

        body { background: var(--bg); color: #fff; font-family: 'Lexend Deca', sans-serif; margin: 0; padding: 0; overflow-x: hidden; scroll-behavior: smooth; }

        /* PULSE CON COLORES */
        .marquee-container { background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); padding: 12px 0; font-size: 0.65rem; position: sticky; top: 0; z-index: 1000; }
        .marquee-content { display: flex; white-space: nowrap; animation: marquee 40s linear infinite; }
        .log-item { margin-right: 80px; letter-spacing: 2px; text-transform: uppercase; font-weight: 800; }
        .log-accept { color: var(--green); text-shadow: 0 0 10px rgba(0,255,102,0.4); }
        .log-ban { color: var(--red); text-shadow: 0 0 10px rgba(255,51,51,0.4); }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .staff-bar { display: flex; justify-content: center; gap: 20px; padding: 10px; background: rgba(255,255,255,0.02); font-size: 0.55rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
        .staff-item b { color: var(--accent); }

        header { padding: 80px 20px 40px; text-align: center; }
        h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); font-weight: 800; margin: 0; letter-spacing: -2px; }
        h1 span { background: var(--accent-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .main-nav { margin-top: 30px; display: flex; justify-content: center; gap: 15px; }
        .btn-scully { background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: #fff; padding: 14px 28px; text-decoration: none; font-size: 0.75rem; border-radius: 50px; font-weight: 600; transition: 0.3s; text-transform: uppercase; }
        .btn-scully:hover { background: var(--accent); color: #000; box-shadow: var(--glow); transform: translateY(-3px); }

        /* RULETA */
        .roulette-wrapper { max-width: 800px; margin: 40px auto; padding: 40px; background: var(--card-bg); border-radius: 30px; border: 1px solid var(--border); backdrop-filter: blur(10px); text-align: center; }
        .roulette-display { font-size: 2.2rem; font-weight: 800; color: #fff; padding: 30px; background: rgba(0,0,0,0.3); border-radius: 20px; margin-bottom: 25px; border: 1px solid rgba(255, 102, 0, 0.1); }

        /* GRID */
        .list-grid { width: 95%; max-width: 1200px; margin: 60px auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .level-card { background: var(--card-bg); border-radius: 20px; padding: 12px; display: flex; align-items: center; cursor: pointer; border: 1px solid var(--border); transition: 0.4s; }
        .level-card:hover { border-color: var(--accent); transform: scale(1.03); background: rgba(255,102,0,0.05); }
        .level-card img { width: 120px; height: 75px; border-radius: 12px; object-fit: cover; margin-right: 20px; }

        /* FORMULARIO */
        .form-section { background: rgba(10,10,10,0.5); padding: 100px 20px; border-top: 1px solid var(--border); }
        .glass-form { max-width: 500px; margin: 0 auto; background: var(--card-bg); padding: 40px; border-radius: 30px; border: 1px solid var(--border); }
        input, select { width: 100%; background: #000; border: 1px solid #222; color: #fff; padding: 16px; border-radius: 15px; margin-bottom: 20px; font-family: 'Lexend Deca'; box-sizing: border-box; }

        /* ADMIN PANEL */
        #adminPanel { display: none; background: #000; border: 1px solid var(--accent); padding: 40px; width: 95%; max-width: 1150px; margin: 50px auto; border-radius: 30px; box-shadow: var(--glow); }
        .admin-layout { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 30px; }
        .admin-col { background: #080808; padding: 20px; border-radius: 15px; border: 1px solid #111; }
        .sub-item { background: #000; padding: 15px; border-radius: 12px; margin-bottom: 12px; border-left: 4px solid #222; font-size: 0.7rem; line-height: 1.5; }

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); }
        .modal-content { background: #0a0a0a; margin: 2% auto; padding: 35px; width: 90%; max-width: 650px; border-radius: 30px; border: 1px solid var(--border); text-align: center; max-height: 90vh; overflow-y: auto; }
        .admin-lock { text-align: center; padding: 100px 0; opacity: 0.05; cursor: pointer; transition: 0.3s; }
        .admin-lock:hover { opacity: 1; color: var(--accent); }
    </style>
</head>
<body>

    <div class="marquee-container">
        <div class="marquee-content" id="pulse-content">
            <span class="log-item">📡 Conectando con el núcleo de la Scully List...</span>
        </div>
    </div>

    <nav class="staff-bar">
        <div class="staff-item">OWNER <b>score</b></div>
        <div class="staff-item">ADMIN <b>Vegardo</b></div>
        <div class="staff-item">HELPER <b>Blitz</b></div>
        <div class="staff-item">HELPER <b>Sopa354</b></div>
        <div class="staff-item">CODIFICADOR <b>score</b></div>
    </nav>

    <header>
        <h1>THE SCULLY <span>LIST</span></h1>
        <div class="main-nav">
            <a href="leaderboards.html" class="btn-scully">Ranking Global</a>
            <a href="https://discord.gg/HDGzCVazwT" target="_blank" class="btn-scully" style="color:#5865F2; border-color:#5865F2;">Discord</a>
            <a href="#submit" class="btn-scully">Subir Récord</a>
        </div>
    </header>

    <section class="roulette-wrapper">
        <div id="roulette-result" class="roulette-display">¿QUÉ VAS A PASARTE?</div>
        <button class="spin-btn btn-scully" style="background:var(--accent); color:#000;" onclick="spin()">Girar Ruleta</button>
    </section>

    <main class="list-grid" id="list-container"></main>

    <section class="form-section" id="submit">
        <div class="glass-form">
            <h2 style="margin-top:0; color:var(--accent);">Enviar Récord</h2>
            <input type="text" id="recPlayer" placeholder="Tu Nombre">
            <select id="recLevel"><option value="">-- Seleccionar Nivel --</option></select>
            <input type="text" id="recLink" placeholder="Link YouTube/Twitch">
            <input type="text" id="recRaw" placeholder="Link RAW (Solo Google Drive)">
            <select id="recCountry"><option value="es">España</option><option value="mx">México</option><option value="ar">Argentina</option><option value="cl">Chile</option><option value="co">Colombia</option><option value="pe">Perú</option></select>
            <button class="btn-scully" style="width:100%; background:var(--accent); color:#000; border:none;" onclick="submitRecord()">Publicar Récord</button>
        </div>
    </section>

    <div class="admin-lock" onclick="toggleAuth()"><i class="fas fa-lock"></i></div>
    <div id="authBox" style="display:none; text-align:center; padding-bottom:100px;">
        <input type="password" id="tokenInput" placeholder="Token Admin" style="width:150px;">
        <button class="btn-scully" onclick="checkAuth()">ENTRAR</button>
    </div>

    <div id="adminPanel">
        <h2 style="color:var(--accent); text-align:center; margin-top:0; letter-spacing:5px;">CONTROL CENTRAL</h2>
        <div class="admin-layout">
            <div class="admin-col">
                <p style="font-size:0.6rem; color:#444; font-weight:bold;">AÑADIR NIVEL</p>
                <input type="text" id="lvlName" placeholder="Nombre">
                <input type="text" id="lvlYT" placeholder="ID YouTube">
                <input type="number" id="lvlPos" placeholder="Top Pos">
                <button class="btn-scully" style="width:100%;" onclick="saveLevel()">PUBLICAR</button>
                <div id="adminLvlList" style="margin-top:15px; max-height:150px; overflow-y:auto;"></div>
            </div>
            <div class="admin-col">
                <p style="font-size:0.6rem; color:var(--green); font-weight:bold;">BUZÓN DE RÉCORDS</p>
                <div id="submissionsList" style="max-height:400px; overflow-y:auto;"></div>
            </div>
            <div class="admin-col">
                <p style="font-size:0.6rem; color:var(--red); font-weight:bold;">SISTEMA SANCIONES</p>
                <input type="text" id="banUser" placeholder="Nombre del Jugador">
                <button class="btn-scully" style="border-color:var(--red); color:var(--red); width:100%;" onclick="banPlayer()">BANEAR DEFINITIVO</button>
                <div id="banList" style="margin-top:20px; font-size:0.65rem; color:#666;"></div>
            </div>
        </div>
    </div>

    <div id="levelModal" class="modal"><div class="modal-content"><span onclick="closeM()" style="float:right; cursor:pointer; font-size:2rem;">&times;</span><div id="modal-body"></div></div></div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://scullylist-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const TOKEN = "GdfuFCRy";
        let fullData = {};

        db.ref('/').on('value', (s) => {
            fullData = s.val() || {};
            renderLevels(fullData.levels || []);
            updateLevelSelect(fullData.levels || []);
            updatePulse(fullData.logs || {});
            if(sessionStorage.getItem('scully_session') === 'active') {
                document.getElementById('adminPanel').style.display = "block";
                renderSubmissions(fullData.submissions || {});
                renderBanList(fullData.bans || {});
                updateAdminList(fullData.levels || []);
            }
        });

        function updatePulse(logs) {
            const cont = document.getElementById('pulse-content');
            const entries = Object.values(logs).reverse().slice(0, 10);
            if(entries.length === 0) { cont.innerHTML = `<span class="log-item">🚀 Scully List: Sistema en tiempo real activo</span>`; return; }
            cont.innerHTML = entries.map(l => `<span class="log-item ${l.type === 'accept' ? 'log-accept' : 'log-ban'}">${l.msg}</span>`).join("");
        }

        function renderLevels(lvls) {
            const calc = (i) => Math.max(100 - (i * 0.6), 5).toFixed(1);
            document.getElementById('list-container').innerHTML = lvls.map((l, i) => `
                <div class="level-card" onclick="openDetails(${i})">
                    <img src="https://img.youtube.com/vi/${l.id}/mqdefault.jpg">
                    <div><h3 style="margin:0;">${l.name}</h3><p style="color:var(--accent); font-weight:800; margin:0;">+${calc(i)} PTS</p></div>
                    <div style="position:absolute; right:15px; opacity:0.05; font-size:2rem; font-weight:900;">#${i+1}</div>
                </div>`).join("");
        }

        function banPlayer() {
            const name = document.getElementById('banUser').value.trim();
            if(!name) return;
            const staff = prompt("¿Staff que banea?");
            db.ref('bans').push(name);
            db.ref('logs').push({ type: 'ban', msg: `⛔ ${name} BANEADO POR ${staff || 'ADMIN'}` });
            document.getElementById('banUser').value = "";
        }

        function renderBanList(bans) {
            document.getElementById('banList').innerHTML = "BANEADOS ACTUALES: <br>" + Object.values(bans).join(", ");
        }

        function acceptSubmission(key, player, level) {
            const staff = prompt("¿Staff que aprueba?");
            db.ref('logs').push({ type: 'accept', msg: `✅ RÉCORD DE ${player} EN ${level} ACEPTADO POR ${staff || 'ADMIN'}` });
            db.ref('submissions/' + key).remove();
        }

        function submitRecord() {
            const p = document.getElementById('recPlayer').value;
            const l = document.getElementById('recLevel').value;
            const v = document.getElementById('recLink').value;
            const r = document.getElementById('recRaw').value;
            const c = document.getElementById('recCountry').value;
            if(!r.includes("drive.google.com")) return alert("ERROR: El RAW debe ser de Google Drive obligatoriamente.");
            db.ref('submissions').push({ player: p, level: l, link: v, raw: r, country: c });
            alert("Récord enviado!");
        }

        function openDetails(idx) {
            const l = fullData.levels[idx];
            const p = Object.values(fullData.players || {});
            const bans = Object.values(fullData.bans || {});
            const victors = p.filter(x => !bans.includes(x.name) && (x.completions || []).some(c => c.level === l.name));
            
            document.getElementById('modal-body').innerHTML = `
                <h1 style="color:var(--accent);">${l.name}</h1>
                <iframe width="100%" height="300" src="https://www.youtube.com/embed/${l.id}" frameborder="0" allowfullscreen style="border-radius:20px; border:1px solid #222;"></iframe>
                <div style="margin-top:25px; text-align:left; background:#000; padding:15px; border-radius:15px;">
                    <p style="font-size:0.6rem; color:var(--accent); font-weight:800;">LISTA DE VICTORS</p>
                    ${victors.map(v => `<div style="padding:10px; border-bottom:1px solid #111; font-size:0.8rem;"><img src="https://flagcdn.com/w20/${v.country}.png" style="margin-right:10px;">${v.name}</div>`).join("") || '<p>Nadie aún.</p>'}
                </div>`;
            document.getElementById('levelModal').style.display = "block";
        }

        function spin() {
            const lvls = fullData.levels || [];
            const res = document.getElementById('roulette-result');
            let i = 0;
            const t = setInterval(() => { res.innerText = lvls[Math.floor(Math.random()*lvls.length)].name; i++; if(i>20) clearInterval(t); }, 50);
        }

        function saveLevel() {
            const n = document.getElementById('lvlName').value;
            const y = document.getElementById('lvlYT').value;
            const p = parseInt(document.getElementById('lvlPos').value) - 1;
            db.ref('levels').once('value', s => {
                let l = s.val() || [];
                l = l.filter(x => x.name.toLowerCase() !== n.toLowerCase());
                l.splice(p >= 0 ? p : l.length, 0, { name: n, id: y });
                db.ref('levels').set(l);
            });
        }
        function deleteLvl(i) { db.ref('levels').once('value', s => { let l = s.val() || []; l.splice(i, 1); db.ref('levels').set(l); }); }
        function renderSubmissions(s) {
            document.getElementById('submissionsList').innerHTML = Object.entries(s).map(([k, x]) => `
                <div class="sub-item">
                    <b>${x.player}</b> -> ${x.level}<br>
                    <a href="${x.raw}" target="_blank" style="color:var(--green)">VER RAW</a> | 
                    <button onclick="acceptSubmission('${k}','${x.player}','${x.level}')" style="color:var(--green); background:none; border:none; cursor:pointer;">ACEPTAR</button>
                    <button onclick="db.ref('submissions/${k}').remove()" style="color:var(--red); background:none; border:none; cursor:pointer;">X</button>
                </div>`).join("");
        }
        function toggleAuth() { const b = document.getElementById('authBox'); b.style.display = b.style.display === "block" ? "none" : "block"; }
        function checkAuth() { if(document.getElementById('tokenInput').value === TOKEN) { sessionStorage.setItem('scully_session', 'active'); location.reload(); } }
        function closeM() { document.getElementById('levelModal').style.display = "none"; }
        function updateLevelSelect(n) { document.getElementById('recLevel').innerHTML = '<option value="">-- Nivel --</option>' + n.map(l => `<option value="${l.name}">${l.name}</option>`).join(""); }
        function updateAdminList(l) { document.getElementById('adminLvlList').innerHTML = l.map((x, i) => `<div style="font-size:0.6rem; display:flex; justify-content:space-between; padding:4px;"><span>#${i+1} ${x.name}</span><i class="fas fa-trash" onclick="deleteLvl(${i})" style="color:red; cursor:pointer;"></i></div>`).join(""); }
    </script>
</body>
</html>
