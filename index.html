<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Scully List | Hub de Ingeniería</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta property="og:title" content="The Scully List | Hub de Ingeniería">
    <meta property="og:description" content="Tanta innovación que es ilegal.">
    <meta property="og:image" content="preview.png">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Lexend+Deca:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #ff6600; --accent-grad: linear-gradient(135deg, var(--accent) 0%, #ff9900 100%); --bg: #030303; --card-bg: rgba(15, 15, 15, 0.85); --glow: 0 0 25px rgba(255, 102, 0, 0.3); --border: rgba(255, 255, 255, 0.05); --green: #00ff66; --red: #ff3333; --blue: #00ccff; --purple: #cc00ff; --gold: #ffd700; }
        body { background: var(--bg); color: #fff; font-family: 'Lexend Deca', sans-serif; margin: 0; overflow-x: hidden; scroll-behavior: smooth; }
        #globalAlert { display: none; background: var(--red); color: #fff; text-align: center; padding: 12px; font-weight: 800; font-size: 0.75rem; text-transform: uppercase; position: sticky; top: 0; z-index: 2000; }
        .news-ticker { background: rgba(0,0,0,0.95); border-bottom: 1px solid var(--border); padding: 12px 0; font-size: 0.65rem; font-family: 'JetBrains Mono'; overflow: hidden; display: flex; }
        .ticker-content { display: flex; white-space: nowrap; animation: ticker-scroll 45s linear infinite; }
        .log-item { margin-right: 100px; display: flex; align-items: center; gap: 8px; text-transform: uppercase; }
        @keyframes ticker-scroll { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }
        .staff-bar { display: flex; justify-content: center; gap: 20px; padding: 15px; background: rgba(255,255,255,0.02); font-size: 0.6rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; font-weight: 700; text-transform: uppercase; }
        header { padding: 60px 20px 40px; text-align: center; }
        h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); font-weight: 800; margin: 0; letter-spacing: -2px; }
        h1 span { background: var(--accent-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .main-nav { margin-top: 35px; display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
        .btn-scully { background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: #fff; padding: 12px 24px; text-decoration: none; font-size: 0.7rem; border-radius: 50px; font-weight: 700; transition: 0.3s; text-transform: uppercase; display: inline-flex; align-items: center; gap: 8px; position: relative; cursor: pointer; }
        .btn-scully:hover { background: var(--accent); color: #000; transform: translateY(-3px); box-shadow: var(--glow); }
        .badge-new { background: var(--purple); color: #fff; font-size: 0.5rem; padding: 2px 6px; border-radius: 4px; position: absolute; top: -5px; right: -5px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .container { width: 95%; max-width: 1200px; margin: 40px auto; }
        .throne-card { background-size: cover; background-position: center; border-radius: 30px; padding: 60px; border: 2px solid var(--accent); position: relative; overflow: hidden; min-height: 280px; display: flex; align-items: center; box-shadow: var(--glow); }
        .throne-card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(to right, #000 50%, transparent); }
        .throne-info { position: relative; z-index: 2; }
        .list-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 40px; }
        .level-card { background: var(--card-bg); border-radius: 20px; padding: 15px; display: flex; align-items: center; border: 1px solid var(--border); cursor: pointer; transition: 0.3s; position: relative; overflow: hidden; }
        .level-card:hover { border-color: var(--accent); transform: scale(1.03); }
        .level-card img { width: 100px; height: 60px; border-radius: 12px; object-fit: cover; margin-right: 15px; }
        .level-rank { position: absolute; right: 20px; font-weight: 900; font-size: 2rem; opacity: 0.05; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; backdrop-filter: blur(15px); }
        .modal-content { background: #0a0a0a; margin: 5vh auto; padding: 40px; width: 90%; max-width: 650px; border-radius: 30px; border: 1px solid var(--border); position: relative; max-height: 85vh; overflow-y: auto; }
        .victor-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #111; font-size: 0.8rem; }
        footer { padding: 60px; text-align: center; border-top: 1px solid var(--border); font-size: 0.7rem; color: #444; letter-spacing: 2px; }
    </style>
    <style id="custom-css-injector"></style>
</head>
<body>
    <div id="globalAlert"></div>
    <div class="news-ticker"><div class="ticker-content" id="ticker-box"></div></div>
    <nav class="staff-bar">
        <div class="staff-item" style="color:#fff;">TRIBUTO A 2PARX 🕊️</div>
        <div class="staff-item"><i class="fas fa-crown"></i> OWNER <b>score</b></div>
        <div class="staff-item"><i class="fas fa-user-shield"></i> ADMIN <b>awrqsdt</b></div>
    </nav>
    <header>
        <h1>THE SCULLY <span>LIST</span></h1>
        <div class="main-nav">
            <a href="index.html" class="btn-scully active"><i class="fas fa-list-ol"></i> Lista</a>
            <a href="leaderboards.html" class="btn-scully"><i class="fas fa-trophy"></i> Ranking</a>
            <a href="market.html" class="btn-scully" style="color:var(--gold); border-color:var(--gold);"><i class="fas fa-shopping-cart"></i> Mercado <span class="badge-new">XP</span></a>
            <a href="submit.html" class="btn-scully"><i class="fas fa-upload"></i> Enviar</a>
            <a href="login.html" class="btn-scully" id="nav-login">Acceso</a>
            <a href="admin.html" id="adminBtn" class="btn-scully" style="display:none; background:var(--accent); color:#000;">MASTER PANEL</a>
        </div>
    </header>
    <main class="container">
        <div id="throne-container"></div>
        <div class="list-grid" id="main-list"></div>
    </main>
    <footer>THE SCULLY LIST &copy; 2026 | BY SCORE</footer>
    <div id="levelModal" class="modal"><div class="modal-content" id="modal-body"></div></div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyC2vrauBlplKGMjeLW3mLzZQr05khmH5v0", authDomain: "scullylist.firebaseapp.com", databaseURL: "https://scullylist-default-rtdb.firebaseio.com", projectId: "scullylist", storageBucket: "scullylist.firebasestorage.app", messagingSenderId: "498548914021", appId: "1:498548914021:web:59128b5e06b36a4e81938c" };
        firebase.initializeApp(firebaseConfig); const db = firebase.database(), auth = firebase.auth();
        let fullData = {};
        db.ref('/').on('value', snap => {
            fullData = snap.val() || {};
            const lvls = fullData.levels ? (Array.isArray(fullData.levels) ? fullData.levels.filter(l=>l) : Object.values(fullData.levels)) : [];
            renderUI(lvls);
            if(fullData.system_settings) {
                if(fullData.system_settings.global_alert) { document.getElementById('globalAlert').innerText = fullData.system_settings.global_alert_msg; document.getElementById('globalAlert').style.display='block'; }
                if(fullData.system_settings.custom_css) document.getElementById('custom-css-injector').innerHTML = fullData.system_settings.custom_css;
            }
            const ticker = document.getElementById('ticker-box');
            ticker.innerHTML = Object.values(fullData.logs || {}).reverse().slice(0,10).map(l => `<span class="log-item"><i class="fas fa-terminal"></i> ${l.msg}</span>`).join("");
        });
        function renderUI(lvls){
            if(lvls[0]) document.getElementById('throne-container').innerHTML = `<div class="throne-card" style="background-image: url('https://i.ytimg.com/vi/${lvls[0].id}/maxresdefault.jpg');"><div class="throne-info"><div style="background:var(--accent); color:#000; padding:5px 15px; border-radius:4px; font-size:0.6rem; font-weight:900; margin-bottom:15px; display:inline-block;">TOP #1 BOSS</div><h2>${lvls[0].name}</h2><p>Vencedor: <b style="color:var(--accent)">${lvls[0].first || 'Nadie'}</b></p><button class="btn-scully" onclick="openDetails(0)">VER RÉCORDS</button></div></div>`;
            document.getElementById('main-list').innerHTML = lvls.map((l, i) => `<div class="level-card" onclick="openDetails(${i})"><img src="https://img.youtube.com/vi/${l.id}/mqdefault.jpg"><div><h3>${l.name}</h3><p>+${Math.max(100-(i*0.6),5).toFixed(1)} XP</p></div><div class="level-rank">#${i+1}</div></div>`).join("");
        }
        function openDetails(idx){
            const l = (Array.isArray(fullData.levels)?fullData.levels:Object.values(fullData.levels))[idx];
            const approved = Object.values(fullData.players || {}).filter(p => { let c = p.completions ? (Array.isArray(p.completions)?p.completions:Object.values(p.completions)) : []; return c.some(x => x.level === l.name) && !p.hidden; });
            document.getElementById('modal-body').innerHTML = `<span onclick="this.parentElement.parentElement.style.display='none'" style="position:absolute; top:20px; right:25px; cursor:pointer;">✕</span><h2>${l.name}</h2><iframe width="100%" height="320" src="https://www.youtube.com/embed/${l.id}" frameborder="0" allowfullscreen style="border-radius:15px;"></iframe><div style="margin-top:20px;">${approved.map(p => `<div class="victor-row"><span>${p.name}</span><a href="${p.completions.find(x=>x.level===l.name).link}" target="_blank" style="color:var(--accent)">VIDEO</a></div>`).join("") || '<p>Sin récords aún.</p>'}</div>`;
            document.getElementById('levelModal').style.display='block';
        }
        auth.onAuthStateChanged(u => { if(u) db.ref('players').once('value', s => { const me = Object.values(s.val()||{}).find(x=>x.email===u.email); if(me && me.role) document.getElementById('adminBtn').style.display='inline-flex'; }); });
    </script>
</body>
</html>
