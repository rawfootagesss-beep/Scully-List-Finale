<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Scully List | Hub de Ingeniería</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --accent: #ff6600; --accent-grad: linear-gradient(135deg, var(--accent) 0%, #ff9900 100%);
            --bg: #030303; --card-bg: rgba(15, 15, 15, 0.85);
            --glow: 0 0 25px rgba(255, 102, 0, 0.3); --border: rgba(255, 255, 255, 0.05);
            --green: #00ff66; --red: #ff3333; --blue: #00ccff; --yellow: #ffff00;
        }
        body { background: var(--bg); color: #fff; font-family: 'Lexend Deca', sans-serif; margin: 0; padding: 0; overflow-x: hidden; scroll-behavior: smooth; }
        @keyframes rainbow { 0% { color: #ff0000; } 20% { color: #ff9900; } 40% { color: #ffff00; } 60% { color: #00ff00; } 80% { color: #00ffff; } 100% { color: #cc00ff; } }
        .cos-rainbow { animation: rainbow 3s linear infinite !important; font-weight: 800; }
        .news-ticker { background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); padding: 12px 0; font-size: 0.65rem; position: sticky; top: 0; z-index: 1000; overflow: hidden; display: flex; }
        .ticker-content { display: flex; white-space: nowrap; animation: ticker-scroll 45s linear infinite; }
        .log-item { margin-right: 100px; letter-spacing: 2px; text-transform: uppercase; font-weight: 800; display: flex; align-items: center; gap: 8px; }
        @keyframes ticker-scroll { 0% { transform: translateX(80vw); } 100% { transform: translateX(-250%); } }
        .staff-bar { display: flex; justify-content: center; gap: 25px; padding: 15px; background: rgba(255,255,255,0.02); font-size: 0.6rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; align-items: center; }
        header { padding: 60px 20px 20px; text-align: center; }
        h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); font-weight: 800; margin: 0; letter-spacing: -2px; }
        h1 span { background: var(--accent-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .main-nav { margin-top: 35px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; align-items: center; }
        .btn-scully { background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: #fff; padding: 14px 28px; text-decoration: none; font-size: 0.75rem; border-radius: 50px; font-weight: 600; transition: 0.3s; text-transform: uppercase; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .btn-scully:hover { background: var(--accent); color: #000; transform: translateY(-3px); box-shadow: var(--glow); }
        .throne-section { width: 90%; max-width: 800px; margin: 40px auto; }
        .throne-card { background-size: cover; background-position: center; border-radius: 30px; padding: 50px; border: 2px solid var(--accent); box-shadow: var(--glow); display: flex; align-items: center; position: relative; overflow: hidden; min-height: 220px; }
        .throne-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to right, #000 40%, transparent); z-index: 1; }
        .throne-info { position: relative; z-index: 2; }
        .list-grid { width: 95%; max-width: 1200px; margin: 40px auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .level-card { background: var(--card-bg); border-radius: 20px; padding: 12px; display: flex; align-items: center; border: 1px solid var(--border); cursor: pointer; transition: 0.3s; position: relative; }
        .level-card:hover { border-color: var(--accent); transform: scale(1.02); }
        .level-card img { width: 100px; height: 60px; border-radius: 10px; object-fit: cover; margin-right: 15px; }
        .status-tracker { max-width: 600px; margin: 60px auto; padding: 45px; background: var(--card-bg); border-radius: 40px; border: 1px solid var(--border); text-align: center; }
        .user-pfp-display { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--accent); margin: 0 auto 20px; object-fit: cover; background: #111; display: block; }
        .xp-tag { background: #000; color: var(--accent); padding: 8px 18px; border-radius: 10px; font-size: 0.75rem; font-weight: 800; border: 1px solid var(--accent); display: inline-block; margin-bottom: 20px; }
        .status-pill { padding: 15px; border-radius: 12px; margin-bottom: 10px; font-size: 0.8rem; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.5); border: 1px solid var(--border); text-decoration: none; color: inherit; transition: 0.3s; }
        .status-pill:hover { background: rgba(255,255,255,0.05); }
        .st-label { font-weight: 800; text-transform: uppercase; font-size: 0.6rem; padding: 5px 10px; border-radius: 6px; }
        .footer-credits { padding: 60px 20px; text-align: center; background: rgba(255,255,255,0.02); border-top: 1px solid var(--border); margin-top: 100px; }
        .color-trigger { display: inline-flex; align-items: center; justify-content: center; width: 50px; height: 50px; background: var(--accent); color: #000; border-radius: 50%; cursor: pointer; font-size: 1.2rem; box-shadow: var(--glow); transition: 0.3s; margin-top: 20px; }
        #themeColor { opacity: 0; position: absolute; pointer-events: none; }
        .admin-lock { text-align: center; padding: 100px 0; opacity: 0.03; cursor: pointer; }
        .modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); }
        .modal-content { background: #0a0a0a; margin: 5vh auto; padding: 35px; width: 90%; max-width: 650px; border-radius: 35px; border: 1px solid var(--border); text-align: center; position: relative; }
    </style>
</head>
<body>
    <div class="news-ticker"><div class="ticker-content" id="pulse-content"></div></div>
    <nav class="staff-bar">
        <div class="staff-item tribute-item" style="color:#fff; font-weight:800;">Tributo a 2parx 🕊️</div>
        <div class="staff-item"><i class="fas fa-crown" style="color:var(--accent)"></i> OWNER <b style="color:#fff">score</b></div>
        <div class="staff-item"><i class="fas fa-user-shield" style="color:var(--accent)"></i> ADMIN <b style="color:#fff">Vegardo</b></div>
        <div class="staff-item"><i class="fas fa-hands-helping" style="color:var(--accent)"></i> HELPER <b style="color:#fff">Blitz</b></div>
        <div class="staff-item"><i class="fas fa-hands-helping" style="color:var(--accent)"></i> HELPER <b style="color:#fff">Sopa354</b></div>
    </nav>
    <header>
        <h1>THE SCULLY <span>LIST</span></h1>
        <p style="font-size:0.7rem; color:#444; margin-top:10px; font-style:italic;">Versión 1.0 | Muchos niveles por agregar, atentos ;)</p>
        <div class="main-nav">
            <a href="index.html" class="btn-scully" style="color:var(--green); border-color:var(--green);"><i class="fas fa-list-ol"></i> Lista</a>
            <a href="leaderboards.html" class="btn-scully"><i class="fas fa-trophy"></i> Ranking</a>
            <a href="versus.html" class="btn-scully"><i class="fas fa-bolt"></i> Versus</a>
            <a href="market.html" class="btn-scully"><i class="fas fa-shopping-cart"></i> Mercado</a>
            <a href="submit.html" class="btn-scully"><i class="fas fa-upload"></i> Enviar</a>
            <button class="btn-scully" onclick="spinRoulette()"><i class="fas fa-dice"></i></button>
            <a href="admin.html" id="adminHubBtn" class="btn-scully" style="display:none; background:var(--accent); color:#000;"><i class="fas fa-user-cog"></i> ADMIN</a>
        </div>
    </header>
    
    <section class="throne-section" id="throneDisplay"></section>
    <main class="list-grid" id="main-list"></main>

    <section class="status-tracker">
        <h2 style="color:var(--accent); font-size: 0.9rem; letter-spacing: 2px; text-transform: uppercase;">Identidad Scully</h2>
        <div id="statusDisplay" style="margin-bottom:20px;"><p style="color:#444;">Escribe tu Nickname para ver tu perfil.</p></div>
        <input type="text" id="checkInput" placeholder="Tu Nick..." style="background:#000; border:1px solid #222; color:#fff; padding:15px; width:100%; border-radius:15px; margin-bottom:20px; box-sizing:border-box; text-align:center;">
        <button class="btn-scully" style="width:100%; justify-content:center; border-radius:15px;" onclick="checkStatus()">VER MI PERFIL</button>
    </section>

    <footer class="footer-credits">
        <p style="color:#444; font-size:0.7rem; text-transform:uppercase;">The Scully List &copy; 2026</p>
        <label for="themeColor" class="color-trigger"><i class="fas fa-palette"></i></label>
        <input type="color" id="themeColor" oninput="updateThemeColor(this.value)">
    </footer>

    <div class="admin-lock" onclick="toggleAuth()"><i class="fas fa-lock"></i></div>
    <div id="ruletaModal" class="modal"><div class="modal-content"><h2 style="color:var(--accent);">RULETA</h2><div id="ruletaText" style="font-size:2rem; font-weight:800; margin:20px 0;">---</div><button class="btn-scully" onclick="spinRoulette()" style="width:100%; justify-content:center;">GIRAR</button><button class="btn-scully" onclick="closeRuleta()" style="width:100%; justify-content:center; background:transparent; border:none; color:#444;">CERRAR</button></div></div>
    <div id="levelModal" class="modal"><div class="modal-content" id="modal-body"></div></div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://scullylist-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const TOKEN = "GdfuFCRy";
        let fullData = {};

        const savedColor = localStorage.getItem('scully-theme-color') || '#ff6600';
        updateThemeColor(savedColor);
        document.getElementById('themeColor').value = savedColor;
        if(sessionStorage.getItem('scully_session') === 'active') document.getElementById('adminHubBtn').style.display = "flex";

        function updateThemeColor(v) { document.documentElement.style.setProperty('--accent', v); localStorage.setItem('scully-theme-color', v); }

        db.ref('/').on('value', (s) => {
            fullData = s.val() || {};
            renderLevels(fullData.levels || []);
            renderThrone(fullData.levels || []);
            updateTicker(fullData.logs || {});
        });

        function closeM() { document.getElementById('levelModal').style.display = "none"; document.getElementById('modal-body').innerHTML = ""; }
        
        function openDetails(idx) { 
            const l = fullData.levels[idx]; 
            const players = Object.values(fullData.players || {});
            const approved = players.filter(p => p.completions?.some(c => c.level === l.name));
            let vHTML = `<div style="padding:12px; border-bottom:1px solid #111; color:var(--blue); font-weight:800; display:flex; justify-content:space-between;"><span>🥇 ${l.first || 'Nadie'}</span> <small>VERIFICADOR</small></div>`;
            approved.forEach(p => { 
                if(p.name.toLowerCase() !== (l.first || '').toLowerCase()) {
                    vHTML += `<div style="padding:12px; border-bottom:1px solid #111; font-size:0.85rem;">${p.name}</div>`; 
                }
            });
            document.getElementById('modal-body').innerHTML = `<span onclick="closeM()" style="position:absolute; top:15px; right:20px; cursor:pointer; font-size:1.5rem; color:#444;">&times;</span><h1 style="color:var(--accent); margin:0; font-size:1.8rem;">${l.name}</h1><iframe width="100%" height="300" src="https://www.youtube.com/embed/${l.id}?autoplay=1" frameborder="0" allowfullscreen style="border-radius:20px; margin-top:15px;"></iframe><div style="margin-top:20px; text-align:left;"><small style="color:#444; font-weight:800; letter-spacing:1px;">LIGA DE VICTORIAS:</small><div style="margin-top:10px; max-height:180px; overflow-y:auto;">${vHTML}</div></div>`;
            document.getElementById('levelModal').style.display = "block";
        }

        function calcUserStats(nick) {
            const nickL = nick.toLowerCase();
            const p = Object.values(fullData.players || {}).find(x => x.name.toLowerCase() === nickL);
            const lvls = fullData.levels || [];
            let uniqueLevels = new Set(); let verifObjs = [];
            lvls.forEach(l => { if(l.first?.toLowerCase() === nickL) { uniqueLevels.add(l.name); verifObjs.push(l); } });
            p?.completions?.forEach(c => uniqueLevels.add(c.level));
            let pts = 0; uniqueLevels.forEach(name => { const idx = lvls.findIndex(l => l.name === name); if(idx > -1) pts += parseFloat(Math.max(100 - (idx * 0.6), 5)); });
            return { name: p?.name || nick, pts: pts.toFixed(1), lvl: Math.floor(pts / 50), pfp: p?.pfp || "https://i.imgur.com/8pw98K4.png", verifLevels: verifObjs, cosmetics: p?.cosmetics || {} };
        }

        function checkStatus() {
            const nick = document.getElementById('checkInput').value.trim(); if(!nick) return;
            const s = calcUserStats(nick); if(!s.pts || s.pts == 0) return document.getElementById('statusDisplay').innerHTML = "<p style='color:var(--red)'>Jugador no encontrado.</p>";
            const recs = [...Object.values(fullData.submissions || {}), ...Object.values(fullData.history || {})].filter(x => x.player.toLowerCase() === nick.toLowerCase());
            let cos = s.cosmetics?.aura_fire ? "cos-fire" : s.cosmetics?.aura_electric ? "cos-electric" : "";
            let html = `<div style="background:rgba(255,102,0,0.05); padding:30px; border-radius:30px; border:1px solid var(--accent); margin-bottom:20px;"><img src="${s.pfp}" class="user-pfp-display ${cos}"><h3 class="${s.cosmetics?.name_rainbow?'cos-rainbow':''}">${s.name.toUpperCase()}</h3><div style="margin:15px 0;"><span class="xp-tag">LVL ${s.lvl} (${s.pts} XP)</span></div></div>`;
            s.verifLevels.forEach(l => { html += `<a href="https://youtu.be/${l.id}" target="_blank" class="status-pill" style="border-color:var(--blue); color:var(--blue); background:rgba(0,204,255,0.05);"><b>${l.name}</b> <span class="st-label" style="background:var(--blue); color:#000;">VERIFICADOR <i class="fas fa-external-link-alt"></i></span></a>`; });
            html += recs.map(r => { if(s.verifLevels.some(v => v.name === r.level)) return ""; return `<div class="status-pill"><b>${r.level}</b> <span class="st-label" style="color:var(--${r.status.toLowerCase()==='aceptado'?'green':'yellow'})">${r.status.toUpperCase()}</span></div>`; }).join("");
            document.getElementById('statusDisplay').innerHTML = html;
        }

        function renderLevels(n) { const c = (i) => Math.max(100 - (i*0.6), 5).toFixed(1); document.getElementById('main-list').innerHTML = n.map((l, i) => `<div class="level-card" onclick="openDetails(${i})"><img src="https://img.youtube.com/vi/${l.id}/mqdefault.jpg"><div><h3 style="margin:0; font-size:0.85rem;">${l.name}</h3><p style="color:var(--accent); font-size:0.6rem;">+${c(i)} XP</p></div><div style="position:absolute; right:15px; opacity:0.1; font-weight:900; font-size:1.5rem;">#${i+1}</div></div>`).join(""); }
        
        function renderThrone(lvls) { 
            if(!lvls || lvls.length === 0) return; const t = lvls[0]; 
            // FIX DEFINITIVO DE LA MINIATURA: '0.jpg' garantiza que siempre haya una imagen de fondo.
            document.getElementById('throneDisplay').innerHTML = `
                <div class="throne-card" style="background-image: url('https://i.ytimg.com/vi/${t.id}/0.jpg');">
                    <div class="throne-info">
                        <div style="background:var(--accent); color:#000; padding:4px 12px; border-radius:50px; font-size:0.6rem; font-weight:800; margin-bottom:10px; display:inline-block;">TOP #1 BOSS</div>
                        <h2 style="font-size:2.5rem; margin:0; text-shadow: 0 0 20px #000;">${t.name}</h2>
                        <p style="font-size:0.85rem; color:#ccc; text-shadow: 0 0 10px #000;">FIRST VICTOR: <b style="color:var(--accent);">${t.first || 'Nadie'}</b></p>
                        <button class="btn-scully" style="margin-top:15px; padding:10px 20px; font-size:0.65rem;" onclick="openDetails(0)">VER NIVEL</button>
                    </div>
                </div>`; 
        }

        function updateTicker(l) { const e = Object.values(l).reverse().slice(0,10); document.getElementById('pulse-content').innerHTML = e.map(x => `<span class="log-item">${x.msg}</span>`).join(""); }
        function toggleAuth() { if(prompt("Acceso:") === TOKEN) { sessionStorage.setItem('scully_session', 'active'); location.reload(); } }
        function spinRoulette() { const lvls = fullData.levels || []; if(lvls.length === 0) return; document.getElementById('ruletaModal').style.display = "block"; const res = document.getElementById('ruletaText'); let count = 0; const interval = setInterval(() => { res.innerText = lvls[Math.floor(Math.random() * lvls.length)].name; count++; if(count > 15) { clearInterval(interval); res.style.color = "var(--green)"; } }, 80); }
        function closeRuleta() { document.getElementById('ruletaModal').style.display = "none"; }
    </script>
</body>
</html>
