<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>The Scully List | Omni Data Hub</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta property="og:title" content="The Scully List | Omni Data Hub">
    <meta property="og:description" content="Tanta innovación que es ilegal. Monitoreo OMNI v3.3 activo.">
    <meta property="og:image" content="preview.png">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Lexend+Deca:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { 
            --accent: #ff6600; 
            --bg: #050505; 
            --card-bg: rgba(15, 15, 15, 0.9);
            --border: rgba(255, 255, 255, 0.08);
            --text-dim: #888;
            --iron: #d1d1d1; /* Color plateado forjado */
        }

        /* ESTILOS BASE */
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Lexend Deca', sans-serif; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
            background-image: url('https://www.transparenttextures.com/patterns/dark-matter.png'); /* Textura sutil */
        }

        /* BANNER DE ALERTA GLOBAL */
        #globalAlertBanner {
            display: none;
            background: #ff3333;
            color: #000;
            text-align: center;
            padding: 12px;
            font-weight: 800;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: sticky;
            top: 0;
            z-index: 2000;
            box-shadow: 0 5px 20px rgba(255, 51, 51, 0.3);
        }

        /* TICKER DE NOTICIAS */
        .news-ticker { 
            background: rgba(0,0,0,0.9); 
            border-bottom: 1px solid var(--border); 
            padding: 10px 0; 
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem; 
            overflow: hidden; 
            display: flex; 
        }
        .ticker-content { display: flex; white-space: nowrap; animation: ticker-scroll 40s linear infinite; }
        .log-item { margin-right: 80px; color: var(--text-dim); display: flex; align-items: center; gap: 8px; text-transform: uppercase; }
        .log-item b { color: var(--accent); }
        @keyframes ticker-scroll { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }

        /* HEADER PRINCIPAL */
        header { padding: 80px 20px 40px; text-align: center; position: relative; }
        .logo-main { width: 120px; margin-bottom: 20px; filter: drop-shadow(0 0 15px rgba(255,102,0,0.2)); }
        h1 { font-size: clamp(2rem, 8vw, 4rem); font-weight: 800; margin: 0; letter-spacing: -2px; color: var(--iron); text-transform: uppercase; }
        h1 span { color: var(--accent); text-shadow: 0 0 20px rgba(255,102,0,0.3); }
        .motto { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--text-dim); letter-spacing: 4px; margin-top: 10px; text-transform: uppercase; }

        /* NAVEGACIÓN */
        .main-nav { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-top: 40px; }
        .nav-link { 
            background: rgba(255,255,255,0.02); 
            border: 1px solid var(--border); 
            color: var(--iron); 
            padding: 12px 25px; 
            text-decoration: none; 
            font-size: 0.7rem; 
            border-radius: 5px; 
            font-weight: 700; 
            transition: 0.3s; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }
        .nav-link:hover { background: var(--iron); color: #000; transform: translateY(-3px); }
        .nav-link.active { border-color: var(--accent); color: var(--accent); }

        /* SECCIONES */
        .container { width: 95%; max-width: 1200px; margin: 60px auto; }
        .section-title { 
            font-size: 0.75rem; 
            color: var(--text-dim); 
            text-transform: uppercase; 
            letter-spacing: 5px; 
            text-align: center; 
            margin-bottom: 40px;
            display: flex; align-items: center; justify-content: center; gap: 20px;
        }
        .section-title::before, .section-title::after { content: ''; height: 1px; width: 50px; background: var(--border); }

        /* LIST PACKS */
        .packs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 80px; }
        .pack-card { 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            padding: 25px; 
            border-radius: 15px; 
            position: relative; 
            overflow: hidden; 
            transition: 0.3s;
        }
        .pack-card:hover { border-color: inherit; transform: scale(1.03); }
        .pack-card h3 { margin: 0 0 10px; font-size: 1.1rem; text-transform: uppercase; }
        .pack-card p { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 20px; }
        .btn-pack { font-size: 0.6rem; font-weight: 800; padding: 8px 15px; border-radius: 4px; text-decoration: none; text-transform: uppercase; border: 1px solid; }

        /* THE THRONE (TOP 1) */
        .throne-display { margin-bottom: 80px; }
        .throne-card { 
            background-size: cover; background-position: center; 
            border-radius: 20px; padding: 60px; border: 1px solid var(--accent); 
            position: relative; overflow: hidden; min-height: 300px; 
            display: flex; align-items: center;
        }
        .throne-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to right, #000 60%, transparent); }
        .throne-info { position: relative; z-index: 2; max-width: 500px; }
        .throne-info h2 { font-size: 3rem; margin: 0; text-transform: uppercase; letter-spacing: -2px; }
        .badge-top1 { background: var(--accent); color: #000; padding: 5px 15px; border-radius: 4px; font-size: 0.6rem; font-weight: 900; display: inline-block; margin-bottom: 15px; }

        /* MAIN LIST GRID */
        .list-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .level-card { 
            background: var(--card-bg); border-radius: 15px; padding: 15px; 
            display: flex; align-items: center; border: 1px solid var(--border); 
            cursor: pointer; transition: 0.3s; position: relative; 
        }
        .level-card:hover { border-color: var(--accent); background: rgba(255,255,255,0.03); }
        .level-card img { width: 100px; height: 60px; border-radius: 8px; object-fit: cover; margin-right: 15px; }
        .level-card h3 { font-size: 0.9rem; margin: 0; text-transform: uppercase; color: var(--iron); }
        .level-card p { font-size: 0.65rem; color: var(--accent); font-weight: 800; margin-top: 4px; }
        .level-rank { position: absolute; right: 20px; font-family: 'JetBrains Mono'; font-weight: 900; font-size: 1.5rem; opacity: 0.05; }

        /* MODALES */
        .modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); }
        .modal-content { background: #080808; margin: 5vh auto; padding: 30px; width: 90%; max-width: 700px; border-radius: 20px; border: 1px solid var(--border); position: relative; max-height: 85vh; overflow-y: auto; }

        /* FOOTER */
        footer { text-align: center; padding: 80px 20px; border-top: 1px solid var(--border); margin-top: 100px; color: var(--text-dim); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; }

        /* ESTILOS INYECTADOS DINÁMICAMENTE */
        #dynamic-css-container {}
    </style>
    
    <style id="custom-css-injector"></style>
</head>
<body>

    <div id="globalAlertBanner"></div>

    <div class="news-ticker">
        <div class="ticker-content" id="ticker-content">
            <span class="log-item">Cargando transmisiones de red...</span>
        </div>
    </div>

    <header>
        <img src="favicon.png" alt="Logo" class="logo-main">
        <h1>THE SCULLY <span>LIST</span></h1>
        <div class="motto">Tanta innovación que es ilegal</div>

        <nav class="main-nav">
            <a href="index.html" class="nav-link active">Lista</a>
            <a href="leaderboards.html" class="nav-link">Ranking</a>
            <a href="submit.html" class="nav-link" id="submit-nav-btn">Enviar Récord</a>
            <a href="packs.html" class="nav-link">Packs</a>
            <a href="login.html" class="nav-link" style="border-color:var(--accent); color:var(--accent);">Acceso Datos</a>
        </nav>
    </header>

    <main class="container">
        
        <h2 class="section-title">Expedientes de Pack</h2>
        <div class="packs-grid" id="packs-container">
            </div>

        <div class="throne-display" id="throne-container"></div>

        <h2 class="section-title">Registros de la Lista</h2>
        <div class="list-grid" id="main-list">
            </div>

    </main>

    <footer>
        &copy; 2026 THE SCULLY LIST | OMNI DATA HUB | BY SCORE
    </footer>

    <div id="levelModal" class="modal">
        <div class="modal-content" id="modal-body"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyC2vrauBlplKGMjeLW3mLzZQr05khmH5v0", 
            authDomain: "scullylist.firebaseapp.com", 
            databaseURL: "https://scullylist-default-rtdb.firebaseio.com", 
            projectId: "scullylist", 
            storageBucket: "scullylist.firebasestorage.app", 
            messagingSenderId: "498548914021", 
            appId: "1:498548914021:web:59128b5e06b36a4e81938c" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let fullData = {};

        // CARGA INICIAL DE DATOS
        db.ref('/').on('value', (snap) => {
            fullData = snap.val() || {};
            
            updateSystemSettings(fullData.system_settings || {});
            renderTicker(fullData.logs || {});
            renderPacks(fullData.packs || {});
            
            const lvls = fullData.levels ? (Array.isArray(fullData.levels) ? fullData.levels.filter(l => l) : Object.values(fullData.levels)) : [];
            renderThrone(lvls[0]);
            renderList(lvls);
        });

        // 1. AJUSTES DEL SISTEMA (ALERTA, LOCKDOWN, CSS)
        function updateSystemSettings(settings) {
            // Alerta Global
            const alertBanner = document.getElementById('globalAlertBanner');
            if(settings.global_alert) {
                alertBanner.innerText = settings.global_alert_msg || "Mantenimiento en curso";
                alertBanner.style.display = 'block';
            } else {
                alertBanner.style.display = 'none';
            }

            // Lockdown de envíos
            const submitBtn = document.getElementById('submit-nav-btn');
            if(settings.lock_submissions) {
                submitBtn.style.opacity = "0.5";
                submitBtn.href = "#";
                submitBtn.innerHTML = "<i class='fas fa-lock'></i> Cerrado";
            } else {
                submitBtn.style.opacity = "1";
                submitBtn.href = "submit.html";
                submitBtn.innerHTML = "Enviar Récord";
            }

            // Inyectar CSS Personalizado desde Admin
            if(settings.custom_css) {
                document.getElementById('custom-css-injector').innerHTML = settings.custom_css;
            }
        }

        // 2. RENDERIZAR TICKER
        function renderTicker(logs) {
            const container = document.getElementById('ticker-content');
            const entries = Object.values(logs).reverse().slice(0, 10);
            container.innerHTML = entries.map(l => `
                <span class="log-item"><i class="fas fa-code-branch"></i> ${l.msg}</span>
            `).join("");
        }

        // 3. RENDERIZAR PACKS
        function renderPacks(packs) {
            const container = document.getElementById('packs-container');
            let html = "";
            Object.entries(packs).forEach(([id, p]) => {
                html += `
                    <div class="pack-card" style="border-top: 3px solid ${p.color}">
                        <h3>${p.name}</h3>
                        <p>${p.levels.length} niveles clasificados</p>
                        <a href="packs.html?id=${id}" class="btn-pack" style="border-color:${p.color}; color:${p.color}">Ver Detalles</a>
                    </div>
                `;
            });
            container.innerHTML = html || '<p style="color:#333; grid-column:1/-1; text-align:center;">No hay packs activos.</p>';
        }

        // 4. EL TRONO (TOP 1)
        function renderThrone(t) {
            const container = document.getElementById('throne-container');
            if(!t) return;
            container.innerHTML = `
                <div class="throne-card" style="background-image: url('https://i.ytimg.com/vi/${t.id}/maxresdefault.jpg');">
                    <div class="throne-info">
                        <div class="badge-top1"><i class="fas fa-crown"></i> TOP #1 ACTUAL</div>
                        <h2>${t.name}</h2>
                        <p style="color:#ccc; margin-top:10px;">Verificado por: <b style="color:var(--accent);">${t.first || 'Desconocido'}</b></p>
                        <button class="nav-link" style="margin-top:25px; cursor:pointer;" onclick="openDetails('${t.name}')">Ver Récords</button>
                    </div>
                </div>
            `;
        }

        // 5. LA LISTA
        function renderList(lvls) {
            const container = document.getElementById('main-list');
            container.innerHTML = lvls.map((l, i) => `
                <div class="level-card" onclick="openDetails('${l.name}')">
                    <img src="https://img.youtube.com/vi/${l.id}/mqdefault.jpg">
                    <div>
                        <h3>${l.name}</h3>
                        <p>#${i+1} - List Demon</p>
                    </div>
                    <div class="level-rank">${i+1}</div>
                </div>
            `).join("");
        }

        // 6. DETALLES DEL NIVEL (MODAL)
        function openDetails(name) {
            const lvls = fullData.levels ? (Array.isArray(fullData.levels) ? fullData.levels : Object.values(fullData.levels)) : [];
            const l = lvls.find(x => x && x.name === name);
            if(!l) return;

            const players = Object.values(fullData.players || {});
            const victors = players.filter(p => {
                const comps = p.completions ? (Array.isArray(p.completions) ? p.completions : Object.values(p.completions)) : [];
                return comps.some(c => c.level === name) && !p.hidden;
            });

            let victorsHTML = victors.map(v => `
                <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #111; font-size:0.8rem;">
                    <span>${v.name}</span>
                    <a href="#" style="color:var(--accent); text-decoration:none; font-weight:800;">VIDEO</a>
                </div>
            `).join("");

            document.getElementById('modal-body').innerHTML = `
                <span onclick="closeModal()" style="position:absolute; top:20px; right:25px; cursor:pointer; font-size:1.5rem; color:#444;">&times;</span>
                <h2 style="text-transform:uppercase; color:var(--accent); margin-top:0;">${l.name}</h2>
                <iframe width="100%" height="350" src="https://www.youtube.com/embed/${l.id}" frameborder="0" allowfullscreen style="border-radius:10px; border:1px solid var(--border);"></iframe>
                <div style="margin-top:30px;">
                    <h4 style="font-size:0.7rem; letter-spacing:2px; color:var(--text-dim); text-transform:uppercase; border-bottom:1px solid #222; padding-bottom:10px;">Vencedores Confirmados</h4>
                    <div style="max-height:200px; overflow-y:auto;">${victorsHTML || '<p style="font-size:0.8rem; color:#444; padding:20px; text-align:center;">Sin registros oficiales aún.</p>'}</div>
                </div>
            `;
            document.getElementById('levelModal').style.display = "block";
        }

        function closeModal() { document.getElementById('levelModal').style.display = "none"; }
        window.onclick = function(e) { if(e.target == document.getElementById('levelModal')) closeModal(); }
    </script>
</body>
</html>
