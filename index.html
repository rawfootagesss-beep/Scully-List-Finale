<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Scully List | Hub de Ingeniería & Niveles</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --accent: #ff6600; 
            --accent-grad: linear-gradient(135deg, var(--accent) 0%, #ff9900 100%);
            --bg: #030303; --card-bg: rgba(15, 15, 15, 0.85);
            --glow: 0 0 25px rgba(255, 102, 0, 0.3); --border: rgba(255, 255, 255, 0.05);
            --green: #00ff66; --red: #ff3333; --blue: #00ccff; --purple: #cc00ff; --yellow: #ffff00;
        }

        body { background: var(--bg); color: #fff; font-family: 'Lexend Deca', sans-serif; margin: 0; padding: 0; overflow-x: hidden; scroll-behavior: smooth; }

        /* --- EFECTOS DE COSMÉTICOS --- */
        @keyframes rainbow { 0% { color: #ff0000; } 20% { color: #ff9900; } 40% { color: #ffff00; } 60% { color: #00ff00; } 80% { color: #00ffff; } 100% { color: #cc00ff; } }
        .cos-rainbow { animation: rainbow 3s linear infinite !important; font-weight: 800; }
        .cos-fire { box-shadow: 0 0 20px #ff3300 !important; border: 2px solid #ff3300 !important; }
        .cos-electric { box-shadow: 0 0 20px #00ccff !important; border: 2px solid #00ccff !important; }

        /* 1. NOVEDADES */
        .news-ticker { background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); padding: 12px 0; font-size: 0.65rem; position: sticky; top: 0; z-index: 1000; overflow: hidden; display: flex; }
        .ticker-content { display: flex; white-space: nowrap; animation: ticker-scroll 45s linear infinite; }
        .log-item { margin-right: 100px; letter-spacing: 2px; text-transform: uppercase; font-weight: 800; display: flex; align-items: center; gap: 8px; }
        @keyframes ticker-scroll { 0% { transform: translateX(80vw); } 100% { transform: translateX(-250%); } }

        /* 2. STAFF BAR */
        .staff-bar { display: flex; justify-content: center; gap: 25px; padding: 15px; background: rgba(255,255,255,0.02); font-size: 0.6rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; align-items: center; }
        .staff-item { display: flex; align-items: center; gap: 8px; color: #888; }
        .staff-item i { color: var(--accent); }
        .tribute-item { color: #fff; font-weight: 800; text-shadow: 0 0 10px rgba(255,255,255,0.4); }

        header { padding: 60px 20px 20px; text-align: center; }
        h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); font-weight: 800; margin: 0; letter-spacing: -2px; }
        h1 span { background: var(--accent-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .main-nav { margin-top: 35px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; align-items: center; }
        .btn-scully { background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: #fff; padding: 14px 28px; text-decoration: none; font-size: 0.75rem; border-radius: 50px; font-weight: 600; transition: 0.3s; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .btn-scully:hover { background: var(--accent); color: #000; transform: translateY(-3px); box-shadow: 0 0 20px var(--accent); }

        /* 3. LISTA DE NIVELES */
        .list-grid { width: 95%; max-width: 1200px; margin: 40px auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .level-card { background: var(--card-bg); border-radius: 20px; padding: 12px; display: flex; align-items: center; border: 1px solid var(--border); cursor: pointer; transition: 0.3s; position: relative; }
        .level-card:hover { border-color: var(--accent); transform: scale(1.02); }
        .level-card img { width: 100px; height: 60px; border-radius: 10px; object-fit: cover; margin-right: 15px; }

        /* 4. EL TRONO */
        .throne-section { width: 90%; max-width: 800px; margin: 40px auto; }
        .throne-card { background: linear-gradient(to right, rgba(0,0,0,0.95), rgba(255, 102, 0, 0.1)); background-size: cover; border-radius: 30px; padding: 40px; border: 2px solid var(--accent); box-shadow: var(--glow); display: flex; align-items: center; }

        /* 5. STATUS TRACKER (IDENTIDAD SCULLY) - FIX BOTONES */
        .status-tracker { max-width: 600px; margin: 60px auto; padding: 45px; background: var(--card-bg); border-radius: 40px; border: 1px solid var(--border); text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .user-pfp-display { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--accent); margin: 0 auto 25px; object-fit: cover; background: #111; display: block; box-shadow: var(--glow); }
        
        .xp-tag { background: #000; color: var(--accent); padding: 10px 20px; border-radius: 12px; font-size: 0.8rem; font-weight: 800; border: 1px solid var(--accent); display: inline-block; margin-bottom: 20px; }
        
        /* Botones de registros individuales */
        .status-pill { 
            padding: 18px 25px; border-radius: 15px; margin-bottom: 12px; 
            font-size: 0.85rem; display: flex; justify-content: space-between; 
            align-items: center; background: #000; border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }
        .st-label { font-weight: 800; text-transform: uppercase; font-size: 0.65rem; padding: 6px 12px; border-radius: 8px; letter-spacing: 1px; }
        .st-aceptado { background: rgba(0, 255, 102, 0.1); color: var(--green); border: 1px solid var(--green); box-shadow: 0 0 10px rgba(0, 255, 102, 0.2); }
        .st-pendiente { background: rgba(255, 204, 0, 0.1); color: var(--yellow); border: 1px solid var(--yellow); }
        .st-rechazado { background: rgba(255, 51, 51, 0.1); color: var(--red); border: 1px solid var(--red); }

        input[type="text"] { width: 100%; background: #000 !important; border: 1px solid #222; color: #fff; padding: 18px; border-radius: 15px; margin-bottom: 20px; font-family: 'Lexend Deca'; box-sizing: border-box; text-align: center; }
        input[type="text"]:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 15px rgba(255,102,0,0.1); }

        /* 6. FOOTER */
        .footer-credits { padding: 60px 20px; text-align: center; background: rgba(255,255,255,0.02); border-top: 1px solid var(--border); margin-top: 100px; }
        .color-trigger { display: inline-flex; align-items: center; justify-content: center; width: 55px; height: 55px; background: var(--accent); color: #000; border-radius: 50%; cursor: pointer; font-size: 1.3rem; box-shadow: var(--glow); transition: 0.4s; margin-top: 25px; }
        .color-trigger:hover { transform: rotate(180deg) scale(1.1); }
        #themeColor { opacity: 0; position: absolute; pointer-events: none; }
        
        .admin-lock { text-align: center; padding: 80px 0; opacity: 0.03; cursor: pointer; }
        .modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); }
        .modal-content { background: #0a0a0a; margin: 5vh auto; padding: 35px; width: 90%; max-width: 650px; border-radius: 35px; border: 1px solid var(--border); text-align: center; }
    </style>
</head>
<body>

    <div class="news-ticker"><div class="ticker-content" id="pulse-content"></div></div>

    <nav class="staff-bar">
        <div class="staff-item tribute-item">Tributo a 2parx 🕊️</div>
        <div class="staff-item"><i class="fas fa-crown"></i> OWNER <b>score</b></div>
        <div class="staff-item"><i class="fas fa-user-shield"></i> ADMIN <b>Vegardo</b></div>
        <div class="staff-item"><i class="fas fa-hands-helping"></i> HELPER <b>Blitz</b></div>
        <div class="staff-item"><i class="fas fa-hands-helping"></i> HELPER <b>Sopa354</b></div>
    </nav>

    <header>
        <h1>THE SCULLY <span>LIST</span></h1>
        <div class="main-nav">
            <a href="index.html" class="btn-scully" style="color:var(--green); border-color:var(--green);"><i class="fas fa-list-ol"></i> Lista Principal</a>
            <a href="leaderboards.html" class="btn-scully"><i class="fas fa-trophy"></i> Ranking</a>
            <a href="versus.html" class="btn-scully"><i class="fas fa-bolt"></i> Versus</a>
            <a href="market.html" class="btn-scully"><i class="fas fa-shopping-cart"></i> Mercado</a>
            <a href="submit.html" class="btn-scully"><i class="fas fa-upload"></i> Enviar</a>
            <button class="btn-scully" onclick="spinRoulette()"><i class="fas fa-dice"></i></button>
            <a href="admin.html" id="adminHubBtn" class="btn-scully" style="display:none; background:var(--accent); color:#000;"><i class="fas fa-user-cog"></i> ADMIN</a>
        </div>
    </header>

    <section class="throne-section" id="throneDisplay"></section>

    <main class="list-grid" id="main-list"></main>

    <section class="status-tracker">
        <h2 style="color:var(--accent); font-size: 1.1rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 30px;">Identidad Scully</h2>
        <div id="statusDisplay" style="margin-bottom:30px;">
            <p style="color:#444; font-size: 0.9rem;">Escribe tu Nickname para sincronizar tu progreso global.</p>
        </div>
        <input type="text" id="checkInput" placeholder="Introduce tu Nick...">
        <button class="btn-scully" style="width:100%; justify-content:center; border-radius:18px; padding: 20px;" onclick="checkStatus()">
            ACTUALIZAR PERFIL <i class="fas fa-sync-alt" style="margin-left:10px;"></i>
        </button>
    </section>

    <footer class="footer-credits">
        <p style="color:#444; font-size:0.75rem; text-transform:uppercase; letter-spacing: 2px;">The Scully List &copy; 2026 | score engineering</p>
        <label for="themeColor" class="color-trigger" title="Cambiar color del sitio">
            <i class="fas fa-palette"></i>
        </label>
        <input type="color" id="themeColor" oninput="updateThemeColor(this.value)">
    </footer>

    <div class="admin-lock" onclick="toggleAuth()"><i class="fas fa-lock"></i></div>

    <div id="ruletaModal" class="modal"><div class="modal-content"><h2 style="color:var(--accent);">RULETA</h2><div id="ruletaText" style="font-size:2.2rem; font-weight:800; margin:25px 0;">---</div><button class="btn-scully" onclick="spinRoulette()">GIRAR</button><button class="btn-scully" onclick="closeRuleta()" style="background:transparent; border:none; color:#444;">CERRAR</button></div></div>
    <div id="levelModal" class="modal"><div class="modal-content" id="modal-body"></div></div>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://scullylist-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const TOKEN = "GdfuFCRy";
        let fullData = {};

        const savedColor = localStorage.getItem('scully-theme-color') || '#ff6600';
        updateThemeColor(savedColor);
        document.getElementById('themeColor').value = savedColor;
        if(sessionStorage.getItem('scully_session') === 'active') document.getElementById('adminHubBtn').style.display = "flex";

        function updateThemeColor(v) { document.documentElement.style.setProperty('--accent', v); localStorage.setItem('scully-theme-color', v); }

        db.ref('/').on('value', (s) => {
            fullData = s.val() || {};
            renderLevels(fullData.levels || []);
            renderThrone(fullData.levels || []);
            updateTicker(fullData.logs || {});
        });

        // LÓGICA DE XP (1 NIVEL = 50 PTS)
        function calcUserStats(nick) {
            const player = Object.values(fullData.players || {}).find(p => p.name.toLowerCase() === nick.toLowerCase());
            if(!player) return { pts: 0, name: null };
            let pts = 0; let badges = [];
            player.completions?.forEach(c => {
                const idx = fullData.levels.findIndex(l => l.name.toLowerCase() === c.level.toLowerCase());
                if(idx > -1) { pts += parseFloat(Math.max(100 - (idx * 0.6), 5)); if(idx <= 9) badges.push('🔥'); if(fullData.levels[idx]?.first?.toLowerCase() === nick.toLowerCase()) badges.push('🥇'); }
            });
            if(player.completions?.length >= 5) badges.push('🛡️');
            return { name: player.name, pts: pts.toFixed(1), lvl: Math.floor(pts / 50), badges: [...new Set(badges)], pfp: player.pfp || "https://i.imgur.com/8pw98K4.png", cosmetics: player.cosmetics || {} };
        }

        // STATUS TRACKER MEJORADO (FIX BOTONES)
        function checkStatus() {
            const nick = document.getElementById('checkInput').value.trim(); if(!nick) return;
            const stats = calcUserStats(nick);
            if(!stats.name) return document.getElementById('statusDisplay').innerHTML = "<p style='color:var(--red)'>Jugador no encontrado en el servidor.</p>";
            
            const userRecords = [...Object.values(fullData.submissions || {}), ...Object.values(fullData.history || {})].filter(s => s.player.toLowerCase() === nick.toLowerCase());
            let cos = stats.cosmetics?.aura_fire ? "cos-fire" : stats.cosmetics?.aura_electric ? "cos-electric" : "";
            
            let html = `
                <div style="background:rgba(255,102,0,0.05); padding:35px; border-radius:30px; border:1px solid var(--accent); margin-bottom:25px;">
                    <img src="${stats.pfp}" class="user-pfp-display ${cos}">
                    <h3 class="${stats.cosmetics?.name_rainbow?'cos-rainbow':''}" style="font-size:1.4rem; margin:0;">${stats.name.toUpperCase()}</h3>
                    <div style="margin:15px 0;"><span class="xp-tag">LVL ${stats.lvl} &bull; ${stats.pts} XP</span></div>
                    <div style="margin-top:10px;">${stats.badges.map(b => `<span style="font-size:1.6rem; margin:0 5px;">${b}</span>`).join("")}</div>
                </div>`;
            
            html += userRecords.map(r => {
                let statusClass = r.status.toLowerCase() === 'aceptado' ? 'st-aceptado' : (r.status.toLowerCase() === 'rechazado' ? 'st-rechazado' : 'st-pendiente');
                return `
                <div class="status-pill">
                    <b style="font-size:0.9rem;">${r.level}</b> 
                    <span class="st-label ${statusClass}">${r.status.toUpperCase()}</span>
                </div>`;
            }).join("");
            
            document.getElementById('statusDisplay').innerHTML = html;
        }

        function renderLevels(n) { const c = (i) => Math.max(100 - (i*0.6), 5).toFixed(1); document.getElementById('main-list').innerHTML = n.map((l, i) => `<div class="level-card" onclick="openDetails(${i})"><img src="https://img.youtube.com/vi/${l.id}/mqdefault.jpg"><div><h3 style="margin:0; font-size:0.85rem;">${l.name}</h3><p style="color:var(--accent); font-size:0.6rem;">+${c(i)} XP</p></div><div style="position:absolute; right:15px; opacity:0.1; font-weight:900; font-size:1.5rem;">#${i+1}</div></div>`).join(""); }
        function renderThrone(lvls) { if(!lvls || lvls.length === 0) return; const t = lvls[0]; document.getElementById('throneDisplay').innerHTML = `<div class="throne-card" style="background-image: linear-gradient(to right, rgba(0,0,0,0.95), rgba(0,0,0,0.4)), url('https://img.youtube.com/vi/${t.id}/maxresdefault.jpg');"><div class="throne-info"><div style="background:var(--accent); color:#000; padding:5px 15px; border-radius:50px; font-weight:800; font-size:0.6rem; display:inline-block; margin-bottom:10px;">TOP #1</div><h2>${t.name}</h2><p style="font-size:0.8rem; color:#aaa;">VERIFICADO POR: <b style="color:#fff;">${t.first || 'Nadie'}</b></p><button class="btn-scully" style="padding:10px 20px; font-size:0.6rem; margin-top:10px;" onclick="openDetails(0)">DETALLES</button></div></div>`; }
        function updateTicker(l) { const e = Object.values(l).reverse().slice(0,10); document.getElementById('pulse-content').innerHTML = e.map(x => `<span class="log-item">${x.msg}</span>`).join(""); }
        function spinRoulette() { const lvls = fullData.levels || []; if(lvls.length === 0) return; document.getElementById('ruletaModal').style.display = "block"; const res = document.getElementById('ruletaText'); let count = 0; const interval = setInterval(() => { res.innerText = lvls[Math.floor(Math.random() * lvls.length)].name; count++; if(count > 15) { clearInterval(interval); res.style.color = "var(--green)"; setTimeout(()=>res.style.color="#fff",1000); } }, 80); }
        function closeRuleta() { document.getElementById('ruletaModal').style.display = "none"; }
        function toggleAuth() { if(prompt("Acceso:") === TOKEN) { sessionStorage.setItem('scully_session', 'active'); location.reload(); } }
        function openDetails(idx) { 
            const l = fullData.levels[idx]; const victors = Object.values(fullData.players || {}).filter(p => p.completions?.some(c => c.level === l.name));
            document.getElementById('modal-body').innerHTML = `<span onclick="closeM()" style="float:right; cursor:pointer; font-size:1.5rem;">&times;</span><h1 style="color:var(--accent); margin:0;">${l.name}</h1><p style="font-size:0.8rem; margin-bottom:15px;">PRIMER VICTOR: <b>${l.first || 'Nadie'}</b></p><iframe width="100%" height="300" src="https://www.youtube.com/embed/${l.id}" frameborder="0" allowfullscreen style="border-radius:20px;"></iframe><div style="margin-top:20px; text-align:left;"><small style="color:#444; font-weight:800; letter-spacing:1px;">LIGA DE VICTORS:</small><div style="margin-top:10px; max-height:150px; overflow-y:auto;">${victors.map(v => `<div style="padding:12px; border-bottom:1px solid #111; font-size:0.85rem;">${v.name}</div>`).join("") || '<p>Aún no hay victors.</p>'}</div></div>`;
            document.getElementById('levelModal').style.display = "block";
        }
        function closeM() { document.getElementById('levelModal').style.display = "none"; }
    </script>
</body>
</html>
