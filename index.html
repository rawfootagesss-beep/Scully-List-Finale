<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Scully List | Central</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root { --accent: #ff6600; --bg: #050505; --card: #0a0a0a; --glow: 0 0 15px rgba(255, 102, 0, 0.3); }
        body { background: var(--bg); color: #fff; font-family: 'Lexend Deca', sans-serif; margin: 0; padding: 0; }
        .top-credits { display: flex; justify-content: center; gap: 20px; padding: 12px; background: rgba(0,0,0,0.8); border-bottom: 1px solid #111; font-size: 0.65rem; position: sticky; top: 0; z-index: 1000; }
        .credit-box i { color: var(--accent); margin-right: 5px; }
        header { padding: 50px 20px; text-align: center; }
        h1 { font-size: 2.5rem; letter-spacing: 5px; margin: 0; text-transform: uppercase; }
        h1 span { color: var(--accent); text-shadow: var(--glow); }
        #searchBar { width: 90%; max-width: 400px; background: #000; border: 1px solid #222; color: #fff; padding: 12px; border-radius: 5px; margin-top: 20px; font-family: 'Lexend Deca'; }
        .header-buttons { margin-top: 25px; display: flex; justify-content: center; gap: 15px; }
        .btn-scully { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 10px 20px; text-decoration: none; font-size: 0.8rem; transition: 0.3s; cursor: pointer; }
        #list-container { width: 95%; max-width: 900px; margin: 40px auto; display: grid; gap: 15px; }
        .level-card { background: var(--card); border: 1px solid #111; display: flex; align-items: center; padding: 15px; position: relative; cursor: pointer; }
        .level-thumb img { width: 120px; border-radius: 4px; margin-right: 20px; }
        /* Panel Admin */
        #adminPanel { display: none; background: #000; border: 1px solid var(--accent); padding: 25px; width: 95%; max-width: 800px; margin: 50px auto; border-radius: 10px; text-align: left; }
        .admin-flex { display: flex; flex-wrap: wrap; gap: 20px; }
        .form-side, .list-side { flex: 1; min-width: 300px; }
        input, textarea { width: 100%; background: #0a0a0a; border: 1px solid #222; color: #fff; padding: 10px; margin-bottom: 8px; font-family: 'Lexend Deca'; box-sizing: border-box; }
        .lvl-item-edit { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #111; font-size: 0.8rem; }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(8px); }
        .modal-content { background: #080808; margin: 5% auto; padding: 30px; width: 90%; max-width: 500px; border: 1px solid var(--accent); border-radius: 15px; position: relative; text-align: center; }
    </style>
</head>
<body>
    <nav class="top-credits">
        <div class="credit-box"><i class="fas fa-crown"></i> OWNER <span>score</span></div>
        <div class="credit-box"><i class="fas fa-user-shield"></i> ADMIN <span>Vegardo</span></div>
        <div class="credit-box"><i class="fas fa-hands-helping"></i> HELPER <span>Blitz</span></div>
        <div class="credit-box"><i class="fas fa-code"></i> CODIFICADOR <span>score</span></div>
    </nav>
    <header>
        <h1>THE <span>SCULLY</span> LIST</h1>
        <input type="text" id="searchBar" placeholder="Filtrar niveles..." onkeyup="renderLevels(this.value)">
        <div class="header-buttons">
            <a href="leaderboards.html" class="btn-scully">LEADERBOARDS</a>
            <a href="https://docs.google.com/forms/d/e/1FAIpQLScG_9uY4H8ZbpQlakBn7NSyl_iRRezmCEqNYpTl1OYovKJsXw/viewform?usp=sf_link" target="_blank" class="btn-scully">SUBIR RECORD</a>
        </div>
    </header>
    <main id="list-container"></main>

    <div style="margin-top: 100px; opacity: 0.05; text-align: center;" id="authBox">
        <input type="password" id="tokenInput" placeholder="..." style="width:100px; text-align:center; border:none; background:none;">
        <button onclick="checkAuth()" style="border:none; background:none; cursor:pointer;">.</button>
    </div>
    <div id="adminPanel">
        <h4 style="color:var(--accent); margin-bottom: 15px;">EDITOR DE NIVELES</h4>
        <div class="admin-flex">
            <div class="form-side">
                <input type="text" id="lvlName" placeholder="Nombre Nivel">
                <input type="text" id="lvlYT" placeholder="ID YouTube">
                <input type="text" id="lvlFirst" placeholder="Primer Victor">
                <input type="number" id="lvlPos" placeholder="Posición">
                <textarea id="lvlVictors" placeholder="Otros Victors..."></textarea>
                <button class="btn-scully" style="width:100%; background:var(--accent); color:#000;" onclick="saveLevel()">AÑADIR NIVEL</button>
                <button class="btn-scully" style="width:100%; margin-top:10px; border-color:#fff; color:#fff;" onclick="descargarScript()">DESCARGAR SCRIPT.JS</button>
            </div>
            <div class="list-side" id="adminListView" style="background:#080808; padding:10px; max-height:300px; overflow-y:auto;"></div>
        </div>
    </div>

    <div id="levelModal" class="modal"><div class="modal-content"><span onclick="closeModal()" style="position:absolute; right:20px; top:10px; cursor:pointer; font-size:2rem; color:var(--accent);">&times;</span><div id="modal-body"></div></div></div>

    <script src="script.js"></script>
    <script>
        const TOKEN = "GdfuFCRy";
        function checkAuth() { if(document.getElementById('tokenInput').value === TOKEN) { sessionStorage.setItem('scully_session', 'active'); location.reload(); } }
        window.onload = function() { 
            if(sessionStorage.getItem('scully_session') === 'active') { document.getElementById('adminPanel').style.display = "block"; document.getElementById('authBox').style.display = "none"; updateAdminList(); }
            if(typeof renderLevels === 'function') renderLevels(); 
        };
        function closeModal() { document.getElementById('levelModal').style.display = "none"; }
        function saveLevel() {
            const name = document.getElementById('lvlName').value.trim();
            const id = document.getElementById('lvlYT').value.trim();
            const first = document.getElementById('lvlFirst').value.trim();
            const pos = parseInt(document.getElementById('lvlPos').value) - 1;
            const victors = document.getElementById('lvlVictors').value.split(',').filter(v => v.trim() !== "");
            let db = JSON.parse(localStorage.getItem('scully_db_levels')) || [];
            db = db.filter(l => l.name.toLowerCase() !== name.toLowerCase());
            db.splice(pos >= 0 ? pos : db.length, 0, { name, id, first, victors });
            localStorage.setItem('scully_db_levels', JSON.stringify(db));
            renderLevels(); updateAdminList();
        }
        function deleteLevel(i) {
            let db = JSON.parse(localStorage.getItem('scully_db_levels')) || [];
            db.splice(i, 1);
            localStorage.setItem('scully_db_levels', JSON.stringify(db));
            renderLevels(); updateAdminList();
        }
        function updateAdminList() {
            const db = JSON.parse(localStorage.getItem('scully_db_levels')) || [];
            document.getElementById('adminListView').innerHTML = db.map((l, i) => `<div class="lvl-item-edit"><span>#${i+1} ${l.name}</span><i class="fas fa-trash" style="color:#f44; cursor:pointer;" onclick="deleteLevel(${i})"></i></div>`).join("");
        }
        function descargarScript() {
            const n = localStorage.getItem('scully_db_levels') || "[]";
            const r = localStorage.getItem('scully_ranks') || "[]";
            const script = `
const NIVELES = ${n}; const RANKING = ${r};
localStorage.setItem('scully_db_levels', JSON.stringify(NIVELES));
localStorage.setItem('scully_ranks', JSON.stringify(RANKING));
function calculatePoints(i) { return Math.max(100 - (i * 0.6), 5).toFixed(1); }
function renderLevels(f = "") {
    const c = document.getElementById('list-container'); if(!c) return;
    c.innerHTML = "";
    NIVELES.forEach((l, i) => { if(l.name.toLowerCase().includes(f.toLowerCase())) {
        c.innerHTML += '<div class="level-card" onclick="openDetails(' + i + ')"><div class="level-thumb"><img src="https://img.youtube.com/vi/' + l.id + '/mqdefault.jpg"></div><div class="level-info"><h2>' + l.name + '</h2><p style="color:#ff6600; font-weight:bold;">+' + calculatePoints(i) + ' PTS</p></div><div class="rank-number">#' + (i + 1) + '</div></div>';
    }});
}
function openDetails(i) {
    const l = NIVELES[i];
    document.getElementById('modal-body').innerHTML = '<h1 style="color:#ff6600;">' + l.name + '</h1><iframe width="100%" height="250" src="https://www.youtube.com/embed/' + l.id + '" frameborder="0" allowfullscreen></iframe><p><b>FIRST:</b> ' + (l.first || "Nadie") + '</p>';
    document.getElementById('levelModal').style.display = "block";
}
function renderLeaderboard() {
    const b = document.getElementById('leaderboardBody'); if(!b) return;
    RANKING.forEach(u => {
        let t = 0; let list = u.levelList ? u.levelList.split(",") : [];
        list.forEach(lvl => { const idx = NIVELES.findIndex(item => item.name.trim().toLowerCase() === lvl.trim().toLowerCase()); if(idx > -1) t += parseFloat(calculatePoints(idx)); });
        u.pts = t.toFixed(1); u.cnt = list.filter(x => x.trim() !== "").length;
    });
    RANKING.sort((a,b) => b.pts - a.pts);
    b.innerHTML = RANKING.map((u, i) => '<tr class="rank-row" onclick="openUserProfile(\\'' + u.name + '\\')"><td>#' + (i + 1) + '</td><td style="text-align:left;"><img src="https://flagcdn.com/w20/' + u.country + '.png" style="margin-right:10px;">' + u.name + '</td><td style="color:#ff6600; font-weight:bold;">' + u.pts + '</td><td>' + u.cnt + '</td></tr>').join("");
}
function openUserProfile(n) {
    const u = RANKING.find(x => x.name === n);
    document.getElementById('uModalContent').innerHTML = '<span onclick="closeM()" style="cursor:pointer; color:#ff6600; position:absolute; right:20px; top:10px; font-size:2rem;">&times;</span><h2 style="color:#ff6600">' + u.name + '</h2><p>PTS: ' + u.pts + '</p><div style="font-size:0.8rem;">' + u.levelList + '</div>';
    document.getElementById('uModal').style.display = "block";
}
document.addEventListener("DOMContentLoaded", () => { renderLevels(); renderLeaderboard(); });
`;
            const blob = new Blob([script], { type: 'text/javascript' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'script.js'; a.click();
        }
    </script>
</body>
</html>
